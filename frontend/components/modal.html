<!-- Modal Template -->
<div id="modalTemplate" style="display: none;">
    <div class="modal-overlay" onclick="closeModal()">
        <div class="modal glass-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Title</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                Modal content goes here
            </div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<style>
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.2s ease;
}

.modal {
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0;
    animation: slideIn 0.3s ease;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}

.modal-header h3 {
    margin: 0;
    font-size: 18px;
}

.modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

.modal-close:hover {
    background: rgba(0, 0, 0, 0.04);
}

.modal-body {
    padding: 24px;
}

.modal-footer {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding: 16px 24px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
let currentModal = null;
let modalConfirmCallback = null;

function showModal(options = {}) {
    const {
        title = 'Modal',
        content = '',
        confirmText = 'Confirm',
        cancelText = 'Cancel',
        onConfirm = null,
        onCancel = null,
        showFooter = true
    } = options;
    
    // Remove existing modal
    if (currentModal) {
        currentModal.remove();
    }
    
    // Create modal
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal glass-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>${title}</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">${content}</div>
            ${showFooter ? `
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">${cancelText}</button>
                    <button class="btn btn-primary" id="modalConfirm">${confirmText}</button>
                </div>
            ` : ''}
        </div>
    `;
    
    document.body.appendChild(modal);
    currentModal = modal;
    modalConfirmCallback = onConfirm;
    
    // Add confirm handler
    if (showFooter) {
        modal.querySelector('#modalConfirm').addEventListener('click', () => {
            if (onConfirm) onConfirm();
            closeModal();
        });
    }
    
    // Close on overlay click
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            if (onCancel) onCancel();
            closeModal();
        }
    });
    
    return modal;
}

function closeModal() {
    if (currentModal) {
        currentModal.remove();
        currentModal = null;
        modalConfirmCallback = null;
    }
}

function showConfirmDialog(message, onConfirm, onCancel) {
    return showModal({
        title: 'Confirm',
        content: `<p>${message}</p>`,
        confirmText: 'Confirm',
        onConfirm,
        onCancel
    });
}

function showAlert(message, type = 'info') {
    const icons = {
        success: '<i class="fas fa-check-circle" style="color: #10b981; font-size: 48px;"></i>',
        error: '<i class="fas fa-times-circle" style="color: #dc2626; font-size: 48px;"></i>',
        warning: '<i class="fas fa-exclamation-triangle" style="color: #eab308; font-size: 48px;"></i>',
        info: '<i class="fas fa-info-circle" style="color: #3b82f6; font-size: 48px;"></i>'
    };
    
    return showModal({
        title: '',
        content: `
            <div style="text-align: center;">
                ${icons[type] || icons.info}
                <p style="margin-top: 16px;">${message}</p>
            </div>
        `,
        confirmText: 'OK',
        showFooter: true
    });
}

function showImageModal(imageUrl, title = '') {
    return showModal({
        title: title || 'Image',
        content: `<img src="${imageUrl}" style="width: 100%; border-radius: 16px;">`,
        confirmText: 'Close',
        showFooter: true
    });
}
</script>

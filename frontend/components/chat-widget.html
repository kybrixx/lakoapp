<div class="chat-widget" id="chatWidget">
    <!-- Chat Toggle Button -->
    <button class="chat-toggle" id="chatToggle" onclick="toggleChatWidget()">
        <i class="fas fa-comment"></i>
        <span class="chat-badge" id="chatWidgetBadge" style="display: none;">0</span>
    </button>
    
    <!-- Chat Window -->
    <div class="chat-window glass-card" id="chatWindow" style="display: none;">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar" id="widgetAvatar">V</div>
                <div>
                    <h4 id="widgetVendorName">Vendor</h4>
                    <span class="chat-status" id="widgetStatus">Online</span>
                </div>
            </div>
            <div class="chat-actions">
                <button class="chat-action-btn" onclick="minimizeChat()">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="chat-action-btn" onclick="closeChatWidget()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <div class="chat-messages" id="widgetMessages">
            <div class="chat-date-divider"><span>Today</span></div>
            <!-- Messages will be inserted here -->
        </div>
        
        <div class="chat-input-area">
            <button class="chat-input-btn" onclick="document.getElementById('widgetImageInput').click()">
                <i class="fas fa-image"></i>
            </button>
            <input type="file" id="widgetImageInput" accept="image/*" multiple style="display: none;">
            <input type="text" id="widgetMessageInput" class="chat-input" placeholder="Type a message..." onkeypress="handleWidgetKeyPress(event)">
            <button class="chat-input-btn" onclick="sendWidgetMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<style>
.chat-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
}

.chat-toggle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 20px rgba(15, 92, 47, 0.3);
    transition: all 0.2s;
    position: relative;
}

.chat-toggle:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 24px rgba(15, 92, 47, 0.4);
}

.chat-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #dc2626;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 12px;
    min-width: 18px;
}

.chat-window {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 360px;
    height: 500px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
}

.chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}

.chat-header-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--primary-light);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

.chat-header-info h4 {
    font-size: 15px;
    margin-bottom: 2px;
}

.chat-status {
    font-size: 11px;
    color: #10b981;
}

.chat-actions {
    display: flex;
    gap: 4px;
}

.chat-action-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.chat-action-btn:hover {
    background: rgba(0, 0, 0, 0.04);
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-date-divider {
    text-align: center;
    margin: 8px 0;
}

.chat-date-divider span {
    background: rgba(0, 0, 0, 0.1);
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 11px;
    color: var(--text-secondary);
}

.widget-message {
    display: flex;
    gap: 8px;
    max-width: 80%;
}

.widget-message.sent {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.widget-message-bubble {
    padding: 10px 14px;
    border-radius: 18px;
    background: rgba(0, 0, 0, 0.04);
    font-size: 14px;
}

.widget-message.sent .widget-message-bubble {
    background: var(--primary);
    color: white;
}

.widget-message-time {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 4px;
}

.chat-input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
}

.chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 24px;
    outline: none;
    font-size: 14px;
}

.chat-input:focus {
    border-color: var(--primary);
}

.chat-input-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.chat-input-btn:hover {
    background: rgba(0, 0, 0, 0.04);
    color: var(--primary);
}

@media (max-width: 480px) {
    .chat-window {
        width: calc(100vw - 40px);
        right: -10px;
    }
}
</style>

<script>
let widgetVendorId = null;
let widgetMessages = [];

function toggleChatWidget() {
    const window = document.getElementById('chatWindow');
    window.style.display = window.style.display === 'none' ? 'flex' : 'none';
}

function openChatWidget(vendorId, vendorName) {
    widgetVendorId = vendorId;
    document.getElementById('widgetVendorName').textContent = vendorName || 'Vendor';
    document.getElementById('widgetAvatar').textContent = vendorName?.charAt(0) || 'V';
    
    document.getElementById('chatWindow').style.display = 'flex';
    loadWidgetMessages();
}

function closeChatWidget() {
    document.getElementById('chatWindow').style.display = 'none';
    widgetVendorId = null;
}

function minimizeChat() {
    document.getElementById('chatWindow').style.display = 'none';
}

async function loadWidgetMessages() {
    if (!widgetVendorId) return;
    
    try {
        const data = await api.getMessages(widgetVendorId);
        widgetMessages = data.messages || [];
        renderWidgetMessages();
    } catch (error) {
        console.error('Error loading messages:', error);
    }
}

function renderWidgetMessages() {
    const container = document.getElementById('widgetMessages');
    const currentUserId = auth.getUser()?.id;
    
    container.innerHTML = `
        <div class="chat-date-divider"><span>Today</span></div>
        ${widgetMessages.map(msg => {
            const isSent = msg.sender_id === currentUserId;
            return `
                <div class="widget-message ${isSent ? 'sent' : 'received'}">
                    <div class="widget-message-bubble">
                        ${msg.message || ''}
                        <div class="widget-message-time">${formatMessageTime(msg.created_at)}</div>
                    </div>
                </div>
            `;
        }).join('')}
    `;
    
    container.scrollTop = container.scrollHeight;
}

async function sendWidgetMessage() {
    const input = document.getElementById('widgetMessageInput');
    const message = input.value.trim();
    
    if (!message || !widgetVendorId) return;
    
    try {
        await chatManager.sendMessage(widgetVendorId, message);
        input.value = '';
        await loadWidgetMessages();
    } catch (error) {
        showToast('Failed to send message', 'error');
    }
}

function handleWidgetKeyPress(e) {
    if (e.key === 'Enter') {
        sendWidgetMessage();
    }
}

function formatMessageTime(timestamp) {
    if (!timestamp) return '';
    return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Listen for new messages
chatManager.on('message', (data) => {
    if (widgetVendorId && (data.sender_id === widgetVendorId || data.receiver_id === widgetVendorId)) {
        loadWidgetMessages();
    }
    
    // Update badge
    const badge = document.getElementById('chatWidgetBadge');
    const count = chatManager.getUnreadCount();
    if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'block';
    }
});
</script>

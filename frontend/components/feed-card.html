<div class="feed-card glass-card" id="feed-{{post_id}}">
    <div class="feed-header">
        <div class="feed-author">
            <div class="author-avatar">
                {{#if author_avatar}}
                    <img src="{{author_avatar}}" alt="{{author_name}}">
                {{else}}
                    <span>{{author_initial}}</span>
                {{/if}}
            </div>
            <div class="author-info">
                <div class="author-name">{{author_name}}</div>
                <div class="post-time">{{post_time}}</div>
            </div>
        </div>
        <button class="post-menu-btn" onclick="showPostMenu('{{post_id}}')">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>
    
    <div class="feed-content">
        <p>{{content}}</p>
        {{#if images}}
        <div class="feed-images">
            {{#each images}}
            <img src="{{this}}" alt="Post image" onclick="viewImage('{{this}}')">
            {{/each}}
        </div>
        {{/if}}
    </div>
    
    <div class="feed-footer">
        <div class="feed-action {{#if liked}}liked{{/if}}" onclick="likePost('{{post_id}}')">
            <i class="{{#if liked}}fas{{else}}far{{/if}} fa-heart"></i>
            <span>{{likes}}</span>
        </div>
        <div class="feed-action" onclick="showComments('{{post_id}}')">
            <i class="far fa-comment"></i>
            <span>{{comments}}</span>
        </div>
        <div class="feed-action" onclick="sharePost('{{post_id}}')">
            <i class="far fa-share-square"></i>
        </div>
    </div>
</div>

<style>
.feed-card {
    padding: 20px;
    margin-bottom: 16px;
}

.feed-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
}

.feed-author {
    display: flex;
    gap: 12px;
}

.author-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--primary-light);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 18px;
    overflow: hidden;
}

.author-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.author-info {
    display: flex;
    flex-direction: column;
}

.author-name {
    font-weight: 600;
}

.post-time {
    font-size: 12px;
    color: var(--text-secondary);
}

.post-menu-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
}

.post-menu-btn:hover {
    background: rgba(0,0,0,0.04);
}

.feed-content {
    margin-bottom: 16px;
    line-height: 1.6;
}

.feed-images {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-top: 12px;
}

.feed-images img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 12px;
    cursor: pointer;
}

.feed-footer {
    display: flex;
    gap: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,0,0,0.06);
}

.feed-action {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}

.feed-action:hover {
    color: var(--primary);
}

.feed-action.liked {
    color: #dc2626;
}

.feed-action i {
    font-size: 20px;
}
</style>

<script>
function renderFeedCard(post) {
    const authorInitial = post.user_name?.charAt(0) || 'U';
    const images = post.images ? JSON.parse(post.images) : [];
    
    return `
        <div class="feed-card glass-card" id="feed-${post.id}">
            <div class="feed-header">
                <div class="feed-author">
                    <div class="author-avatar">
                        ${post.user_avatar ? 
                            `<img src="${post.user_avatar}" alt="${post.user_name}">` : 
                            `<span>${authorInitial}</span>`}
                    </div>
                    <div class="author-info">
                        <div class="author-name">${post.user_name || 'User'}</div>
                        <div class="post-time">${formatTime(post.created_at)}</div>
                    </div>
                </div>
                <button class="post-menu-btn" onclick="showPostMenu('${post.id}')">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
            
            <div class="feed-content">
                <p>${escapeHtml(post.content)}</p>
                ${images.length ? `
                    <div class="feed-images">
                        ${images.map(img => `<img src="${img}" alt="Post" onclick="viewImage('${img}')">`).join('')}
                    </div>
                ` : ''}
            </div>
            
            <div class="feed-footer">
                <div class="feed-action ${post.is_liked ? 'liked' : ''}" onclick="likePost('${post.id}')">
                    <i class="${post.is_liked ? 'fas' : 'far'} fa-heart"></i>
                    <span>${post.likes || 0}</span>
                </div>
                <div class="feed-action" onclick="showComments('${post.id}')">
                    <i class="far fa-comment"></i>
                    <span>${post.comment_count || 0}</span>
                </div>
                <div class="feed-action" onclick="sharePost('${post.id}')">
                    <i class="far fa-share-square"></i>
                </div>
            </div>
        </div>
    `;
}

function showPostMenu(postId) {
    // Show menu: Report, Hide, etc.
}

function likePost(postId) {
    api.likePost(postId).then(() => {
        const card = document.getElementById(`feed-${postId}`);
        const likeBtn = card.querySelector('.feed-action');
        const icon = likeBtn.querySelector('i');
        const span = likeBtn.querySelector('span');
        
        likeBtn.classList.toggle('liked');
        icon.className = likeBtn.classList.contains('liked') ? 'fas fa-heart' : 'far fa-heart';
        span.textContent = parseInt(span.textContent) + (likeBtn.classList.contains('liked') ? 1 : -1);
    });
}

function showComments(postId) {
    window.location.href = `/pages/customer/post-detail.html?id=${postId}`;
}

function sharePost(postId) {
    const url = `${window.location.origin}/pages/customer/post-detail.html?id=${postId}`;
    if (navigator.share) {
        navigator.share({ title: 'Check out this post', url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!', 'success');
    }
}
</script>

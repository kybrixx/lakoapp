<div class="vendor-card glass-card" onclick="viewVendor('{{vendor_id}}')">
    <div class="vendor-cover">
        <img src="{{cover_image}}" alt="{{business_name}}">
        {{#if is_verified}}
        <span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>
        {{/if}}
    </div>
    
    <div class="vendor-logo-container">
        <img src="{{logo}}" alt="{{business_name}}" class="vendor-logo">
    </div>
    
    <div class="vendor-info">
        <h3 class="vendor-name">{{business_name}}</h3>
        <p class="vendor-category">{{category}}</p>
        
        <div class="vendor-rating">
            <span class="stars">{{rating_stars}}</span>
            <span>{{rating}} ({{review_count}} reviews)</span>
        </div>
        
        <p class="vendor-address">
            <i class="fas fa-map-marker-alt"></i> {{address}}
        </p>
        
        {{#if distance}}
        <p class="vendor-distance">
            <i class="fas fa-location-dot"></i> {{distance}} km away
        </p>
        {{/if}}
        
        <div class="vendor-tags">
            {{#if is_open}}
            <span class="tag open">🟢 Open</span>
            {{else}}
            <span class="tag closed">🔴 Closed</span>
            {{/if}}
            
            <span class="tag traffic">
                <i class="fas fa-users"></i> {{traffic_count}} views
            </span>
        </div>
    </div>
    
    <div class="vendor-actions">
        <button class="action-btn" onclick="event.stopPropagation(); toggleShortlist('{{vendor_id}}')" title="Save">
            <i class="far fa-bookmark"></i>
        </button>
        <button class="action-btn" onclick="event.stopPropagation(); chatWithVendor('{{vendor_id}}')" title="Chat">
            <i class="far fa-comment"></i>
        </button>
        <button class="action-btn" onclick="event.stopPropagation(); shareVendor('{{vendor_id}}')" title="Share">
            <i class="far fa-share-square"></i>
        </button>
    </div>
</div>

<style>
.vendor-card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
}

.vendor-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
}

.vendor-cover {
    height: 120px;
    overflow: hidden;
    position: relative;
}

.vendor-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.verified-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #10b981;
    color: white;
    padding: 4px 10px;
    border-radius: 40px;
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
}

.vendor-logo-container {
    position: relative;
    margin-top: -40px;
    padding: 0 16px;
}

.vendor-logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    border: 3px solid white;
    object-fit: cover;
    background: white;
}

.vendor-info {
    padding: 16px;
}

.vendor-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
}

.vendor-category {
    color: var(--primary);
    font-size: 13px;
    margin-bottom: 8px;
}

.vendor-rating {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 14px;
}

.stars {
    color: #fbbf24;
}

.vendor-address {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.vendor-distance {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.vendor-tags {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.tag {
    padding: 4px 12px;
    background: rgba(0, 0, 0, 0.04);
    border-radius: 40px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.tag.open {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
}

.tag.closed {
    background: rgba(220, 38, 38, 0.1);
    color: #dc2626;
}

.tag.traffic {
    background: rgba(15, 92, 47, 0.1);
    color: var(--primary);
}

.vendor-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
}

.action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.action-btn:hover {
    background: white;
    transform: scale(1.05);
}
</style>

<script>
function renderVendorCard(vendor) {
    const rating = vendor.rating || 0;
    const distance = vendor.distance ? vendor.distance.toFixed(1) : null;
    
    return `
        <div class="vendor-card glass-card" onclick="viewVendor('${vendor.id}')">
            <div class="vendor-cover">
                <img src="${vendor.cover_image || '/assets/images/default-cover.jpg'}" alt="${vendor.business_name}">
                ${vendor.is_verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>' : ''}
            </div>
            
            <div class="vendor-logo-container">
                <img src="${vendor.logo || '/assets/images/default-vendor.png'}" alt="${vendor.business_name}" class="vendor-logo">
            </div>
            
            <div class="vendor-info">
                <h3 class="vendor-name">${vendor.business_name}</h3>
                <p class="vendor-category">${vendor.category}</p>
                
                <div class="vendor-rating">
                    <span class="stars">${'★'.repeat(Math.floor(rating))}${'☆'.repeat(5 - Math.floor(rating))}</span>
                    <span>${rating} (${vendor.review_count || 0} reviews)</span>
                </div>
                
                <p class="vendor-address">
                    <i class="fas fa-map-marker-alt"></i> ${vendor.address || 'Address not set'}
                </p>
                
                ${distance ? `
                    <p class="vendor-distance">
                        <i class="fas fa-location-dot"></i> ${distance} km away
                    </p>
                ` : ''}
                
                <div class="vendor-tags">
                    <span class="tag ${vendor.is_open ? 'open' : 'closed'}">
                        ${vendor.is_open ? '🟢 Open' : '🔴 Closed'}
                    </span>
                    <span class="tag traffic">
                        <i class="fas fa-users"></i> ${vendor.traffic_count || 0} views
                    </span>
                </div>
            </div>
            
            <div class="vendor-actions">
                <button class="action-btn" onclick="event.stopPropagation(); toggleShortlist('${vendor.id}')" title="Save">
                    <i class="far fa-bookmark"></i>
                </button>
                <button class="action-btn" onclick="event.stopPropagation(); chatWithVendor('${vendor.id}')" title="Chat">
                    <i class="far fa-comment"></i>
                </button>
                <button class="action-btn" onclick="event.stopPropagation(); shareVendor('${vendor.id}')" title="Share">
                    <i class="far fa-share-square"></i>
                </button>
            </div>
        </div>
    `;
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}
</script>

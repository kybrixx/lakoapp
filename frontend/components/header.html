<header class="app-header glass-card">
    <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <a href="/" class="logo">
            <span class="logo-text">lako</span>
        </a>
    </div>
    
    <div class="header-center">
        <div class="search-bar" onclick="goToSearch()">
            <i class="fas fa-search"></i>
            <span>Search vendors, products...</span>
        </div>
    </div>
    
    <div class="header-right">
        <button class="header-btn" onclick="goToChat()">
            <i class="far fa-comment"></i>
            <span class="badge" id="chatBadge" style="display: none;">0</span>
        </button>
        <button class="header-btn" onclick="goToNotifications()">
            <i class="far fa-bell"></i>
            <span class="badge" id="notificationBadge" style="display: none;">0</span>
        </button>
        <div class="user-menu">
            <button class="header-btn" onclick="toggleUserMenu()">
                <i class="far fa-user"></i>
            </button>
            <div class="user-dropdown glass-card" id="userDropdown" style="display: none;">
                <a href="/pages/customer/profile.html">
                    <i class="far fa-user"></i> Profile
                </a>
                <a href="/pages/customer/shortlist.html">
                    <i class="far fa-bookmark"></i> Shortlist
                </a>
                <a href="/pages/customer/activities.html">
                    <i class="far fa-clock"></i> Activities
                </a>
                <a href="/pages/customer/settings.html">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <hr>
                <a href="#" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </div>
</header>

<style>
.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    margin: 20px;
    border-radius: 60px;
    position: sticky;
    top: 20px;
    z-index: 100;
}

.header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.logo {
    text-decoration: none;
}

.logo-text {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #0a3b1a, #1a6e3a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.search-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.04);
    padding: 10px 24px;
    border-radius: 40px;
    min-width: 300px;
    cursor: pointer;
    transition: all 0.2s;
}

.search-bar:hover {
    background: rgba(0, 0, 0, 0.08);
}

.search-bar i {
    color: var(--text-secondary);
}

.search-bar span {
    color: var(--text-secondary);
    font-size: 14px;
}

.header-btn {
    position: relative;
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(0, 0, 0, 0.04);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.header-btn:hover {
    background: rgba(0, 0, 0, 0.08);
}

.badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: #dc2626;
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 12px;
    min-width: 18px;
}

.user-menu {
    position: relative;
}

.user-dropdown {
    position: absolute;
    top: 52px;
    right: 0;
    min-width: 200px;
    padding: 8px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.user-dropdown a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--text-primary);
    text-decoration: none;
    border-radius: 12px;
    transition: all 0.2s;
}

.user-dropdown a:hover {
    background: rgba(0, 0, 0, 0.04);
}

.user-dropdown hr {
    margin: 8px 0;
    border: none;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
}

.menu-toggle {
    display: none;
}

@media (max-width: 768px) {
    .app-header {
        margin: 10px;
        padding: 12px 16px;
    }
    
    .menu-toggle {
        display: block;
    }
    
    .search-bar {
        min-width: auto;
        padding: 8px 16px;
    }
    
    .search-bar span {
        display: none;
    }
    
    .header-center {
        flex: 1;
        margin: 0 12px;
    }
}
</style>

<script>
function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) {
        sidebar.classList.toggle('open');
    }
}

function toggleUserMenu() {
    const dropdown = document.getElementById('userDropdown');
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
}

function goToSearch() {
    window.location.href = '/pages/customer/search.html';
}

function goToChat() {
    window.location.href = '/pages/customer/chat-list.html';
}

function goToNotifications() {
    window.location.href = '/pages/customer/notifications.html';
}

function handleLogout() {
    auth.logout();
    window.location.href = '/';
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('userDropdown');
    const userBtn = e.target.closest('.user-menu');
    if (dropdown && !userBtn) {
        dropdown.style.display = 'none';
    }
});

// Load unread counts
async function loadUnreadCounts() {
    try {
        const chatData = await api.request('/chat/unread-count');
        if (chatData.unread > 0) {
            const badge = document.getElementById('chatBadge');
            badge.textContent = chatData.unread;
            badge.style.display = 'block';
        }
    } catch (error) {
        // Ignore
    }
}

if (auth.isAuthenticated()) {
    loadUnreadCounts();
}
</script>

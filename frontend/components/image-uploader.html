<div class="image-uploader">
    <input type="file" id="{{uploaderId}}" accept="image/*" multiple style="display: none;" onchange="handleImageSelect(event, '{{uploaderId}}')">
    
    <div class="upload-area" onclick="document.getElementById('{{uploaderId}}').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click or drag images to upload</p>
        <span class="upload-hint">Max 5MB per image. JPG, PNG, GIF, WebP</span>
    </div>
    
    <div class="upload-progress" id="{{uploaderId}}-progress" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <span class="progress-text">Uploading...</span>
    </div>
    
    <div class="image-preview-grid" id="{{uploaderId}}-preview"></div>
</div>

<style>
.image-uploader {
    width: 100%;
}

.upload-area {
    border: 2px dashed rgba(0, 0, 0, 0.1);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}

.upload-area:hover {
    border-color: var(--primary);
    background: rgba(15, 92, 47, 0.02);
}

.upload-area i {
    font-size: 48px;
    color: var(--text-secondary);
    margin-bottom: 16px;
}

.upload-area p {
    margin-bottom: 8px;
    font-weight: 500;
}

.upload-hint {
    font-size: 12px;
    color: var(--text-secondary);
}

.upload-progress {
    margin-top: 16px;
}

.progress-bar {
    height: 6px;
    background: rgba(0, 0, 0, 0.1);
    border-radius: 3px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0;
    transition: width 0.3s;
}

.progress-text {
    display: block;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
}

.image-preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
    margin-top: 16px;
}

.preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.preview-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
}

.preview-item .remove-btn:hover {
    background: #dc2626;
}

.preview-item.uploading {
    opacity: 0.6;
}

.preview-item .upload-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview-item .upload-overlay i {
    color: white;
    font-size: 20px;
    animation: spin 1s linear infinite;
}
</style>

<script>
class ImageUploader {
    constructor(uploaderId, options = {}) {
        this.uploaderId = uploaderId;
        this.options = {
            maxFiles: 10,
            maxSize: 5 * 1024 * 1024,
            uploadType: 'general',
            onUploadComplete: null,
            ...options
        };
        
        this.files = [];
        this.uploadedUrls = [];
        
        this.setupDragDrop();
    }
    
    setupDragDrop() {
        const uploadArea = document.querySelector(`[onclick*="${this.uploaderId}"]`).parentElement;
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            this.addFiles(files);
        });
    }
    
    addFiles(newFiles) {
        const validFiles = newFiles.filter(f => {
            if (f.size > this.options.maxSize) {
                showToast(`${f.name} is too large (max 5MB)`, 'error');
                return false;
            }
            return true;
        });
        
        if (this.files.length + validFiles.length > this.options.maxFiles) {
            showToast(`Maximum ${this.options.maxFiles} images allowed`, 'error');
            return;
        }
        
        this.files.push(...validFiles);
        this.renderPreview();
        this.uploadFiles();
    }
    
    renderPreview() {
        const preview = document.getElementById(`${this.uploaderId}-preview`);
        preview.innerHTML = '';
        
        this.files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.id = `preview-${this.uploaderId}-${index}`;
                div.innerHTML = `
                    <img src="${e.target.result}" alt="Preview">
                    <button class="remove-btn" onclick="uploader_${this.uploaderId}.removeFile(${index})">×</button>
                `;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }
    
    async uploadFiles() {
        const progressBar = document.querySelector(`#${this.uploaderId}-progress .progress-fill`);
        const progressText = document.querySelector(`#${this.uploaderId}-progress .progress-text`);
        const progressContainer = document.getElementById(`${this.uploaderId}-progress`);
        
        progressContainer.style.display = 'block';
        
        const formData = new FormData();
        this.files.forEach(file => formData.append('files', file));
        formData.append('type', this.options.uploadType);
        
        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload/images', true);
            xhr.setRequestHeader('X-Session-Token', api.getToken());
            
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + '%';
                    progressText.textContent = `Uploading... ${Math.round(percent)}%`;
                }
            };
            
            xhr.onload = () => {
                if (xhr.status === 201) {
                    const data = JSON.parse(xhr.responseText);
                    this.uploadedUrls = data.uploaded.map(u => u.url);
                    progressText.textContent = 'Upload complete!';
                    
                    if (this.options.onUploadComplete) {
                        this.options.onUploadComplete(this.uploadedUrls);
                    }
                    
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 1000);
                } else {
                    progressText.textContent = 'Upload failed';
                }
            };
            
            xhr.onerror = () => {
                progressText.textContent = 'Upload failed';
            };
            
            xhr.send(formData);
        } catch (error) {
            console.error('Upload error:', error);
            progressText.textContent = 'Upload failed';
        }
    }
    
    removeFile(index) {
        this.files.splice(index, 1);
        this.renderPreview();
    }
    
    getUploadedUrls() {
        return this.uploadedUrls;
    }
}

function handleImageSelect(event, uploaderId) {
    const files = Array.from(event.target.files);
    
    if (!window[`uploader_${uploaderId}`]) {
        window[`uploader_${uploaderId}`] = new ImageUploader(uploaderId);
    }
    
    window[`uploader_${uploaderId}`].addFiles(files);
    event.target.value = '';
}
</script>

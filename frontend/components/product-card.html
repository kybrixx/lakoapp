<div class="product-card glass-card" onclick="viewProduct('{{product_id}}')">
    <div class="product-image-container">
        <img src="{{image}}" alt="{{name}}" class="product-image">
        {{#if on_sale}}
        <span class="sale-badge">SALE</span>
        {{/if}}
        {{#if stock_low}}
        <span class="stock-badge low">Low Stock</span>
        {{/if}}
        {{#if out_of_stock}}
        <span class="stock-badge out">Out of Stock</span>
        {{/if}}
    </div>
    
    <div class="product-details">
        <h4 class="product-name">{{name}}</h4>
        <p class="product-vendor" onclick="event.stopPropagation(); viewVendor('{{vendor_id}}')">
            <i class="fas fa-store"></i> {{vendor_name}}
        </p>
        
        <div class="product-price">
            <span class="current-price">₱{{price}}</span>
            {{#if original_price}}
            <span class="original-price">₱{{original_price}}</span>
            {{/if}}
        </div>
        
        <div class="product-rating">
            <span class="stars">{{rating_stars}}</span>
            <span>({{review_count}})</span>
        </div>
        
        {{#if moq}}
        <p class="product-moq">MOQ: {{moq}}</p>
        {{/if}}
    </div>
    
    <div class="product-actions">
        <button class="action-btn" onclick="event.stopPropagation(); addToCart('{{product_id}}')" title="Add to Cart">
            <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="action-btn" onclick="event.stopPropagation(); saveProduct('{{product_id}}')" title="Save">
            <i class="far fa-bookmark"></i>
        </button>
    </div>
</div>

<style>
.product-card {
    position: relative;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
}

.product-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
}

.product-image-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    margin-bottom: 12px;
}

.product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
}

.sale-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #dc2626;
    color: white;
    padding: 4px 10px;
    border-radius: 40px;
    font-size: 11px;
    font-weight: 600;
}

.stock-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 10px;
    border-radius: 40px;
    font-size: 11px;
    font-weight: 500;
}

.stock-badge.low {
    background: rgba(234, 179, 8, 0.9);
    color: white;
}

.stock-badge.out {
    background: rgba(220, 38, 38, 0.9);
    color: white;
}

.product-details {
    margin-bottom: 12px;
}

.product-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
}

.product-vendor {
    font-size: 13px;
    color: var(--primary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
}

.product-vendor:hover {
    text-decoration: underline;
}

.product-price {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.current-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
}

.original-price {
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: line-through;
}

.product-rating {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    margin-bottom: 4px;
}

.product-moq {
    font-size: 12px;
    color: var(--text-secondary);
}

.product-actions {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
}

.product-actions .action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid rgba(0, 0, 0, 0.06);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.product-actions .action-btn:hover {
    background: var(--primary);
    color: white;
}
</style>

<script>
function renderProductCard(product) {
    const rating = product.rating || 0;
    const stockLow = product.stock > 0 && product.stock <= 5;
    const outOfStock = product.stock === 0;
    
    return `
        <div class="product-card glass-card" onclick="viewProduct('${product.id}')">
            <div class="product-image-container">
                <img src="${product.image || '/assets/images/placeholder.jpg'}" alt="${product.name}" class="product-image">
                ${outOfStock ? '<span class="stock-badge out">Out of Stock</span>' : ''}
                ${stockLow ? '<span class="stock-badge low">Low Stock</span>' : ''}
            </div>
            
            <div class="product-details">
                <h4 class="product-name">${product.name}</h4>
                <p class="product-vendor" onclick="event.stopPropagation(); viewVendor('${product.vendor_id}')">
                    <i class="fas fa-store"></i> ${product.vendor_name || 'Vendor'}
                </p>
                
                <div class="product-price">
                    <span class="current-price">₱${product.price || 0}</span>
                </div>
                
                <div class="product-rating">
                    <span class="stars">${'★'.repeat(Math.floor(rating))}${'☆'.repeat(5 - Math.floor(rating))}</span>
                    <span>(${product.review_count || 0})</span>
                </div>
                
                ${product.moq ? `<p class="product-moq">MOQ: ${product.moq}</p>` : ''}
            </div>
            
            <div class="product-actions">
                <button class="action-btn" onclick="event.stopPropagation(); chatWithVendor('${product.vendor_id}')" title="Chat Vendor">
                    <i class="far fa-comment"></i>
                </button>
                <button class="action-btn" onclick="event.stopPropagation(); saveProduct('${product.id}')" title="Save">
                    <i class="far fa-bookmark"></i>
                </button>
            </div>
        </div>
    `;
}

function viewProduct(id) {
    window.location.href = `/pages/customer/product-detail.html?id=${id}`;
}
</script>

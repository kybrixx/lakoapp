<!-- Image Viewer Component -->
<div id="imageViewer" class="image-viewer-overlay" style="display: none;">
    <div class="image-viewer-container">
        <!-- Header -->
        <div class="image-viewer-header">
            <div class="image-viewer-counter">
                <span id="currentImageIndex">1</span> / <span id="totalImagesCount">1</span>
            </div>
            <div class="image-viewer-actions">
                <button class="viewer-btn" onclick="toggleFullscreen()" title="Fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
                <button class="viewer-btn" onclick="downloadCurrentImage()" title="Download">
                    <i class="fas fa-download"></i>
                </button>
                <button class="viewer-btn" onclick="shareCurrentImage()" title="Share">
                    <i class="fas fa-share-alt"></i>
                </button>
                <button class="viewer-btn viewer-close" onclick="closeImageViewer()" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Main Image -->
        <div class="image-viewer-main">
            <button class="viewer-nav viewer-prev" onclick="navigateImage(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <div class="image-viewer-content" id="viewerContent">
                <img id="viewerImage" src="" alt="Viewer" draggable="false">
                
                <!-- Loading Indicator -->
                <div class="viewer-loading" id="viewerLoading" style="display: none;">
                    <div class="loading-spinner"></div>
                </div>
                
                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button class="viewer-btn" onclick="zoomIn()" title="Zoom In">
                        <i class="fas fa-search-plus"></i>
                    </button>
                    <button class="viewer-btn" onclick="zoomOut()" title="Zoom Out">
                        <i class="fas fa-search-minus"></i>
                    </button>
                    <button class="viewer-btn" onclick="resetZoom()" title="Reset Zoom">
                        <i class="fas fa-undo-alt"></i>
                    </button>
                </div>
            </div>
            
            <button class="viewer-nav viewer-next" onclick="navigateImage(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Thumbnails -->
        <div class="image-viewer-thumbnails" id="viewerThumbnails"></div>

        <!-- Caption -->
        <div class="image-viewer-caption" id="viewerCaption"></div>
    </div>
</div>

    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(20px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
}

    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
}

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    color: white;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);

    right: 0;

.image-viewer-actions {

}

.viewer-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(8px);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;

    font-size: 16px;

.viewer-btn:hover {

.image-viewer-content {

<script>
class ImageViewer {
    constructor() {
        this.images = [];
        this.currentIndex = 0;
        this.captions = [];
        this.scale = 1;
        this.rotation = 0;
        
        this.init();
    }
    
    init() {
        // Create viewer if it doesn't exist
        if (!document.getElementById('imageViewer')) {
            const viewer = document.createElement('div');
            viewer.id = 'imageViewer';
            viewer.className = 'image-viewer-overlay';
            viewer.style.display = 'none';
            viewer.innerHTML = document.querySelector('#imageViewerTemplate')?.innerHTML || this.getTemplate();
            document.body.appendChild(viewer);
        }
        
        this.bindEvents();
    }
    
    getTemplate() {
        return `
            <div class="image-viewer-container">
                <div class="image-viewer-header">
                    <div class="image-viewer-counter">
                        <span id="currentImageIndex">1</span> / <span id="totalImagesCount">1</span>
                    </div>
                    <div class="image-viewer-actions">
                        <button class="viewer-btn" onclick="imageViewer.toggleFullscreen()" title="Fullscreen">
                            <i class="fas fa-expand"></i>
                        </button>
                        <button class="viewer-btn" onclick="imageViewer.downloadCurrent()" title="Download">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="viewer-btn" onclick="imageViewer.shareCurrent()" title="Share">
                            <i class="fas fa-share-alt"></i>
                        </button>
                        <button class="viewer-btn viewer-close" onclick="imageViewer.close()" title="Close">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="image-viewer-main">
                    <button class="viewer-nav viewer-prev" onclick="imageViewer.navigate(-1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="image-viewer-content">
                        <img id="viewerImage" src="" alt="Viewer" draggable="false">
                        <div class="viewer-loading" id="viewerLoading" style="display: none;">
                            <div class="loading-spinner"></div>
                        </div>
                        <div class="zoom-controls">
                            <button class="viewer-btn" onclick="imageViewer.zoomIn()" title="Zoom In">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="viewer-btn" onclick="imageViewer.zoomOut()" title="Zoom Out">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="viewer-btn" onclick="imageViewer.resetZoom()" title="Reset">
                                <i class="fas fa-undo-alt"></i>
                            </button>
                        </div>
                    </div>
                    <button class="viewer-nav viewer-next" onclick="imageViewer.navigate(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="image-viewer-thumbnails" id="viewerThumbnails"></div>
                <div class="image-viewer-caption" id="viewerCaption"></div>
            </div>
        `;
    }
    
    bindEvents() {
        const overlay = document.getElementById('imageViewer');
        const image = document.getElementById('viewerImage');
        
        // Close on background click
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                this.close();
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (overlay.style.display !== 'flex') return;
            
            switch(e.key) {
                case 'Escape':
                    this.close();
                    break;
                case 'ArrowLeft':
                    this.navigate(-1);
                    break;
                case 'ArrowRight':
                    this.navigate(1);
                    break;
                case '+':
                case '=':
                    this.zoomIn();
                    break;
                case '-':
                    this.zoomOut();
                    break;
                case '0':
                    this.resetZoom();
                    break;
                case 'f':
                case 'F':
                    this.toggleFullscreen();
                    break;
            }
        });
        
        // Pinch zoom for touch devices
        if (image) {
            this.setupTouchZoom(image);
        }
    }
    
    setupTouchZoom(element) {
        let initialDistance = 0;
        
        element.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = this.getDistance(e.touches[0], e.touches[1]);
            }
        });
        
        element.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const distance = this.getDistance(e.touches[0], e.touches[1]);
                const scale = distance / initialDistance;
                this.scale = Math.min(Math.max(scale, 0.5), 3);
                this.applyTransform();
            }
        });
    }
    
    getDistance(touch1, touch2) {
        const dx = touch1.clientX - touch2.clientX;
        const dy = touch1.clientY - touch2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    open(images, options = {}) {
        this.images = Array.isArray(images) ? images : [images];
        this.captions = options.captions || [];
        this.currentIndex = options.startIndex || 0;
        
        const overlay = document.getElementById('imageViewer');
        overlay.style.display = 'flex';
        
        this.updateImage();
        this.renderThumbnails();
    }
    
    updateImage() {
        const img = document.getElementById('viewerImage');
        const loading = document.getElementById('viewerLoading');
        const counter = document.getElementById('currentImageIndex');
        const total = document.getElementById('totalImagesCount');
        const caption = document.getElementById('viewerCaption');
        
        counter.textContent = this.currentIndex + 1;
        total.textContent = this.images.length;
        
        loading.style.display = 'flex';
        
        img.onload = () => {
            loading.style.display = 'none';
            this.resetZoom();
        };
        
        img.onerror = () => {
            loading.style.display = 'none';
            img.src = '/assets/images/image-error.png';
        };
        
        img.src = this.images[this.currentIndex];
        
        // Update caption
        caption.textContent = this.captions[this.currentIndex] || '';
        
        // Update navigation buttons
        const prevBtn = document.querySelector('.viewer-prev');
        const nextBtn = document.querySelector('.viewer-next');
        
        if (prevBtn) {
            prevBtn.style.display = this.images.length > 1 ? 'flex' : 'none';
        }
        if (nextBtn) {
            nextBtn.style.display = this.images.length > 1 ? 'flex' : 'none';
        }
        
        // Update thumbnail active state
        this.updateThumbnailActive();
    }
    
    renderThumbnails() {
        const container = document.getElementById('viewerThumbnails');
        if (!container) return;
        
        if (this.images.length <= 1) {
            container.style.display = 'none';
            return;
        }
        
        container.style.display = 'flex';
        container.innerHTML = '';
        
        this.images.forEach((src, index) => {
            const thumb = document.createElement('div');
            thumb.className = `thumbnail-item ${index === this.currentIndex ? 'active' : ''}`;
            thumb.innerHTML = `<img src="${src}" alt="Thumbnail ${index + 1}">`;
            thumb.onclick = () => this.goTo(index);
            container.appendChild(thumb);
        });
    }
    
    updateThumbnailActive() {
        const thumbs = document.querySelectorAll('.thumbnail-item');
        thumbs.forEach((thumb, index) => {
            thumb.classList.toggle('active', index === this.currentIndex);
        });
    }
    
    navigate(direction) {
        if (this.images.length <= 1) return;
        
        this.currentIndex = (this.currentIndex + direction + this.images.length) % this.images.length;
        this.updateImage();
    }
    
    goTo(index) {
        if (index >= 0 && index < this.images.length) {
            this.currentIndex = index;
            this.updateImage();
        }
    }
    
    zoomIn() {
        this.scale = Math.min(this.scale + 0.25, 3);
        this.applyTransform();
    }
    
    zoomOut() {
        this.scale = Math.max(this.scale - 0.25, 0.5);
        this.applyTransform();
    }
    
    resetZoom() {
        this.scale = 1;
        this.rotation = 0;
        this.applyTransform();
    }
    
    applyTransform() {
        const img = document.getElementById('viewerImage');
        if (img) {
            img.style.transform = `scale(${this.scale}) rotate(${this.rotation}deg)`;
        }
    }
    
    toggleFullscreen() {
        const overlay = document.getElementById('imageViewer');
        
        if (!document.fullscreenElement) {
            overlay.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }
    
    async downloadCurrent() {
        const url = this.images[this.currentIndex];
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `lako-image-${Date.now()}.jpg`;
            a.click();
            
            URL.revokeObjectURL(blobUrl);
            showToast('Image downloaded', 'success');
        } catch (error) {
            showToast('Failed to download image', 'error');
        }
    }
    
    async shareCurrent() {
        const url = this.images[this.currentIndex];
        
        if (navigator.share) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const file = new File([blob], 'image.jpg', { type: 'image/jpeg' });
                
                await navigator.share({
                    title: 'Check out this image',
                    files: [file]
                });
            } catch (error) {
                if (error.name !== 'AbortError') {
                    showToast('Failed to share', 'error');
                }
            }
        } else {
            navigator.clipboard?.writeText(url);
            showToast('Link copied to clipboard', 'success');
        }
    }
    
    close() {
        const overlay = document.getElementById('imageViewer');
        overlay.style.display = 'none';
        this.images = [];
        this.currentIndex = 0;
        this.resetZoom();
    }
}

// Create global instance
const imageViewer = new ImageViewer();

// Helper functions for global access
function openImageViewer(images, options = {}) {
    imageViewer.open(images, options);
}

function closeImageViewer() {
    imageViewer.close();
}

function navigateImage(direction) {
    imageViewer.navigate(direction);
}

function zoomIn() {
    imageViewer.zoomIn();
}

function zoomOut() {
    imageViewer.zoomOut();
}

function resetZoom() {
    imageViewer.resetZoom();
}

function toggleFullscreen() {
    imageViewer.toggleFullscreen();
}

function downloadCurrentImage() {
    imageViewer.downloadCurrent();
}

function shareCurrentImage() {
    imageViewer.shareCurrent();
}

// View single image
function viewImage(url, caption = '') {
    openImageViewer([url], { captions: [caption] });
}

// View multiple images
function viewImages(images, startIndex = 0, captions = []) {
    openImageViewer(images, { startIndex, captions });
}
</script>

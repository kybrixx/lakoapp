<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover and connect with local street food vendors near you. Support local businesses with Lako.">
    <meta name="theme-color" content="#0f5c2f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lako">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.svg">
    <link rel="apple-touch-icon" href="/assets/images/logo-192.png">
    <title>Lako - Discover Local Vendors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/universal.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 24px; max-width: 1200px; }
        h1 {
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #0a3b1a, #1a6e3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .subtitle { color: #5a6e5a; font-size: 15px; margin-bottom: 56px; }
        .role-grid { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
        .role-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 44px 56px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 260px;
        }
        .role-card:hover { background: white; transform: translateY(-6px); box-shadow: 0 24px 48px -12px rgba(0,0,0,0.2); }
        .role-icon { font-size: 52px; margin-bottom: 20px; display: block; }
        .role-title { font-size: 22px; font-weight: 600; color: #1a2a1f; margin-bottom: 8px; }
        .role-desc { font-size: 14px; color: #5a6e5a; }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 48px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin: 8px;
        }
        .btn-primary { background: #0f5c2f; color: white; }
        .btn-secondary { background: rgba(0,0,0,0.08); color: #2a5a2a; }
        .btn-outline { background: transparent; border: 1px solid #0f5c2f; color: #0f5c2f; }
        .admin-link {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.06);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            color: #4a6a4a;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .role-card { padding: 32px 40px; min-width: 200px; }
            h1 { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>lako</h1>
        <div class="subtitle">proximity discovery · micro-retail · gps</div>
        <div class="role-grid">
            <div class="role-card" onclick="selectRole('customer')">
                <span class="role-icon">📍</span>
                <div class="role-title">customer</div>
                <div class="role-desc">discover nearby vendors</div>
            </div>
            <div class="role-card" onclick="selectRole('vendor')">
                <span class="role-icon">🏪</span>
                <div class="role-title">vendor</div>
                <div class="role-desc">manage your business</div>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="guestMode()">enter as guest →</button>
        <div class="admin-link" onclick="goToAdmin()">admin access</div>
    </div>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        function selectRole(role) { localStorage.setItem('user_role', role); window.location.href = '/pages/login.html'; }
        function guestMode() { window.location.href = '/pages/guest/browse.html'; }
        function goToAdmin() { window.location.href = '/pages/admin/login.html'; }
        const token = localStorage.getItem('session_token');
        const role = localStorage.getItem('user_role');
        if (token && role && role !== 'guest') {
            const redirects = { customer: '/pages/customer/dashboard.html', vendor: '/pages/vendor/dashboard.html', admin: '/pages/admin/dashboard.html' };
            if (redirects[role]) window.location.href = redirects[role];
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>

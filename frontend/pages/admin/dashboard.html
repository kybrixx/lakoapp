<div class="admin-dashboard">
    <!-- Header -->
    <header class="admin-header glass-card">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Admin Dashboard</h1>
        </div>
        <div class="header-right">
            <span class="admin-badge">
                <i class="fas fa-user-shield"></i> Administrator
            </span>
            <button class="btn btn-outline" onclick="auth.logout(); window.location.href='/'">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar glass-card" id="sidebar">
            <nav class="sidebar-nav">
                <a class="nav-item active" onclick="loadSection('overview')">
                    <i class="fas fa-dashboard"></i><span>Overview</span>
                </a>
                <a class="nav-item" onclick="loadSection('users')">
                    <i class="fas fa-users"></i><span>Users</span>
                </a>
                <a class="nav-item" onclick="loadSection('vendors')">
                    <i class="fas fa-store"></i><span>Vendors</span>
                </a>
                <a class="nav-item" onclick="loadSection('products')">
                    <i class="fas fa-box"></i><span>Products</span>
                </a>
                <a class="nav-item" onclick="loadSection('reviews')">
                    <i class="fas fa-star"></i><span>Reviews</span>
                </a>
                <a class="nav-item" onclick="loadSection('posts')">
                    <i class="fas fa-newspaper"></i><span>Posts</span>
                </a>
                <a class="nav-item" onclick="loadSection('reports')">
                    <i class="fas fa-flag"></i><span>Reports</span>
                </a>
                <a class="nav-item" onclick="loadSection('settings')">
                    <i class="fas fa-cog"></i><span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-content" id="adminContent"></main>
    </div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--background);
    min-height: 100vh;
    color: var(--text-primary);
}
h1, h2, h3 { font-weight: 600; }
.admin-dashboard { min-height: 100vh; display: flex; flex-direction: column; }
.admin-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; margin: 16px; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); }
.header-left, .header-right { display: flex; align-items: center; gap: 16px; }
.header-left h1 { font-size: 24px; margin: 0; }
.admin-badge { display: flex; align-items: center; gap: 8px; background: var(--primary); color: white; padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; }
.menu-toggle { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-primary); display: none; }
.admin-layout { display: flex; flex: 1; padding: 20px; gap: 24px; max-width: 1600px; margin: 0 auto; width: 100%; }
.admin-sidebar { width: 280px; padding: 24px 16px; height: fit-content; position: sticky; top: 20px; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; text-decoration: none; }
.nav-item:hover { background: rgba(15, 92, 47, 0.05); color: var(--primary); }
.nav-item.active { background: var(--primary); color: white; }
.nav-item i { width: 18px; text-align: center; }
.admin-content { flex: 1; min-width: 0; }
.glass-card { background: var(--surface); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border: none; border-radius: 40px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: var(--surface); }
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
.stat-change { font-size: 12px; margin-top: 8px; }
.stat-change.positive { color: #10b981; }
.stat-change.negative { color: #dc2626; }
.data-table { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
.table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 100px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); align-items: center; }
.table-row:hover { background: rgba(15, 92, 47, 0.02); }
@media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .menu-toggle { display: block; } .admin-sidebar { display: none; position: fixed; top: 80px; left: 20px; right: 20px; z-index: 200; width: auto; } .admin-sidebar.open { display: block; } .admin-layout { flex-direction: column; padding: 16px; } .stats-grid { grid-template-columns: repeat(2, 1fr); } .table-row { grid-template-columns: 1fr; gap: 8px; } }
</style>

<script>
let currentSection = 'overview';
let adminStats = {};

document.addEventListener('DOMContentLoaded', () => {
    checkAdminAuth();
    loadSection('overview');
});

function checkAdminAuth() {
    const user = auth.getUser();
    if (!user || user.role !== 'admin') {
        window.location.href = '/pages/admin/login.html';
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

async function loadSection(section) {
    currentSection = section;
    
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event?.target.closest('.nav-item')?.classList.add('active');
    
    const loaders = {
        overview: loadOverview,
        users: loadUsers,
        vendors: loadVendors,
        products: loadProducts,
        reviews: loadReviews,
        posts: loadPosts,
        reports: loadReports,
        settings: loadSettings
    };
    
    if (loaders[section]) await loaders[section]();
}

async function loadOverview() {
    try {
        const stats = await api.getAdminStats();
        adminStats = stats;
        
        document.getElementById('adminContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">${stats.totalUsers || 0}</div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-change positive">↑ 12% this week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.totalVendors || 0}</div>
                    <div class="stat-label">Total Vendors</div>
                    <div class="stat-change positive">↑ 8% this week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.totalProducts || 0}</div>
                    <div class="stat-label">Total Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.totalTraffic || 0}</div>
                    <div class="stat-label">Total Views</div>
                </div>
            </div>
            
            <div class="data-table">
                <div class="table-header">
                    <h3>Recent Activity</h3>
                </div>
                <div id="recentActivity"></div>
            </div>
        `;
        
        loadRecentActivity();
    } catch (error) {
        console.error('Error loading overview:', error);
    }
}

async function loadRecentActivity() {
    try {
        const data = await api.request('/admin/activities?limit=10');
        const activities = data.activities || [];
        
        document.getElementById('recentActivity').innerHTML = activities.map(a => `
            <div class="table-row">
                <span>${a.user_role} - ${a.user_id?.slice(0,8)}</span>
                <span>${a.action_type}</span>
                <span>${a.target_type || '-'}</span>
                <span>${formatTime(a.created_at)}</span>
                <span><button class="btn btn-outline" onclick="viewDetails('${a.id}')">View</button></span>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading activity:', error);
    }
}

async function loadUsers() {
    try {
        const data = await api.getAdminUsers();
        
        document.getElementById('adminContent').innerHTML = `
            <div class="data-table">
                <div class="table-header">
                    <h3>All Users (${data.users?.length || 0})</h3>
                    <button class="btn btn-outline" onclick="exportData('users')">Export</button>
                </div>
                <div class="table-row header">
                    <span>User</span>
                    <span>Role</span>
                    <span>Status</span>
                    <span>Joined</span>
                    <span>Actions</span>
                </div>
                <div id="usersList"></div>
            </div>
        `;
        
        document.getElementById('usersList').innerHTML = data.users?.map(u => `
            <div class="table-row">
                <span>
                    <strong>${u.full_name || 'N/A'}</strong><br>
                    <small>${u.email}</small>
                </span>
                <span><span class="role-badge ${u.role}">${u.role}</span></span>
                <span>
                    <span class="status-badge ${u.is_suspended ? 'suspended' : 'active'}">
                        ${u.is_suspended ? 'Suspended' : 'Active'}
                    </span>
                </span>
                <span>${formatDate(u.created_at)}</span>
                <span>
                    ${!u.is_suspended ? 
                        `<button class="btn btn-outline" onclick="suspendUser('${u.id}')">Suspend</button>` :
                        `<button class="btn btn-outline" onclick="unsuspendUser('${u.id}')">Activate</button>`
                    }
                    <button class="btn btn-outline" onclick="deleteUser('${u.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </span>
            </div>
        `).join('') || '<p>No users found</p>';
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

async function loadVendors() {
    try {
        const data = await api.getAdminVendors();
        
        document.getElementById('adminContent').innerHTML = `
            <div class="data-table">
                <div class="table-header">
                    <h3>All Vendors (${data.vendors?.length || 0})</h3>
                    <button class="btn btn-outline" onclick="exportData('vendors')">Export</button>
                </div>
                <div class="table-row header">
                    <span>Business</span>
                    <span>Category</span>
                    <span>Status</span>
                    <span>Rating</span>
                    <span>Actions</span>
                </div>
                <div id="vendorsList"></div>
            </div>
        `;
        
        document.getElementById('vendorsList').innerHTML = data.vendors?.map(v => `
            <div class="table-row">
                <span>
                    <strong>${v.business_name}</strong><br>
                    <small>${v.owner_email || ''}</small>
                </span>
                <span>${v.category}</span>
                <span>
                    <span class="status-badge ${v.is_active ? 'active' : 'inactive'}">
                        ${v.is_active ? 'Active' : 'Inactive'}
                    </span>
                </span>
                <span>⭐ ${v.rating || 0} (${v.review_count || 0})</span>
                <span>
                    <button class="btn btn-outline" onclick="toggleVendor('${v.id}', ${v.is_active})">
                        ${v.is_active ? 'Deactivate' : 'Activate'}
                    </button>
                    <button class="btn btn-outline" onclick="viewVendor('${v.id}')">View</button>
                </span>
            </div>
        `).join('') || '<p>No vendors found</p>';
    } catch (error) {
        console.error('Error loading vendors:', error);
    }
}

async function loadProducts() {
    try {
        const data = await api.request('/admin/products');
        
        document.getElementById('adminContent').innerHTML = `
            <div class="data-table">
                <div class="table-header">
                    <h3>All Products (${data.products?.length || 0})</h3>
                    <input type="text" class="form-control" placeholder="Search products..." id="productSearch" oninput="filterProducts()" style="width: 250px;">
                </div>
                <div class="table-row header">
                    <span>Product</span>
                    <span>Vendor</span>
                    <span>Price</span>
                    <span>Status</span>
                    <span>Actions</span>
                </div>
                <div id="productsList"></div>
            </div>
        `;
        
        renderProductsList(data.products || []);
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

function renderProductsList(products) {
    document.getElementById('productsList').innerHTML = products.map(p => `
        <div class="table-row">
            <span><strong>${p.name}</strong></span>
            <span>${p.vendor_name || '-'}</span>
            <span>₱${p.price || 0}</span>
            <span>
                <span class="status-badge ${p.is_active ? 'active' : 'inactive'}">
                    ${p.is_active ? 'Active' : 'Hidden'}
                </span>
            </span>
            <span>
                <button class="btn btn-outline" onclick="toggleProduct('${p.id}', ${p.is_active})">
                    ${p.is_active ? 'Hide' : 'Show'}
                </button>
                <button class="btn btn-outline" onclick="deleteProduct('${p.id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </span>
        </div>
    `).join('');
}

async function loadReviews() {
    try {
        const data = await api.request('/admin/reviews');
        
        document.getElementById('adminContent').innerHTML = `
            <div class="data-table">
                <div class="table-header">
                    <h3>All Reviews (${data.reviews?.length || 0})</h3>
                </div>
                <div id="reviewsList"></div>
            </div>
        `;
        
        document.getElementById('reviewsList').innerHTML = data.reviews?.map(r => `
            <div class="review-card glass-card" style="margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between;">
                    <div>
                        <strong>${r.customer_name || 'Customer'}</strong> reviewed 
                        <strong>${r.vendor_name || 'Vendor'}</strong>
                    </div>
                    <div>
                        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        <span class="status-badge ${r.is_hidden ? 'hidden' : 'active'}">
                            ${r.is_hidden ? 'Hidden' : 'Visible'}
                        </span>
                    </div>
                </div>
                <p style="margin: 12px 0;">${r.comment || ''}</p>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-outline" onclick="toggleReview('${r.id}', ${r.is_hidden})">
                        ${r.is_hidden ? 'Unhide' : 'Hide'}
                    </button>
                    <button class="btn btn-outline" onclick="deleteReview('${r.id}')">Delete</button>
                </div>
            </div>
        `).join('') || '<p>No reviews found</p>';
    } catch (error) {
        console.error('Error loading reviews:', error);
    }
}

async function loadPosts() {
    try {
        const data = await api.request('/admin/posts');
        
        document.getElementById('adminContent').innerHTML = `
            <div class="data-table">
                <div class="table-header">
                    <h3>All Posts (${data.posts?.length || 0})</h3>
                </div>
                <div id="postsList"></div>
            </div>
        `;
        
        document.getElementById('postsList').innerHTML = data.posts?.map(p => `
            <div class="post-card glass-card" style="margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between;">
                    <strong>${p.user_name || 'User'}</strong>
                    <span>${formatTime(p.created_at)}</span>
                </div>
                <p style="margin: 12px 0;">${p.content || ''}</p>
                <div style="display: flex; gap: 8px;">
                    <span><i class="far fa-heart"></i> ${p.likes || 0}</span>
                    <span><i class="far fa-comment"></i> ${p.comment_count || 0}</span>
                    <button class="btn btn-outline" onclick="deletePost('${p.id}')">Delete</button>
                </div>
            </div>
        `).join('') || '<p>No posts found</p>';
    } catch (error) {
        console.error('Error loading posts:', error);
    }
}

function loadReports() {
    document.getElementById('adminContent').innerHTML = `
        <div class="data-table">
            <div class="table-header">
                <h3>Reported Content</h3>
            </div>
            <p style="padding: 40px; text-align: center;">No pending reports</p>
        </div>
    `;
}

function loadSettings() {
    document.getElementById('adminContent').innerHTML = `
        <div class="glass-card" style="padding: 32px;">
            <h2>Admin Settings</h2>
            
            <div class="settings-section">
                <h3>Platform Configuration</h3>
                <div class="form-group">
                    <label>Default Search Radius (km)</label>
                    <input type="number" class="form-control" value="10">
                </div>
                <div class="form-group">
                    <label>Max Upload Size (MB)</label>
                    <input type="number" class="form-control" value="5">
                </div>
            </div>
            
            <div class="settings-section">
                <h3>Moderation</h3>
                <div class="setting-item">
                    <span>Auto-hide flagged content</span>
                    <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
                </div>
                <div class="setting-item">
                    <span>Require approval for new vendors</span>
                    <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
            </div>
            
            <button class="btn btn-primary">Save Settings</button>
        </div>
    `;
}

// Admin Actions
async function suspendUser(userId) {
    const reason = prompt('Reason for suspension:');
    if (!reason) return;
    
    try {
        await api.suspendUser(userId, reason);
        app.showToast('User suspended', 'success');
        loadUsers();
    } catch (error) {
        app.showToast('Failed to suspend user', 'error');
    }
}

async function unsuspendUser(userId) {
    try {
        await api.request(`/admin/users/${userId}/unsuspend`, { method: 'POST' });
        app.showToast('User activated', 'success');
        loadUsers();
    } catch (error) {
        app.showToast('Failed to activate user', 'error');
    }
}

async function deleteUser(userId) {
    if (!confirm('Delete this user? This action cannot be undone.')) return;
    
    try {
        await api.request(`/admin/users/${userId}`, { method: 'DELETE' });
        app.showToast('User deleted', 'success');
        loadUsers();
    } catch (error) {
        app.showToast('Failed to delete user', 'error');
    }
}

async function toggleVendor(vendorId, currentStatus) {
    try {
        await api.toggleVendor(vendorId, !currentStatus);
        app.showToast(`Vendor ${currentStatus ? 'deactivated' : 'activated'}`, 'success');
        loadVendors();
    } catch (error) {
        app.showToast('Failed to update vendor', 'error');
    }
}

function formatTime(t) { return t ? new Date(t).toLocaleString() : ''; }
function formatDate(t) { return t ? new Date(t).toLocaleDateString() : ''; }
</script>

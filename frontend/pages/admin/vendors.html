<div class="admin-page">
    <div class="page-header glass-card">
        <h1>Vendor Management</h1>
        <div class="header-actions">
            <input type="text" class="form-control" placeholder="Search vendors..." id="vendorSearch" oninput="filterVendors()">
            <select class="form-control" id="statusFilter" onchange="filterVendors()">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="pending">Pending Verification</option>
            </select>
        </div>
    </div>

    <div class="vendors-table glass-card">
        <div class="table-header">
            <span>Business</span>
            <span>Owner</span>
            <span>Category</span>
            <span>Rating</span>
            <span>Status</span>
            <span>Actions</span>
        </div>
        <div id="vendorsList"></div>
    </div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); }
h1, h2, h3 { font-weight: 600; }
.admin-page { max-width: 1600px; margin: 0 auto; padding: 20px; }
.page-header { background: var(--surface); border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.header-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
.form-control { padding: 12px 18px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: 24px; font-size: 14px; outline: none; }
.form-control:focus { border-color: var(--primary); }
.vendors-table { background: var(--surface); border-radius: 24px; padding: 0; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
.vendors-table .table-header { display: grid; grid-template-columns: 2fr 1.5fr 1fr 0.8fr 1fr 1fr; padding: 16px 20px; background: rgba(15, 92, 47, 0.05); font-weight: 600; border-bottom: 1px solid var(--border); }
.vendor-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 0.8fr 1fr 1fr; padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); align-items: center; }
.vendor-row:hover { background: rgba(15, 92, 47, 0.02); }
.status-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.status-badge.active { background: rgba(22, 163, 74, 0.1); color: #16a34a; }
.status-badge.inactive { background: rgba(220, 38, 38, 0.1); color: #dc2626; }
.status-badge.pending { background: rgba(217, 119, 6, 0.1); color: #d97706; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.glass-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
@media (max-width: 1024px) { .vendors-table .table-header, .vendor-row { grid-template-columns: 1fr; gap: 8px; padding: 12px; } }
</style>

<script>
let allVendors = [];

document.addEventListener('DOMContentLoaded', loadVendors);

async function loadVendors() {
    try {
        const data = await api.getAdminVendors();
        allVendors = data.vendors || [];
        renderVendors(allVendors);
    } catch (error) {
        console.error('Error loading vendors:', error);
    }
}

function renderVendors(vendors) {
    const container = document.getElementById('vendorsList');
    container.innerHTML = vendors.map(v => `
        <div class="vendor-row">
            <div>
                <strong>${v.business_name}</strong><br>
                <small>${v.address?.substring(0, 30)}...</small>
            </div>
            <div>${v.owner_name || '-'}<br><small>${v.owner_email || ''}</small></div>
            <div>${v.category}</div>
            <div>⭐ ${v.rating || 0} (${v.review_count || 0})</div>
            <div>
                <span class="status-badge ${v.is_active ? 'active' : 'inactive'}">
                    ${v.is_active ? 'Active' : 'Inactive'}
                </span>
            </div>
            <div style="display: flex; gap: 4px;">
                <button class="btn btn-outline" onclick="toggleVendor('${v.id}', ${v.is_active})">
                    ${v.is_active ? 'Deactivate' : 'Activate'}
                </button>
                <button class="btn btn-outline" onclick="viewVendor('${v.id}')">View</button>
            </div>
        </div>
    `).join('');
}

function filterVendors() {
    const search = document.getElementById('vendorSearch').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    
    const filtered = allVendors.filter(v => {
        const matchesSearch = v.business_name.toLowerCase().includes(search) || 
                             v.owner_name?.toLowerCase().includes(search);
        const matchesStatus = !status || 
            (status === 'active' && v.is_active) || 
            (status === 'inactive' && !v.is_active);
        return matchesSearch && matchesStatus;
    });
    
    renderVendors(filtered);
}

async function toggleVendor(id, currentStatus) {
    await api.toggleVendor(id, !currentStatus);
    app.showToast(`Vendor ${currentStatus ? 'deactivated' : 'activated'}`, 'success');
    loadVendors();
}

function viewVendor(id) {
    window.location.href = `/pages/admin/vendor-detail.html?id=${id}`;
}
</script>

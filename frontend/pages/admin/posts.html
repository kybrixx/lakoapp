<div class="admin-page">
    <div class="page-header glass-card">
        <h1>Posts Management</h1>
        <div class="header-actions">
            <input type="text" class="form-control" placeholder="Search posts..." id="postSearch" oninput="filterPosts()">
            <select class="form-control" id="reportFilter" onchange="filterPosts()">
                <option value="">All Posts</option>
                <option value="reported">Reported Only</option>
                <option value="hidden">Hidden Only</option>
            </select>
        </div>
    </div>

    <div id="postsList" class="posts-list"></div>
    <div class="pagination" id="pagination"></div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); }
h1, h2, h3 { font-weight: 600; }
.admin-page { max-width: 1200px; margin: 0 auto; padding: 20px; }
.page-header { background: var(--surface); border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.header-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
.form-control { padding: 12px 18px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: 24px; font-size: 14px; outline: none; }
.form-control:focus { border-color: var(--primary); }
.posts-list { display: flex; flex-direction: column; gap: 16px; }
.post-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.post-author { display: flex; align-items: center; gap: 12px; }
.post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.post-content { margin: 16px 0; line-height: 1.6; }
.post-images { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
.post-images img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; cursor: pointer; }
.post-footer { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
.post-actions { display: flex; gap: 8px; margin-top: 16px; }
.reported-badge { background: rgba(220, 38, 38, 0.1); color: #dc2626; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.hidden-badge { background: rgba(0,0,0,0.05); color: var(--text-secondary); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.glass-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
@media (max-width: 768px) { .post-header { flex-direction: column; } .post-images { gap: 6px; } }
</style>

<script>
let allPosts = [];
let currentPage = 1;

document.addEventListener('DOMContentLoaded', loadPosts);

async function loadPosts() {
    try {
        const data = await api.get_all_posts();
        allPosts = data.posts || [];
        renderPosts();
    } catch (error) {
        console.error('Error loading posts:', error);
    }
}

function renderPosts() {
    const filtered = getFilteredPosts();
    const container = document.getElementById('postsList');
    
    if (!filtered.length) {
        container.innerHTML = '<p class="glass-card" style="padding: 40px; text-align: center;">No posts found</p>';
        return;
    }
    
    container.innerHTML = filtered.map(post => `
        <div class="post-card glass-card">
            <div class="post-header">
                <div class="post-author">
                    <div class="post-avatar">${post.user_name?.charAt(0) || 'U'}</div>
                    <div>
                        <strong>${post.user_name || 'User'}</strong>
                        <div style="font-size: 12px; color: var(--text-secondary);">${formatTime(post.created_at)}</div>
                    </div>
                </div>
                <div>
                    ${post.reported ? '<span class="reported-badge"><i class="fas fa-flag"></i> Reported</span>' : ''}
                    ${post.is_hidden ? '<span class="hidden-badge"><i class="fas fa-eye-slash"></i> Hidden</span>' : ''}
                </div>
            </div>
            <div class="post-content">${escapeHtml(post.content)}</div>
            ${post.images ? `
                <div class="post-images">
                    ${JSON.parse(post.images).map(img => `<img src="${img}" onclick="viewImage('${img}')">`).join('')}
                </div>
            ` : ''}
            <div class="post-footer">
                <span><i class="far fa-heart"></i> ${post.likes || 0} likes</span>
                <span><i class="far fa-comment"></i> ${post.comment_count || 0} comments</span>
                <span><i class="far fa-flag"></i> ${post.report_count || 0} reports</span>
            </div>
            <div class="post-actions">
                <button class="btn btn-outline" onclick="viewPost('${post.id}')">View</button>
                <button class="btn btn-outline" onclick="toggleHidePost('${post.id}', ${post.is_hidden})">
                    ${post.is_hidden ? 'Unhide' : 'Hide'}
                </button>
                <button class="btn btn-outline" onclick="deletePost('${post.id}')">Delete</button>
                ${post.reported ? `<button class="btn btn-outline" onclick="clearReports('${post.id}')">Clear Reports</button>` : ''}
            </div>
        </div>
    `).join('');
}

function getFilteredPosts() {
    const search = document.getElementById('postSearch').value.toLowerCase();
    const reportFilter = document.getElementById('reportFilter').value;
    
    return allPosts.filter(p => {
        const matchesSearch = p.content?.toLowerCase().includes(search) ||
                             p.user_name?.toLowerCase().includes(search);
        const matchesFilter = !reportFilter ||
            (reportFilter === 'reported' && p.reported) ||
            (reportFilter === 'hidden' && p.is_hidden);
        return matchesSearch && matchesFilter;
    });
}

function filterPosts() {
    renderPosts();
}

async function toggleHidePost(id, currentStatus) {
    try {
        await api.request(`/admin/posts/${id}/toggle`, {
            method: 'POST',
            body: JSON.stringify({ is_hidden: !currentStatus })
        });
        
        const post = allPosts.find(p => p.id === id);
        if (post) post.is_hidden = !currentStatus;
        
        renderPosts();
        showToast(`Post ${currentStatus ? 'unhidden' : 'hidden'}`, 'success');
    } catch (error) {
        showToast('Failed to update post', 'error');
    }
}

async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    
    try {
        await api.delete_post(id);
        allPosts = allPosts.filter(p => p.id !== id);
        renderPosts();
        showToast('Post deleted', 'success');
    } catch (error) {
        showToast('Failed to delete', 'error');
    }
}

async function clearReports(id) {
    try {
        await api.request(`/admin/posts/${id}/clear-reports`, { method: 'POST' });
        const post = allPosts.find(p => p.id === id);
        if (post) post.reported = false;
        renderPosts();
        showToast('Reports cleared', 'success');
    } catch (error) {
        showToast('Failed to clear reports', 'error');
    }
}

function viewPost(id) {
    window.location.href = `/pages/customer/post-detail.html?id=${id}`;
}
</script>

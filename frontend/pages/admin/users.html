<div class="admin-page">
    <div class="page-header glass-card">
        <h1>User Management</h1>
        <div class="header-actions">
            <input type="text" class="form-control" placeholder="Search users..." id="userSearch" oninput="filterUsers()">
            <select class="form-control" id="roleFilter" onchange="filterUsers()">
                <option value="">All Roles</option>
                <option value="customer">Customers</option>
                <option value="vendor">Vendors</option>
                <option value="admin">Admins</option>
            </select>
        </div>
    </div>

    <div class="users-grid" id="usersGrid"></div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); }
h1, h2, h3 { font-weight: 600; }
.admin-page { max-width: 1600px; margin: 0 auto; padding: 20px; }
.page-header { background: var(--surface); border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.header-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
.form-control { padding: 12px 18px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: 24px; font-size: 14px; outline: none; }
.form-control:focus { border-color: var(--primary); }
.users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.user-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.user-header { display: flex; gap: 16px; margin-bottom: 16px; }
.user-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 700; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-weight: 600; font-size: 16px; }
.user-email { color: var(--text-secondary); font-size: 13px; margin-top: 4px; word-break: break-all; }
.user-role { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-top: 8px; }
.user-role.customer { background: rgba(2, 132, 199, 0.1); color: #0284c7; }
.user-role.vendor { background: rgba(22, 163, 74, 0.1); color: #16a34a; }
.user-role.admin { background: rgba(217, 119, 6, 0.1); color: #d97706; }
.user-stats { display: flex; gap: 16px; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.user-stat { text-align: center; flex: 1; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.user-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 14px; transition: all 0.2s; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.glass-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
@media (max-width: 768px) { .users-grid { grid-template-columns: 1fr; } .header-actions { flex-wrap: wrap; } }
</style>

<script>
let allUsers = [];

document.addEventListener('DOMContentLoaded', loadUsers);

async function loadUsers() {
    try {
        const data = await api.getAdminUsers();
        allUsers = data.users || [];
        renderUsers(allUsers);
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

function renderUsers(users) {
    const grid = document.getElementById('usersGrid');
    grid.innerHTML = users.map(u => `
        <div class="user-card glass-card">
            <div class="user-header">
                <div class="user-avatar">${u.full_name?.charAt(0) || u.email?.charAt(0) || 'U'}</div>
                <div class="user-info">
                    <div class="user-name">${u.full_name || 'No Name'}</div>
                    <div class="user-email">${u.email}</div>
                    <span class="user-role ${u.role}">${u.role}</span>
                </div>
            </div>
            <div class="user-stats">
                <div class="user-stat"><div class="stat-num">${u.review_count || 0}</div><div class="stat-label">Reviews</div></div>
                <div class="user-stat"><div class="stat-num">${u.post_count || 0}</div><div class="stat-label">Posts</div></div>
                <div class="user-stat"><div class="stat-num">${u.offense_count || 0}</div><div class="stat-label">Offenses</div></div>
            </div>
            <div class="user-actions">
                ${u.is_suspended ? 
                    `<button class="btn btn-outline" onclick="unsuspendUser('${u.id}')">Activate</button>` :
                    `<button class="btn btn-outline" onclick="suspendUser('${u.id}')">Suspend</button>`
                }
                <button class="btn btn-outline" onclick="viewUser('${u.id}')">View</button>
                <button class="btn btn-outline" onclick="deleteUser('${u.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function filterUsers() {
    const search = document.getElementById('userSearch').value.toLowerCase();
    const role = document.getElementById('roleFilter').value;
    
    const filtered = allUsers.filter(u => 
        (u.full_name?.toLowerCase().includes(search) || u.email?.toLowerCase().includes(search)) &&
        (!role || u.role === role)
    );
    
    renderUsers(filtered);
}

async function suspendUser(id) {
    const reason = prompt('Reason for suspension:');
    if (!reason) return;
    await api.suspendUser(id, reason);
    app.showToast('User suspended', 'success');
    loadUsers();
}

async function unsuspendUser(id) {
    await api.request(`/admin/users/${id}/unsuspend`, { method: 'POST' });
    app.showToast('User activated', 'success');
    loadUsers();
}

async function deleteUser(id) {
    if (!confirm('Delete this user permanently?')) return;
    await api.request(`/admin/users/${id}`, { method: 'DELETE' });
    app.showToast('User deleted', 'success');
    loadUsers();
}

function viewUser(id) {
    window.location.href = `/pages/admin/user-detail.html?id=${id}`;
}
</script>

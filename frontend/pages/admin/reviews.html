<div class="admin-page">
    <div class="page-header glass-card">
        <h1>Reviews Management</h1>
        <div class="header-actions">
            <input type="text" class="form-control" placeholder="Search reviews..." id="reviewSearch" oninput="filterReviews()">
            <select class="form-control" id="ratingFilter" onchange="filterReviews()">
                <option value="">All Ratings</option>
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
                <option value="3">3 Stars</option>
                <option value="2">2 Stars</option>
                <option value="1">1 Star</option>
            </select>
            <select class="form-control" id="statusFilter" onchange="filterReviews()">
                <option value="">All Status</option>
                <option value="hidden">Hidden</option>
                <option value="reported">Reported</option>
            </select>
        </div>
    </div>

    <div id="reviewsList" class="reviews-list"></div>
    <div class="pagination" id="pagination"></div>
</div>

<style>
.admin-page { max-width: 900px; margin: 0 auto; padding: 20px; }
.reviews-list { display: flex; flex-direction: column; gap: 16px; }
.review-card { padding: 20px; }
.review-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
.reviewer { display: flex; align-items: center; gap: 12px; }
.reviewer-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.review-info { flex: 1; }
.review-vendor { font-size: 13px; color: var(--primary); cursor: pointer; }
.review-rating { color: #fbbf24; }
.review-content { margin: 12px 0; }
.review-actions { display: flex; gap: 8px; margin-top: 16px; }
.reported-tag { background: rgba(220,38,38,0.1); color: #dc2626; padding: 2px 8px; border-radius: 40px; font-size: 11px; margin-left: 8px; }
</style>

<script>
let allReviews = [];
let currentPage = 1;

document.addEventListener('DOMContentLoaded', loadReviews);

async function loadReviews() {
    try {
        const data = await api.get_all_reviews();
        allReviews = data.reviews || [];
        renderReviews();
    } catch (error) {
        console.error('Error loading reviews:', error);
    }
}

function renderReviews() {
    const filtered = getFilteredReviews();
    const container = document.getElementById('reviewsList');
    
    if (!filtered.length) {
        container.innerHTML = '<p class="glass-card" style="padding: 40px; text-align: center;">No reviews found</p>';
        return;
    }
    
    container.innerHTML = filtered.map(r => `
        <div class="review-card glass-card">
            <div class="review-header">
                <div class="reviewer">
                    <div class="reviewer-avatar">${r.customer_name?.charAt(0) || 'C'}</div>
                    <div class="review-info">
                        <strong>${r.customer_name || 'Customer'}</strong>
                        <div class="review-vendor" onclick="viewVendor('${r.vendor_id}')">
                            <i class="fas fa-store"></i> ${r.vendor_name || 'Vendor'}
                        </div>
                    </div>
                </div>
                <div>
                    <span class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                    ${r.reported ? '<span class="reported-tag"><i class="fas fa-flag"></i> Reported</span>' : ''}
                    ${r.is_hidden ? '<span class="reported-tag">Hidden</span>' : ''}
                </div>
            </div>
            ${r.title ? `<h4>${r.title}</h4>` : ''}
            <div class="review-content">${r.comment || ''}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${formatTime(r.created_at)}</div>
            <div class="review-actions">
                <button class="btn btn-outline" onclick="toggleHideReview('${r.id}', ${r.is_hidden})">
                    ${r.is_hidden ? 'Unhide' : 'Hide'}
                </button>
                <button class="btn btn-outline" onclick="deleteReview('${r.id}')">Delete</button>
                ${r.reported ? `<button class="btn btn-outline" onclick="clearReports('${r.id}')">Clear Reports</button>` : ''}
            </div>
        </div>
    `).join('');
}

function getFilteredReviews() {
    const search = document.getElementById('reviewSearch').value.toLowerCase();
    const rating = document.getElementById('ratingFilter').value;
    const status = document.getElementById('statusFilter').value;
    
    return allReviews.filter(r => {
        const matchesSearch = r.comment?.toLowerCase().includes(search) ||
                             r.customer_name?.toLowerCase().includes(search) ||
                             r.vendor_name?.toLowerCase().includes(search);
        const matchesRating = !rating || r.rating === parseInt(rating);
        const matchesStatus = !status ||
            (status === 'hidden' && r.is_hidden) ||
            (status === 'reported' && r.reported);
        return matchesSearch && matchesRating && matchesStatus;
    });
}

function filterReviews() {
    renderReviews();
}

async function toggleHideReview(id, currentStatus) {
    try {
        await api.hide_review(id, !currentStatus);
        const review = allReviews.find(r => r.id === id);
        if (review) review.is_hidden = !currentStatus;
        renderReviews();
        showToast(`Review ${currentStatus ? 'unhidden' : 'hidden'}`, 'success');
    } catch (error) {
        showToast('Failed to update review', 'error');
    }
}

async function deleteReview(id) {
    if (!confirm('Delete this review?')) return;
    
    try {
        await api.delete_review(id);
        allReviews = allReviews.filter(r => r.id !== id);
        renderReviews();
        showToast('Review deleted', 'success');
    } catch (error) {
        showToast('Failed to delete', 'error');
    }
}

async function clearReports(id) {
    try {
        await api.request(`/admin/reviews/${id}/clear-reports`, { method: 'POST' });
        const review = allReviews.find(r => r.id === id);
        if (review) review.reported = false;
        renderReviews();
        showToast('Reports cleared', 'success');
    } catch (error) {
        showToast('Failed to clear reports', 'error');
    }
}

function viewVendor(id) {
    window.location.href = `/pages/admin/vendor-detail.html?id=${id}`;
}
</script>

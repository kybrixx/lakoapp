<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Lako</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="/pages/login.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
                <h1>Reset Password</h1>
                <p class="auth-subtitle">Enter your email to receive a reset link</p>
            </div>

            <div id="messageContainer" class="message-container" style="display: none;"></div>

            <!-- Step 1: Request Reset -->
            <form id="requestForm" onsubmit="requestReset(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="resetEmail" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <!-- Step 2: Set New Password (Hidden by default) -->
            <form id="resetForm" style="display: none;" onsubmit="confirmReset(event)">
                <input type="hidden" id="resetToken">
                
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-check"></i> Reset Password
                </button>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="/pages/login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <style>
        .input-icon {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
        }
        
        .input-icon input {
            padding-left: 44px;
        }
        
        .message-container {
            padding: 14px 18px;
            border-radius: 24px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .message-container.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .message-container.error {
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        
        .strength-bar.weak {
            width: 33%;
            background: #dc2626;
        }
        
        .strength-bar.medium {
            width: 66%;
            background: #eab308;
        }
        
        .strength-bar.strong {
            width: 100%;
            background: #10b981;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .back-link:hover {
            color: var(--primary);
        }
    </style>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        // Check if we have a token in URL (from email link)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            document.getElementById('requestForm').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
            document.getElementById('resetToken').value = token;
            document.querySelector('.auth-subtitle').textContent = 'Enter your new password';
        }
        
        // Password strength checker
        document.getElementById('newPassword')?.addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.querySelector('.strength-bar') || document.createElement('div');
            
            if (!document.querySelector('.strength-bar')) {
                strengthBar.className = 'strength-bar';
                document.getElementById('passwordStrength').appendChild(strengthBar);
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'strength-bar';
            if (strength <= 2) strengthBar.classList.add('weak');
            else if (strength <= 4) strengthBar.classList.add('medium');
            else strengthBar.classList.add('strong');
        });
        
        async function requestReset(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            const messageContainer = document.getElementById('messageContainer');
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            try {
                await api.request('/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });
                
                showMessage('Password reset link has been sent to your email!', 'success');
                document.getElementById('requestForm').reset();
                
                // Show resend option after 30 seconds
                setTimeout(() => {
                    messageContainer.innerHTML += '<p style="margin-top:12px;">Didn\'t receive the email? <a href="#" onclick="requestReset(event)">Resend</a></p>';
                }, 30000);
                
            } catch (error) {
                showMessage(error.message || 'Failed to send reset link', 'error');
            }
        }
        
        async function confirmReset(e) {
            e.preventDefault();
            
            const token = document.getElementById('resetToken').value;
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                await api.request('/auth/reset-password/confirm', {
                    method: 'POST',
                    body: JSON.stringify({ token, password })
                });
                
                showMessage('Password reset successful! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/pages/login.html';
                }, 2000);
                
            } catch (error) {
                showMessage(error.message || 'Failed to reset password', 'error');
            }
        }
        
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.className = `message-container ${type}`;
            container.style.display = 'flex';
        }
    </script>
</body>
</html>

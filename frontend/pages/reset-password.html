<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lako - Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/universal.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(125deg, #e2ece2 0%, #cde0cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        h1 { font-size: 32px; font-weight: 600; color: #1a2a1f; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #5a6e5a; font-size: 14px; margin-bottom: 36px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #1a2a1f; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 28px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #0f5c2f; background: white; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #0f5c2f; color: white; }
        .message {
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .message.success { background: rgba(16,185,129,0.1); color: #10b981; }
        .message.error { background: rgba(220,38,38,0.1); color: #dc2626; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #0f5c2f; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>reset password</h1>
        <div class="subtitle">Enter your email to receive a reset link</div>
        <div id="message" class="message"></div>
        <form onsubmit="requestReset(event)">
            <div class="form-group">
                <label>email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary">send reset link →</button>
        </form>
        <a href="login.html" class="back-link">← back to login</a>
    </div>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function requestReset(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');
            
            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                msgDiv.textContent = 'Reset link sent! Check your email.';
                msgDiv.className = 'message success';
                msgDiv.style.display = 'block';
            } catch (e) {
                msgDiv.textContent = 'Failed to send reset link';
                msgDiv.className = 'message error';
                msgDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>

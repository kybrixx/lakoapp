<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f5c2f">
    <link rel="manifest" href="/manifest.json">
    <title>Lako - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/universal.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(125deg, #e2ece2 0%, #cde0cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        h1 { font-size: 32px; font-weight: 600; color: #1a2a1f; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #5a6e5a; font-size: 14px; margin-bottom: 36px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #1a2a1f; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 28px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #0f5c2f; background: white; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #0f5c2f; color: white; }
        .btn-secondary { background: rgba(0,0,0,0.04); color: #1a2a1f; margin-top: 12px; border: 1px solid rgba(0,0,0,0.06); }
        .error {
            background: rgba(198,40,40,0.1);
            color: #b91c1c;
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .form-actions { text-align: right; margin-bottom: 24px; }
        .forgot-link { color: #0f5c2f; text-decoration: none; font-size: 13px; }
        .auth-footer { margin-top: 24px; text-align: center; }
        .auth-footer p { color: #5a6e5a; font-size: 13px; margin-bottom: 12px; }
        .auth-switch { text-align: center; margin-top: 24px; }
        .auth-switch a { color: #0f5c2f; text-decoration: none; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>sign in</h1>
        <div class="subtitle">welcome back.</div>
        <div id="loginError" class="error"></div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-actions">
                <a href="reset-password.html" class="forgot-link">forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary">continue →</button>
        </form>
        <button class="btn btn-secondary" onclick="goToRegister()">create account</button>
        <div class="auth-switch"><a onclick="switchRole()">← switch role</a></div>
    </div>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user_role', data.role);
                    const redirects = { customer: 'customer/dashboard.html', vendor: 'vendor/dashboard.html', admin: 'admin/dashboard.html' };
                    window.location.href = redirects[data.role] || '../';
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Network error';
                errorDiv.style.display = 'block';
            }
        }
        function goToRegister() {
            const role = localStorage.getItem('user_role') || 'customer';
            window.location.href = role === 'vendor' ? 'register.html?type=vendor' : 'register.html';
        }
        function switchRole() { localStorage.removeItem('user_role'); window.location.href = '../'; }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>

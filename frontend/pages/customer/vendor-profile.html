<div class="vendor-profile-page">
    <button class="btn btn-outline back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <div id="vendorContent"></div>
</div>

<style>
.vendor-profile-page { max-width: 1000px; margin: 0 auto; padding: 20px; }
.back-btn { margin-bottom: 20px; }
.cover-image { height: 200px; border-radius: 24px; overflow: hidden; margin-bottom: -40px; position: relative; }
.cover-image img { width: 100%; height: 100%; object-fit: cover; }
.profile-header { padding: 0 24px 24px; }
.profile-logo-container { display: flex; align-items: flex-end; gap: 20px; margin-top: -20px; }
.profile-logo { width: 100px; height: 100px; border-radius: 20px; border: 4px solid white; object-fit: cover; background: white; }
.profile-title { flex: 1; }
.profile-title h1 { margin-bottom: 4px; }
.profile-category { color: var(--primary); font-size: 14px; margin-bottom: 8px; }
.profile-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.stars { color: #fbbf24; font-size: 18px; }
.action-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 20px 0; }
.info-item { display: flex; align-items: center; gap: 8px; }
.info-item i { width: 20px; color: var(--primary); }
.products-section { padding: 24px; margin-bottom: 24px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 16px; }
.product-card { padding: 16px; cursor: pointer; transition: all 0.2s; }
.product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
.product-name { font-weight: 600; margin-bottom: 4px; }
.product-price { font-size: 18px; font-weight: 700; color: var(--primary); }
.product-rating { font-size: 12px; color: var(--text-secondary); }
.reviews-section { padding: 24px; }
.review-card { padding: 20px; margin-bottom: 16px; }
.review-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.reviewer { display: flex; align-items: center; gap: 8px; }
.reviewer-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.review-content { margin: 12px 0; }
.review-images { display: flex; gap: 8px; margin-top: 12px; }
.review-images img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; cursor: pointer; }
.review-actions { display: flex; gap: 16px; margin-top: 12px; }
.gallery-section { padding: 24px; margin-bottom: 24px; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
.gallery-item { aspect-ratio: 1; border-radius: 16px; overflow: hidden; cursor: pointer; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.gallery-item:hover img { transform: scale(1.05); }
.traffic-card { padding: 20px; margin-bottom: 24px; }
.traffic-stats { display: flex; gap: 24px; margin-top: 16px; }
.traffic-stat { text-align: center; }
.traffic-value { font-size: 28px; font-weight: 700; color: var(--primary); }
.traffic-label { font-size: 13px; color: var(--text-secondary); }
.peak-hours { margin-top: 16px; }
.peak-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.image-viewer { width: 90%; max-width: 800px; }
.image-viewer img { width: 100%; border-radius: 16px; }
@media (max-width: 768px) {
    .profile-logo-container { flex-direction: column; align-items: center; text-align: center; }
    .info-grid { grid-template-columns: 1fr; }
}
</style>

<script>
let vendorId = null;
let vendorData = null;
let isShortlisted = false;

document.addEventListener('DOMContentLoaded', () => {
    vendorId = getQueryParam('id');
    if (vendorId) loadVendorProfile();
});

async function loadVendorProfile() {
    try {
        const data = await api.getVendor(vendorId);
        vendorData = data;
        isShortlisted = data.is_shortlisted || false;
        renderVendorProfile(data);
        logView();
    } catch (error) {
        console.error('Error loading vendor:', error);
        showToast('Failed to load vendor profile', 'error');
    }
}

async function logView() {
    try {
        await api.request('/track/view', {
            method: 'POST',
            body: JSON.stringify({ vendor_id: vendorId })
        });
    } catch (error) {
        console.error('Error logging view:', error);
    }
}

function renderVendorProfile(data) {
    const vendor = data.vendor;
    const products = data.products || [];
    const reviews = data.reviews || [];
    const posts = data.posts || [];
    
    const content = `
        <div class="glass-card" style="overflow: hidden; margin-bottom: 24px;">
            <div class="cover-image">
                <img src="${vendor.cover_image || '/assets/images/default-cover.jpg'}" alt="Cover">
            </div>
            <div class="profile-header">
                <div class="profile-logo-container">
                    <img src="${vendor.logo || '/assets/images/default-vendor.png'}" class="profile-logo" alt="${vendor.business_name}">
                    <div class="profile-title">
                        <h1>${vendor.business_name}</h1>
                        <div class="profile-category">${vendor.category} ${vendor.subcategory ? '· ' + vendor.subcategory : ''}</div>
                        <div class="profile-rating">
                            <span class="stars">${'★'.repeat(Math.floor(vendor.rating || 0))}${'☆'.repeat(5 - Math.floor(vendor.rating || 0))}</span>
                            <span>${vendor.rating || 0} (${vendor.review_count || 0} reviews)</span>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="chatWithVendor('${vendor.id}')">
                        <i class="fas fa-comment"></i> Chat
                    </button>
                    <button class="btn btn-outline" onclick="callVendor('${vendor.phone}')">
                        <i class="fas fa-phone"></i> Call
                    </button>
                    <button class="btn btn-outline" onclick="toggleShortlist('${vendor.id}')">
                        <i class="fas fa-bookmark"></i> ${isShortlisted ? 'Saved' : 'Save'}
                    </button>
                    <button class="btn btn-outline" onclick="shareVendor('${vendor.id}')">
                        <i class="fas fa-share"></i> Share
                    </button>
                    <button class="btn btn-outline" onclick="viewOnMap(${vendor.latitude}, ${vendor.longitude})">
                        <i class="fas fa-map-marker-alt"></i> View on Map
                    </button>
                </div>
                
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> ${vendor.address || 'Address not set'}</div>
                    <div class="info-item"><i class="fas fa-phone"></i> ${vendor.phone || 'No phone'}</div>
                    <div class="info-item"><i class="fas fa-envelope"></i> ${vendor.email || 'No email'}</div>
                    <div class="info-item"><i class="fas fa-globe"></i> ${vendor.website || 'No website'}</div>
                </div>
                
                <div class="business-hours">
                    <h4><i class="fas fa-clock"></i> Business Hours</h4>
                    <p>${vendor.business_hours || 'Hours not set'}</p>
                </div>
                
                <div class="description">
                    <h4>About</h4>
                    <p>${vendor.description || 'No description available.'}</p>
                </div>
            </div>
        </div>
        
        ${vendor.is_verified ? '' : `
            <div class="glass-card" style="padding: 16px 24px; margin-bottom: 24px; background: rgba(234,179,8,0.1);">
                <i class="fas fa-info-circle"></i> This vendor is pending verification.
            </div>
        `}
        
        <div class="traffic-card glass-card">
            <h3><i class="fas fa-chart-line"></i> Foot Traffic</h3>
            <div class="traffic-stats">
                <div class="traffic-stat">
                    <div class="traffic-value">${vendor.traffic_count || 0}</div>
                    <div class="traffic-label">Total Views</div>
                </div>
                <div class="traffic-stat">
                    <div class="traffic-value">${getTrafficLevel(vendor.traffic_count || 0)}</div>
                    <div class="traffic-label">Traffic Level</div>
                </div>
            </div>
            <div class="peak-hours" id="peakHours"></div>
        </div>
        
        ${posts.length ? `
            <div class="gallery-section glass-card">
                <h3><i class="fas fa-newspaper"></i> Recent Posts</h3>
                <div class="gallery-grid">
                    ${posts.slice(0, 6).map(post => `
                        <div class="gallery-item" onclick="viewPost('${post.id}')">
                            ${post.image ? `<img src="${post.image}" alt="Post">` : '<div style="height:100%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.02);">📝</div>'}
                        </div>
                    `).join('')}
                </div>
                ${posts.length > 6 ? `<button class="btn btn-outline" style="margin-top:16px;" onclick="viewAllPosts('${vendor.id}')">View All Posts</button>` : ''}
            </div>
        ` : ''}
        
        <div class="products-section glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="fas fa-box"></i> Products (${products.length})</h3>
                <button class="btn btn-outline" onclick="viewAllProducts('${vendor.id}')">View All</button>
            </div>
            <div class="products-grid">
                ${products.slice(0, 6).map(p => `
                    <div class="product-card" onclick="viewProduct('${p.id}')">
                        <img src="${p.image || '/assets/images/placeholder.jpg'}" alt="${p.name}">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">₱${p.price || 0}</div>
                        <div class="product-rating">⭐ ${p.rating || 0} (${p.review_count || 0})</div>
                    </div>
                `).join('') || '<p>No products yet</p>'}
            </div>
        </div>
        
        <div class="reviews-section glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3><i class="fas fa-star"></i> Reviews (${reviews.length})</h3>
                <button class="btn btn-primary" onclick="writeReview('${vendor.id}')">Write Review</button>
            </div>
            ${reviews.length ? reviews.slice(0, 5).map(r => renderReviewCard(r)).join('') : '<p>No reviews yet. Be the first to review!</p>'}
            ${reviews.length > 5 ? `<button class="btn btn-outline" onclick="viewAllReviews('${vendor.id}')">See All Reviews</button>` : ''}
        </div>
    `;
    
    document.getElementById('vendorContent').innerHTML = content;
    
    // Load peak hours
    if (vendor.traffic_count > 0) {
        loadPeakHours();
    }
}

function renderReviewCard(review) {
    return `
        <div class="review-card glass-card">
            <div class="review-header">
                <div class="reviewer">
                    <div class="reviewer-avatar">${review.customer_name?.charAt(0) || 'C'}</div>
                    <div>
                        <strong>${review.customer_name || 'Customer'}</strong>
                        <div style="color: #fbbf24;">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                    </div>
                </div>
                <span style="font-size: 12px; color: var(--text-secondary);">${formatTime(review.created_at)}</span>
            </div>
            ${review.title ? `<h4>${review.title}</h4>` : ''}
            <div class="review-content">${review.comment || ''}</div>
            ${review.images ? `
                <div class="review-images">
                    ${JSON.parse(review.images).map(img => `<img src="${img}" onclick="viewImage('${img}')">`).join('')}
                </div>
            ` : ''}
            <div class="review-actions">
                <button class="btn btn-outline" onclick="helpfulReview('${review.id}')">
                    <i class="far fa-thumbs-up"></i> Helpful (${review.helpful_count || 0})
                </button>
            </div>
        </div>
    `;
}

function getTrafficLevel(count) {
    if (count > 1000) return 'High';
    if (count > 500) return 'Medium';
    return 'Low';
}

async function loadPeakHours() {
    try {
        const data = await api.request(`/vendor/traffic/insights?vendor_id=${vendorId}`);
        const peakHours = data.peak_hours || [];
        
        const container = document.getElementById('peakHours');
        if (peakHours.length) {
            container.innerHTML = `
                <h4 style="margin: 16px 0 8px;">Peak Hours</h4>
                ${peakHours.map(p => `
                    <div class="peak-item">
                        <span>${p.hour}:00</span>
                        <span><strong>${p.count}</strong> visitors</span>
                    </div>
                `).join('')}
            `;
        }
    } catch (error) {
        console.error('Error loading peak hours:', error);
    }
}

async function toggleShortlist(vendorId) {
    try {
        if (isShortlisted) {
            await api.removeFromShortlist(vendorId);
            showToast('Removed from shortlist', 'success');
        } else {
            await api.addToShortlist(vendorId);
            showToast('Added to shortlist', 'success');
        }
        isShortlisted = !isShortlisted;
        loadVendorProfile();
    } catch (error) {
        showToast('Failed to update shortlist', 'error');
    }
}

function chatWithVendor(id) {
    if (!auth.isAuthenticated()) {
        showToast('Please login to chat', 'info');
        window.location.href = '/pages/login.html';
        return;
    }
    window.location.href = `/pages/customer/chat.html?vendor=${id}`;
}

function callVendor(phone) {
    if (phone) window.location.href = `tel:${phone}`;
    else showToast('No phone number available', 'info');
}

function shareVendor(id) {
    const url = `${window.location.origin}/pages/guest/vendor-profile.html?id=${id}`;
    if (navigator.share) {
        navigator.share({ title: vendorData.vendor.business_name, url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!', 'success');
    }
}

function viewOnMap(lat, lng) {
    if (lat && lng) {
        window.location.href = `/pages/customer/map.html?lat=${lat}&lng=${lng}`;
    } else {
        showToast('Location not available', 'info');
    }
}

function viewProduct(id) {
    window.location.href = `/pages/customer/product-detail.html?id=${id}`;
}

function viewAllProducts(vendorId) {
    window.location.href = `/pages/customer/vendor-catalog.html?id=${vendorId}`;
}

function writeReview(vendorId) {
    if (!auth.isAuthenticated()) {
        showToast('Please login to write a review', 'info');
        window.location.href = '/pages/login.html';
        return;
    }
    window.location.href = `/pages/customer/write-review.html?vendor=${vendorId}`;
}

function viewAllReviews(vendorId) {
    window.location.href = `/pages/customer/vendor-reviews.html?id=${vendorId}`;
}

function viewPost(id) {
    window.location.href = `/pages/customer/post-detail.html?id=${id}`;
}

function viewAllPosts(vendorId) {
    window.location.href = `/pages/customer/vendor-posts.html?id=${vendorId}`;
}

function viewImage(url) {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-content image-viewer">
            <button class="close-btn" onclick="this.closest('.modal').remove()" style="position:absolute; top:16px; right:16px; background:white; border:none; width:40px; height:40px; border-radius:50%; font-size:24px; cursor:pointer;">&times;</button>
            <img src="${url}" alt="Full size">
        </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
    });
}

async function helpfulReview(reviewId) {
    if (!auth.isAuthenticated()) {
        showToast('Please login to vote', 'info');
        return;
    }
    
    try {
        await api.request(`/reviews/${reviewId}/helpful`, { method: 'POST' });
        showToast('Thanks for your feedback!', 'success');
        loadVendorProfile();
    } catch (error) {
        console.error('Error marking helpful:', error);
    }
}

function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return date.toLocaleDateString();
}
</script>

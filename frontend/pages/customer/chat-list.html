<div class="chat-list-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>Messages</h1>
        <button class="btn btn-outline" onclick="syncService.cache()">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div class="search-bar glass-card">
        <i class="fas fa-search"></i>
        <input type="text" id="searchChats" placeholder="Search conversations..." class="form-control" oninput="filterConversations()">
    </div>

    <div id="conversationsList" class="conversations-list"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 { font-weight: 600; }

.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }

.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }

.form-control {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.6);
  color: var(--text-primary);
  transition: all 0.3s;
}

.form-control:focus { outline: none; border-color: var(--primary); background: var(--surface); }

.chat-list-page { max-width: 700px; margin: 0 auto; padding: 20px; }

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  margin-bottom: 24px;
}

.page-header h1 { flex: 1; font-size: 24px; }

.search-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  margin-bottom: 20px;
}

.search-bar input {
  background: transparent;
  border: none;
  flex: 1;
}

.conversations-list { display: flex; flex-direction: column; gap: 8px; }

.conversation-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.conversation-item:hover { transform: translateX(4px); }

.conversation-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 20px;
  flex-shrink: 0;
}

.conversation-info { flex: 1; min-width: 0; }

.conversation-name { font-weight: 600; margin-bottom: 4px; }

.conversation-last {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.conversation-meta { text-align: right; }

.conversation-time { font-size: 12px; color: var(--text-secondary); }

.unread-badge {
  background: var(--primary);
  color: white;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  margin-top: 4px;
  display: inline-block;
  font-weight: 600;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
}

.empty-state i { font-size: 48px; color: var(--text-secondary); margin-bottom: 20px; }

.empty-state h3 { margin-bottom: 10px; }

@media (max-width: 768px) {
  .chat-list-page { padding: 16px; }
  .page-header { padding: 12px 16px; gap: 12px; }
  .page-header h1 { font-size: 20px; }
  .conversation-item { padding: 12px 16px; gap: 12px; }
  .conversation-avatar { width: 48px; height: 48px; font-size: 18px; }
}
</style>

<script>
let conversations = [];
let filteredConversations = [];

document.addEventListener('DOMContentLoaded', loadConversations);

async function loadConversations() {
    try {
        const data = await chatManager.loadConversations();
        conversations = data.conversations || [];
        filteredConversations = [...conversations];
        renderConversations();
    } catch (error) {
        console.error('Error loading conversations:', error);
    }
}

function renderConversations() {
    const container = document.getElementById('conversationsList');
    
    if (!filteredConversations.length) {
        container.innerHTML = `
            <div class="empty-state glass-card">
                <i class="fas fa-comments" style="font-size: 48px; color: var(--text-secondary); margin-bottom: 20px;"></i>
                <h3>No messages yet</h3>
                <p>Start a conversation with a vendor</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = filteredConversations.map(c => `
        <div class="conversation-item glass-card" onclick="openChat('${c.other_id}', '${c.other_name}')">
            <div class="conversation-avatar">${c.other_name?.charAt(0) || 'V'}</div>
            <div class="conversation-info">
                <div class="conversation-name">${c.other_name || 'Unknown'}</div>
                <div class="conversation-last">${c.last_message || 'No messages yet'}</div>
            </div>
            <div class="conversation-meta">
                <div class="conversation-time">${formatTime(c.last_message_at)}</div>
                ${c.unread_count ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
            </div>
        </div>
    `).join('');
}

function filterConversations() {
    const query = document.getElementById('searchChats').value.toLowerCase();
    filteredConversations = conversations.filter(c => 
        c.other_name?.toLowerCase().includes(query) ||
        c.last_message?.toLowerCase().includes(query)
    );
    renderConversations();
}

function openChat(userId, userName) {
    window.location.href = `/pages/customer/chat.html?vendor=${userId}`;
}
</script>

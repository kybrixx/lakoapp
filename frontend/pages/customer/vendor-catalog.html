<div class="catalog-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 id="vendorTitle">Catalog</h1>
        <button class="btn btn-outline" onclick="toggleFilters()">
            <i class="fas fa-filter"></i>
        </button>
    </div>

    <div class="catalog-filters glass-card" id="catalogFilters" style="display: none;">
        <input type="text" class="form-control" placeholder="Search products..." id="productSearch" oninput="filterProducts()">
        <select class="form-control" id="categoryFilter" onchange="filterProducts()">
            <option value="">All Categories</option>
        </select>
        <select class="form-control" id="sortFilter" onchange="filterProducts()">
            <option value="name">Name</option>
            <option value="price_low">Price: Low to High</option>
            <option value="price_high">Price: High to Low</option>
            <option value="rating">Highest Rated</option>
            <option value="popular">Most Popular</option>
        </select>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 { font-weight: 600; }

.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }

.form-control {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.6);
  color: var(--text-primary);
  transition: all 0.3s;
}

.form-control:focus { outline: none; border-color: var(--primary); background: var(--surface); }

.catalog-page { max-width: 1200px; margin: 0 auto; padding: 20px; }

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  margin-bottom: 24px;
}

.page-header h1 { flex: 1; font-size: 24px; }

.catalog-filters {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.catalog-filters .form-control { flex: 1; min-width: 200px; }

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.product-card {
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.product-card:hover { transform: translateY(-4px); }

.product-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 12px;
}

.product-card h4 {
  font-size: 14px;
  margin-bottom: 4px;
}

.product-card p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }

.product-card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
}

.product-rating { font-size: 12px; margin-top: 6px; }

.product-rating .stars { color: #f59e0b; }

.out-of-stock { color: #dc2626; font-size: 11px; font-weight: 600; }

@media (max-width: 768px) {
  .catalog-page { padding: 16px; }
  .page-header { padding: 12px 16px; gap: 12px; }
  .page-header h1 { font-size: 20px; }
  .catalog-filters {
    flex-direction: column;
    padding: 12px 16px;
  }
  .catalog-filters .form-control { width: 100%; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
}
</style>

<script>
let vendorId = null;
let allProducts = [];
let filteredProducts = [];

document.addEventListener('DOMContentLoaded', () => {
    vendorId = getQueryParam('id');
    if (vendorId) loadCatalog();
});

async function loadCatalog() {
    try {
        const data = await api.request(`/customer/vendors/${vendorId}/products`);
        allProducts = data.products || [];
        filteredProducts = [...allProducts];
        
        const vendor = data.vendor || {};
        document.getElementById('vendorTitle').textContent = `${vendor.business_name || 'Vendor'} Catalog`;
        
        loadCategories();
        renderProducts();
    } catch (error) {
        console.error('Error loading catalog:', error);
    }
}

function loadCategories() {
    const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const select = document.getElementById('categoryFilter');
    categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
    });
}

function renderProducts() {
    const grid = document.getElementById('productsGrid');
    
    if (!filteredProducts.length) {
        grid.innerHTML = '<p class="glass-card" style="padding: 40px; text-align: center; grid-column: 1/-1;">No products found</p>';
        return;
    }
    
    grid.innerHTML = filteredProducts.map(p => `
        <div class="product-card glass-card" onclick="viewProduct('${p.id}')">
            <img src="${p.image || '/assets/images/placeholder.jpg'}" alt="${p.name}">
            <h4>${p.name}</h4>
            <p style="font-size: 13px; color: var(--text-secondary);">${p.category || ''}</p>
            <div style="font-size: 20px; font-weight: 700; color: var(--primary);">₱${p.price || 0}</div>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <span>⭐ ${p.rating || 0}</span>
                <span>(${p.review_count || 0})</span>
            </div>
            ${p.stock === 0 ? '<span style="color: #dc2626; font-size: 12px;">Out of Stock</span>' : ''}
        </div>
    `).join('');
}

function filterProducts() {
    const search = document.getElementById('productSearch').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const sort = document.getElementById('sortFilter').value;
    
    filteredProducts = allProducts.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(search) || 
                             (p.description || '').toLowerCase().includes(search);
        const matchesCategory = !category || p.category === category;
        return matchesSearch && matchesCategory;
    });
    
    // Sort
    switch(sort) {
        case 'price_low':
            filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
            break;
        case 'price_high':
            filteredProducts.sort((a, b) => (b.price || 0) - (a.price || 0));
            break;
        case 'rating':
            filteredProducts.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            break;
        case 'popular':
            filteredProducts.sort((a, b) => (b.review_count || 0) - (a.review_count || 0));
            break;
        default:
            filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
    }
    
    renderProducts();
}

function toggleFilters() {
    const filters = document.getElementById('catalogFilters');
    filters.style.display = filters.style.display === 'none' ? 'flex' : 'none';
}

function viewProduct(id) {
    window.location.href = `/pages/customer/product-detail.html?id=${id}`;
}
</script>

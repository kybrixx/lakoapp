<div class="search-page">
    <div class="search-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="search-input-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchQuery" class="form-control" placeholder="Search vendors, products..." value="">
        </div>
        <button class="btn btn-primary" onclick="performSearch()">Search</button>
    </div>

    <div class="search-tabs glass-card">
        <button class="tab-btn active" onclick="switchTab('all')">All</button>
        <button class="tab-btn" onclick="switchTab('vendors')">Vendors</button>
        <button class="tab-btn" onclick="switchTab('products')">Products</button>
    </div>

    <div class="search-filters glass-card" id="searchFilters" style="display: none;">
        <select class="form-control" id="categoryFilter">
            <option value="">All Categories</option>
            <option>Street Foods</option>
            <option>Dimsum</option>
            <option>Snacks</option>
            <option>Rice Meals</option>
            <option>Refreshments</option>
        </select>
        <select class="form-control" id="radiusFilter">
            <option value="5">Within 5 km</option>
            <option value="10" selected>Within 10 km</option>
            <option value="20">Within 20 km</option>
        </select>
        <select class="form-control" id="sortFilter">
            <option value="relevance">Most Relevant</option>
            <option value="rating">Highest Rated</option>
            <option value="distance">Nearest</option>
            <option value="recent">Most Recent</option>
        </select>
    </div>

    <div id="searchResults" class="search-results"></div>
    
    <div id="recentSearches" class="recent-searches glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Recent Searches</h3>
            <button class="btn btn-outline" onclick="clearRecentSearches()">Clear</button>
        </div>
        <div id="recentList"></div>
    </div>
</div>

<style>
.search-page { max-width: 900px; margin: 0 auto; padding: 20px; }
.search-header { display: flex; gap: 12px; padding: 12px 20px; margin-bottom: 16px; }
.search-input-container { flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.7); padding: 0 16px; border-radius: 40px; }
.search-input-container input { background: transparent; border: none; }
.search-tabs { display: flex; gap: 8px; padding: 8px; margin-bottom: 16px; }
.tab-btn { padding: 10px 24px; border: none; background: transparent; border-radius: 40px; cursor: pointer; }
.tab-btn.active { background: var(--primary); color: white; }
.search-filters { display: flex; gap: 12px; padding: 16px 20px; margin-bottom: 20px; }
.result-item { background: var(--surface); border-radius: 20px; padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; gap: 16px; }
.result-image { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; }
.result-info { flex: 1; }
.result-title { font-weight: 600; margin-bottom: 4px; }
.result-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.result-meta { display: flex; gap: 16px; font-size: 13px; }
.recent-searches { padding: 20px; margin-top: 24px; }
.recent-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.recent-item:hover { background: rgba(0,0,0,0.02); }
.recent-item i { color: var(--text-secondary); width: 20px; }
</style>

<script>
let currentTab = 'all';
let currentLocation = null;
let recentSearches = [];

document.addEventListener('DOMContentLoaded', () => {
    const query = getQueryParam('q');
    if (query) {
        document.getElementById('searchQuery').value = query;
        performSearch();
    }
    loadRecentSearches();
    getUserLocation();
});

async function getUserLocation() {
    try {
        currentLocation = await getLocation();
    } catch (error) {
        currentLocation = { lat: 14.5995, lng: 120.9842 };
    }
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    const filters = document.getElementById('searchFilters');
    filters.style.display = tab === 'products' ? 'none' : 'flex';
    
    performSearch();
}

async function performSearch() {
    const query = document.getElementById('searchQuery').value;
    if (!query) return;
    
    saveRecentSearch(query);
    
    try {
        const data = await api.search(query, currentTab);
        renderResults(data);
    } catch (error) {
        console.error('Search error:', error);
    }
}

function renderResults(data) {
    const container = document.getElementById('searchResults');
    let html = '';
    
    if (data.vendors?.length) {
        html += '<h3 style="margin: 20px 0 16px;">Vendors</h3>';
        html += data.vendors.map(v => `
            <div class="result-item glass-card" onclick="viewVendor('${v.id}')">
                <img src="${v.logo || '/assets/images/default-vendor.png'}" class="result-image">
                <div class="result-info">
                    <div class="result-title">${v.business_name}</div>
                    <div class="result-subtitle">${v.category}</div>
                    <div class="result-meta">
                        <span>⭐ ${v.rating || 0} (${v.review_count || 0})</span>
                        <span>📍 ${v.address?.substring(0, 30)}...</span>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    if (data.products?.length) {
        html += '<h3 style="margin: 20px 0 16px;">Products</h3>';
        html += data.products.map(p => `
            <div class="result-item glass-card" onclick="viewProduct('${p.id}')">
                <img src="${p.image || '/assets/images/placeholder.jpg'}" class="result-image">
                <div class="result-info">
                    <div class="result-title">${p.name}</div>
                    <div class="result-subtitle">${p.vendor_name || ''}</div>
                    <div class="result-meta">
                        <span>₱${p.price || 0}</span>
                        <span>⭐ ${p.rating || 0} (${p.review_count || 0})</span>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    container.innerHTML = html || '<p class="glass-card" style="padding: 40px; text-align: center;">No results found</p>';
}

function saveRecentSearch(query) {
    recentSearches = recentSearches.filter(s => s !== query);
    recentSearches.unshift(query);
    recentSearches = recentSearches.slice(0, 10);
    localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
    renderRecentSearches();
}

function loadRecentSearches() {
    const saved = localStorage.getItem('recentSearches');
    recentSearches = saved ? JSON.parse(saved) : [];
    renderRecentSearches();
}

function renderRecentSearches() {
    const container = document.getElementById('recentList');
    container.innerHTML = recentSearches.map(q => `
        <div class="recent-item" onclick="useRecentSearch('${q}')">
            <i class="fas fa-history"></i>
            <span>${q}</span>
            <i class="fas fa-arrow-up-right" style="margin-left: auto;"></i>
        </div>
    `).join('');
}

function useRecentSearch(query) {
    document.getElementById('searchQuery').value = query;
    performSearch();
}

function clearRecentSearches() {
    recentSearches = [];
    localStorage.removeItem('recentSearches');
    renderRecentSearches();
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}

function viewProduct(id) {
    window.location.href = `/pages/customer/product-detail.html?id=${id}`;
}
</script>

<div class="chat-page">
    <div class="chat-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-header-info">
            <div class="chat-avatar" id="chatAvatar">V</div>
            <div>
                <h3 id="chatName">Vendor Name</h3>
                <span id="chatStatus">Online</span>
            </div>
        </div>
        <button class="btn btn-outline" onclick="viewVendorProfile()">
            <i class="fas fa-store"></i>
        </button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="messages-list" id="messagesList"></div>
    </div>

    <div class="chat-input-container glass-card">
        <button class="btn btn-outline" onclick="document.getElementById('imageInput').click()">
            <i class="fas fa-image"></i>
        </button>
        <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageSelect(event)">
        <input type="text" id="messageInput" class="form-control" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button class="btn btn-primary" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<style>
.chat-page { height: 100vh; display: flex; flex-direction: column; background: #f5f7f5; }
.chat-header { display: flex; align-items: center; gap: 16px; padding: 12px 20px; margin: 10px; }
.chat-header-info { display: flex; align-items: center; gap: 12px; flex: 1; }
.chat-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; }
#chatStatus { font-size: 12px; color: var(--text-secondary); }
.messages-container { flex: 1; overflow-y: auto; padding: 20px; }
.messages-list { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.message { display: flex; gap: 8px; max-width: 70%; }
.message.sent { align-self: flex-end; flex-direction: row-reverse; }
.message-bubble { padding: 12px 16px; border-radius: 20px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.message.sent .message-bubble { background: var(--primary); color: white; }
.message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
.message-image { max-width: 200px; border-radius: 16px; margin-top: 8px; }
.chat-input-container { display: flex; align-items: center; gap: 12px; padding: 16px 20px; margin: 10px; }
.date-divider { text-align: center; margin: 20px 0; }
.date-divider span { background: rgba(0,0,0,0.1); padding: 4px 16px; border-radius: 40px; font-size: 12px; color: var(--text-secondary); }
.typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
.typing-indicator span { width: 8px; height: 8px; background: var(--text-secondary); border-radius: 50%; animation: typing 1.4s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
</style>

<script>
let vendorId = null;
let vendorData = null;
let messages = [];
let isTyping = false;
let typingTimeout = null;

document.addEventListener('DOMContentLoaded', () => {
    vendorId = getQueryParam('vendor');
    if (vendorId) {
        loadVendorInfo();
        loadMessages();
        setupChat();
    }
});

async function loadVendorInfo() {
    try {
        const data = await api.getVendor(vendorId);
        vendorData = data.vendor;
        
        document.getElementById('chatAvatar').textContent = vendorData.business_name?.charAt(0) || 'V';
        document.getElementById('chatName').textContent = vendorData.business_name || 'Vendor';
        
        chatManager.joinConversation(vendorData.user_id);
    } catch (error) {
        console.error('Error loading vendor:', error);
    }
}

async function loadMessages() {
    try {
        const data = await chatManager.loadMessages(vendorData?.user_id || vendorId);
        messages = data;
        renderMessages();
        scrollToBottom();
    } catch (error) {
        console.error('Error loading messages:', error);
    }
}

function setupChat() {
    chatManager.on('message', (data) => {
        if (data.sender_id === vendorData?.user_id) {
            messages.push(data);
            renderMessages();
            scrollToBottom();
            chatManager.markAsRead(data.sender_id);
        }
    });
    
    chatManager.on('typing', (data) => {
        if (data.user_id === vendorData?.user_id) {
            showTypingIndicator(data.typing);
        }
    });
}

function renderMessages() {
    const container = document.getElementById('messagesList');
    const currentUserId = auth.getUser()?.id;
    const grouped = chatManager.groupMessagesByDate(messages);
    
    let html = '';
    
    Object.entries(grouped).forEach(([date, msgs]) => {
        html += `<div class="date-divider"><span>${date}</span></div>`;
        
        msgs.forEach(msg => {
            const isSent = msg.sender_id === currentUserId;
            html += `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    ${!isSent ? `<div class="chat-avatar" style="width: 32px; height: 32px; font-size: 14px;">${vendorData?.business_name?.charAt(0) || 'V'}</div>` : ''}
                    <div>
                        <div class="message-bubble">
                            ${msg.message || ''}
                            ${msg.images ? renderMessageImages(msg.images) : ''}
                        </div>
                        <div class="message-time">${chatManager.formatMessageTime(msg.created_at)}</div>
                    </div>
                </div>
            `;
        });
    });
    
    container.innerHTML = html;
}

function renderMessageImages(images) {
    try {
        const imageList = JSON.parse(images);
        return imageList.map(img => `<img src="${img}" class="message-image" onclick="viewImage('${img}')">`).join('');
    } catch {
        return `<img src="${images}" class="message-image" onclick="viewImage('${images}')">`;
    }
}

function showTypingIndicator(typing) {
    const container = document.getElementById('messagesList');
    const existing = document.querySelector('.typing-indicator');
    
    if (typing && !existing) {
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        container.appendChild(indicator);
        scrollToBottom();
    } else if (!typing && existing) {
        existing.remove();
    }
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    
    if (!message || !vendorData) return;
    
    try {
        await chatManager.sendMessage(vendorData.user_id, message);
        input.value = '';
        await loadMessages();
    } catch (error) {
        showToast('Failed to send message', 'error');
    }
}

function handleKeyPress(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

async function handleImageSelect(e) {
    const files = e.target.files;
    if (!files.length) return;
    
    try {
        const result = await imageHandler.uploadMultipleImages(files, 'chat');
        const images = result.uploaded.map(img => img.url);
        await chatManager.sendMessage(vendorData.user_id, null, JSON.stringify(images));
        await loadMessages();
    } catch (error) {
        showToast('Failed to upload images', 'error');
    }
    
    e.target.value = '';
}

function scrollToBottom() {
    const container = document.querySelector('.messages-container');
    container.scrollTop = container.scrollHeight;
}

function viewVendorProfile() {
    window.location.href = `/pages/customer/vendor-profile.html?id=${vendorId}`;
}

function viewImage(url) {
    window.open(url, '_blank');
}
</script>

<div class="news-feed-page">
    <div class="page-header glass-card">
        <h1>News Feed</h1>
        <button class="btn btn-outline" onclick="toggleFilters()">
            <i class="fas fa-sliders-h"></i> Filter
        </button>
    </div>

    <div class="feed-filters glass-card" id="feedFilters" style="display: none;">
        <select class="form-control" id="categoryFilter" onchange="applyFilters()">
            <option value="">All Categories</option>
            <option>Street Foods</option>
            <option>Dimsum</option>
            <option>Snacks</option>
            <option>Rice Meals</option>
            <option>Refreshments</option>
        </select>
        <select class="form-control" id="timeFilter" onchange="applyFilters()">
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
            <option value="all">All Time</option>
        </select>
        <select class="form-control" id="sortFilter" onchange="applyFilters()">
            <option value="trending">Trending</option>
            <option value="recent">Most Recent</option>
            <option value="popular">Most Popular</option>
        </select>
    </div>

    <div class="create-post-card glass-card">
        <div class="post-input">
            <div class="user-avatar" id="userAvatar"></div>
            <input type="text" id="postPrompt" placeholder="What's on your mind?" readonly onclick="openCreatePost()">
        </div>
        <div class="post-actions">
            <button class="btn btn-outline" onclick="openCreatePost()">
                <i class="fas fa-pen"></i> Create Post
            </button>
            <button class="btn btn-outline" onclick="openCreatePost()">
                <i class="fas fa-image"></i> Photo
            </button>
        </div>
    </div>

    <div class="feed-sections">
        <div class="trending-section glass-card">
            <h3><i class="fas fa-fire"></i> Trending Now</h3>
            <div id="trendingList" class="trending-list"></div>
        </div>

        <div class="feed-tabs glass-card">
            <button class="tab-btn active" onclick="switchFeedTab('foryou')">For You</button>
            <button class="tab-btn" onclick="switchFeedTab('following')">Following</button>
            <button class="tab-btn" onclick="switchFeedTab('nearby')">Nearby</button>
        </div>

        <div id="feedPosts" class="feed-posts"></div>
    </div>

    <div id="createPostModal" class="modal" style="display: none;">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Create Post</h2>
                <button class="close-btn" onclick="closeCreatePost()">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="postContent" class="form-control" rows="4" placeholder="Share your thoughts..."></textarea>
                <div class="photo-upload">
                    <input type="file" id="postImages" accept="image/*" multiple style="display: none;">
                    <button class="btn btn-outline" onclick="document.getElementById('postImages').click()">
                        <i class="fas fa-image"></i> Add Photos
                    </button>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCreatePost()">Cancel</button>
                <button class="btn btn-primary" onclick="submitPost()">Post</button>
            </div>
        </div>
    </div>
</div>

<style>
.news-feed-page { max-width: 700px; margin: 0 auto; padding: 20px; }
.page-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; margin-bottom: 20px; }
.feed-filters { display: flex; gap: 12px; padding: 16px 20px; margin-bottom: 20px; }
.create-post-card { padding: 20px; margin-bottom: 20px; }
.post-input { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
.post-input input { flex: 1; padding: 12px 16px; background: rgba(0,0,0,0.04); border: none; border-radius: 40px; cursor: pointer; }
.post-actions { display: flex; gap: 12px; }
.trending-section { padding: 20px; margin-bottom: 20px; }
.trending-list { display: flex; gap: 16px; overflow-x: auto; padding: 12px 0; }
.trending-item { min-width: 200px; padding: 16px; background: rgba(255,255,255,0.5); border-radius: 16px; cursor: pointer; }
.feed-tabs { display: flex; gap: 8px; padding: 8px; margin-bottom: 20px; }
.feed-posts { display: flex; flex-direction: column; gap: 16px; }
.post-card { padding: 20px; }
.post-header { display: flex; gap: 12px; margin-bottom: 12px; }
.post-content { margin: 12px 0; }
.post-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin: 12px 0; }
.post-images img { width: 100%; border-radius: 12px; object-fit: cover; cursor: pointer; }
.post-footer { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
.post-action { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-secondary); }
.post-action.liked { color: #dc2626; }
.post-action i { font-size: 18px; }
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
.image-preview { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.image-preview img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
</style>

<script>
let currentFeedTab = 'foryou';
let feedPosts = [];
let selectedImages = [];

document.addEventListener('DOMContentLoaded', () => {
    loadUserAvatar();
    loadTrending();
    loadFeed();
});

function loadUserAvatar() {
    const user = auth.getUser();
    if (user) {
        document.getElementById('userAvatar').textContent = user.full_name?.charAt(0) || 'U';
    }
}

async function loadTrending() {
    try {
        const data = await api.request('/customer/trending');
        const trending = data.trending || [];
        const container = document.getElementById('trendingList');
        
        container.innerHTML = trending.map(p => `
            <div class="trending-item" onclick="viewProduct('${p.id}')">
                <img src="${p.image || '/assets/images/placeholder.jpg'}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 8px;">
                <h4>${p.name}</h4>
                <p style="font-size: 12px; color: var(--text-secondary);">${p.vendor_name}</p>
                <div class="rating">⭐ ${p.rating || 0} (${p.review_count || 0})</div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading trending:', error);
    }
}

async function loadFeed() {
    try {
        const data = await api.getFeed();
        feedPosts = data.posts || [];
        renderFeed();
    } catch (error) {
        console.error('Error loading feed:', error);
    }
}

function renderFeed() {
    const container = document.getElementById('feedPosts');
    const currentUserId = auth.getUser()?.id;
    
    if (!feedPosts.length) {
        container.innerHTML = '<p class="glass-card" style="padding: 40px; text-align: center;">No posts yet</p>';
        return;
    }
    
    container.innerHTML = feedPosts.map(post => `
        <div class="post-card glass-card">
            <div class="post-header">
                <div class="user-avatar" style="width: 44px; height: 44px; font-size: 16px;">${post.user_name?.charAt(0) || 'U'}</div>
                <div>
                    <div style="font-weight: 600;">${post.user_name || 'User'}</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">${formatTime(post.created_at)}</div>
                </div>
            </div>
            <div class="post-content">${escapeHtml(post.content)}</div>
            ${post.images ? renderPostImages(post.images) : ''}
            <div class="post-footer">
                <div class="post-action ${post.is_liked ? 'liked' : ''}" onclick="likePost('${post.id}')">
                    <i class="${post.is_liked ? 'fas' : 'far'} fa-heart"></i>
                    <span>${post.likes || 0}</span>
                </div>
                <div class="post-action" onclick="showComments('${post.id}')">
                    <i class="far fa-comment"></i>
                    <span>${post.comment_count || 0}</span>
                </div>
                <div class="post-action" onclick="sharePost('${post.id}')">
                    <i class="far fa-share-square"></i>
                </div>
            </div>
        </div>
    `).join('');
}

function renderPostImages(images) {
    try {
        const imageList = JSON.parse(images);
        return `
            <div class="post-images">
                ${imageList.map(img => `<img src="${img}" onclick="viewImage('${img}')">`).join('')}
            </div>
        `;
    } catch {
        return `<img src="${images}" class="post-image" onclick="viewImage('${images}')">`;
    }
}

function toggleFilters() {
    const filters = document.getElementById('feedFilters');
    filters.style.display = filters.style.display === 'none' ? 'flex' : 'none';
}

function switchFeedTab(tab) {
    currentFeedTab = tab;
    document.querySelectorAll('.feed-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadFeed();
}

function openCreatePost() {
    document.getElementById('createPostModal').style.display = 'flex';
    
    document.getElementById('postImages').addEventListener('change', (e) => {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        selectedImages = Array.from(e.target.files);
        
        selectedImages.forEach((file, i) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML += `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        });
    });
}

function closeCreatePost() {
    document.getElementById('createPostModal').style.display = 'none';
    document.getElementById('postContent').value = '';
    document.getElementById('imagePreview').innerHTML = '';
    selectedImages = [];
}

async function submitPost() {
    const content = document.getElementById('postContent').value;
    if (!content) {
        showToast('Please enter some content', 'error');
        return;
    }
    
    try {
        let images = null;
        if (selectedImages.length) {
            const result = await imageHandler.uploadMultipleImages(selectedImages, 'posts');
            images = JSON.stringify(result.uploaded.map(img => img.url));
        }
        
        await api.createPost(content, images);
        showToast('Post created!', 'success');
        closeCreatePost();
        loadFeed();
    } catch (error) {
        showToast('Failed to create post', 'error');
    }
}

async function likePost(postId) {
    try {
        await api.likePost(postId);
        const post = feedPosts.find(p => p.id === postId);
        if (post) {
            post.is_liked = !post.is_liked;
            post.likes += post.is_liked ? 1 : -1;
        }
        renderFeed();
    } catch (error) {
        console.error('Error liking post:', error);
    }
}

function showComments(postId) {
    window.location.href = `/pages/customer/post-detail.html?id=${postId}`;
}

function sharePost(postId) {
    const url = `${window.location.origin}/pages/customer/post-detail.html?id=${postId}`;
    if (navigator.share) {
        navigator.share({ title: 'Check out this post', url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!', 'success');
    }
}

function viewProduct(id) {
    window.location.href = `/pages/customer/product-detail.html?id=${id}`;
}

function viewImage(url) {
    window.open(url, '_blank');
}

function applyFilters() {
    loadFeed();
}
</script>

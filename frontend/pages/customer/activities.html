<div class="activities-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>Activity History</h1>
        <button class="btn btn-outline" onclick="clearActivities()">
            Clear History
        </button>
    </div>

    <div class="activity-tabs glass-card">
        <button class="tab-btn active" onclick="filterActivities('all')">All</button>
        <button class="tab-btn" onclick="filterActivities('views')">Views</button>
        <button class="tab-btn" onclick="filterActivities('reviews')">Reviews</button>
        <button class="tab-btn" onclick="filterActivities('likes')">Likes</button>
        <button class="tab-btn" onclick="filterActivities('chats')">Chats</button>
    </div>

    <div id="activitiesList" class="activities-list"></div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); }
h1, h2, h3 { font-weight: 600; }
.activities-page { max-width: 700px; margin: 0 auto; padding: 20px; }
.page-header { background: var(--surface); border-radius: 24px; padding: 16px 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.activity-tabs { background: var(--surface); border-radius: 24px; display: flex; gap: 8px; padding: 8px; margin-bottom: 24px; overflow-x: auto; border: 1px solid var(--border); box-shadow: var(--shadow); }
.tab-btn { padding: 10px 18px; border: none; background: transparent; border-radius: 20px; cursor: pointer; font-weight: 600; color: var(--text-secondary); transition: all 0.2s; }
.tab-btn.active { background: var(--primary); color: white; }
.activities-list { display: flex; flex-direction: column; gap: 12px; }
.activity-item { background: var(--surface); border-radius: 24px; display: flex; gap: 16px; padding: 16px 20px; cursor: pointer; border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.2s; }
.activity-item:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1); }
.activity-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.activity-details { flex: 1; min-width: 0; }
.activity-text { margin-bottom: 4px; font-weight: 500; }
.activity-time { font-size: 12px; color: var(--text-secondary); }
.activity-preview { margin-top: 8px; padding: 12px; background: rgba(15, 92, 47, 0.05); border-radius: 12px; font-size: 13px; }
.glass-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
@media (max-width: 768px) { .activity-tabs { flex-wrap: wrap; } }
</style>

<script>
let allActivities = [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', loadActivities);

async function loadActivities() {
    try {
        const data = await api.request('/customer/activities');
        allActivities = data.activities || [];
        renderActivities();
    } catch (error) {
        console.error('Error loading activities:', error);
    }
}

function filterActivities(type) {
    currentFilter = type;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderActivities();
}

function renderActivities() {
    const container = document.getElementById('activitiesList');
    const filtered = currentFilter === 'all' 
        ? allActivities 
        : allActivities.filter(a => getActivityType(a.action_type) === currentFilter);
    
    if (!filtered.length) {
        container.innerHTML = '<p class="glass-card" style="padding: 40px; text-align: center;">No activities yet</p>';
        return;
    }
    
    container.innerHTML = filtered.map(a => `
        <div class="activity-item glass-card" onclick="viewActivity('${a.id}', '${a.action_type}', '${a.target_id || ''}')">
            <div class="activity-icon">
                <i class="fas fa-${getActivityIcon(a.action_type)}"></i>
            </div>
            <div class="activity-details">
                <div class="activity-text">${formatActivityText(a)}</div>
                <div class="activity-time">${formatTime(a.created_at)}</div>
                ${a.details ? `<div class="activity-preview">${a.details}</div>` : ''}
            </div>
        </div>
    `).join('');
}

function getActivityType(action) {
    const types = {
        'view_vendor': 'views',
        'create_review': 'reviews',
        'like_post': 'likes',
        'like_review': 'likes',
        'send_message': 'chats'
    };
    return types[action] || 'all';
}

function getActivityIcon(action) {
    const icons = {
        'view_vendor': 'eye',
        'create_review': 'star',
        'like_post': 'heart',
        'like_review': 'heart',
        'send_message': 'comment',
        'add_shortlist': 'bookmark',
        'create_post': 'pen'
    };
    return icons[action] || 'circle';
}

function formatActivityText(activity) {
    const texts = {
        'view_vendor': `Viewed ${activity.details || 'a vendor'}`,
        'create_review': `Reviewed ${activity.details || 'a vendor'}`,
        'like_post': 'Liked a post',
        'like_review': 'Found a review helpful',
        'send_message': `Messaged ${activity.details || 'a vendor'}`,
        'add_shortlist': `Saved ${activity.details || 'a vendor'}`,
        'create_post': 'Created a post'
    };
    return texts[activity.action_type] || activity.action_type;
}

function viewActivity(id, type, targetId) {
    if (type === 'view_vendor' && targetId) {
        window.location.href = `/pages/customer/vendor-profile.html?id=${targetId}`;
    } else if (type === 'create_review' && targetId) {
        window.location.href = `/pages/customer/vendor-profile.html?id=${targetId}`;
    }
}

function clearActivities() {
    confirmDialog('Clear all activity history?', async () => {
        try {
            await api.request('/customer/activities/clear', { method: 'DELETE' });
            allActivities = [];
            renderActivities();
            showToast('History cleared', 'success');
        } catch (error) {
            showToast('Failed to clear history', 'error');
        }
    });
}
</script>

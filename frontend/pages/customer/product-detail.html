<div class="product-detail-page">
    <button class="btn btn-outline back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <div id="productContent"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 { font-weight: 600; }

.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }

.product-detail-page { max-width: 1000px; margin: 0 auto; padding: 20px; }

.back-btn { margin-bottom: 20px; }

.product-main {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 30px;
  padding: 30px;
  margin-bottom: 24px;
}

.product-image-large {
  width: 100%;
  height: 400px;
  border-radius: 16px;
  object-fit: cover;
}

.product-info h1 { font-size: 28px; margin-bottom: 8px; }

.vendor-link {
  color: var(--primary);
  cursor: pointer;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.vendor-link:hover { opacity: 0.8; }

.rating {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0;
}

.stars { color: #f59e0b; }

.product-price {
  font-size: 32px;
  font-weight: 700;
  color: var(--primary);
  margin: 16px 0;
}

.product-description { margin: 16px 0; }

.product-meta {
  display: flex;
  gap: 20px;
  margin: 20px 0;
  font-size: 14px;
}

.product-meta i { color: var(--primary); margin-right: 6px; }

.product-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.reviews-section {
  padding: 30px;
}

.reviews-section h2 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

.review-card {
  padding: 20px;
  margin-bottom: 16px;
  border-top: 1px solid var(--border);
}

.review-card:first-child { border-top: none; }

.review-card strong { display: block; margin-bottom: 6px; }

.review-card h4 { font-size: 14px; margin: 8px 0; }

.review-card p { font-size: 14px; margin: 8px 0; }

.review-card small { color: var(--text-secondary); }

@media (max-width: 768px) {
  .product-detail-page { padding: 16px; }
  .product-main {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 16px;
  }
  .product-image-large { height: 300px; }
  .product-info h1 { font-size: 22px; }
  .product-price { font-size: 24px; }
  .product-actions { flex-direction: column; }
  .btn { width: 100%; justify-content: center; }
  .reviews-section { padding: 16px; }
}
</style>

<script>
let productId = null;
let productData = null;

document.addEventListener('DOMContentLoaded', () => {
    productId = getQueryParam('id');
    if (productId) loadProduct();
});

async function loadProduct() {
    try {
        const data = await api.request(`/customer/products/${productId}`);
        productData = data.product;
        renderProduct(data.product, data.reviews || [], data.vendor);
    } catch (error) {
        console.error('Error loading product:', error);
    }
}

function renderProduct(product, reviews, vendor) {
    const rating = product.rating || 0;
    
    document.getElementById('productContent').innerHTML = `
        <div class="product-main glass-card">
            <img src="${product.image || '/assets/images/placeholder.jpg'}" alt="${product.name}" class="product-image-large">
            <div class="product-info">
                <h1>${product.name}</h1>
                <p class="vendor-link" onclick="viewVendor('${vendor?.id}')">
                    <i class="fas fa-store"></i> ${vendor?.business_name || 'Unknown Vendor'}
                </p>
                <div class="rating">
                    <span class="stars">${'★'.repeat(Math.floor(rating))}${'☆'.repeat(5 - Math.floor(rating))}</span>
                    <span>${rating} (${product.review_count || 0} reviews)</span>
                </div>
                <div class="product-price">₱${product.price || 0}</div>
                <p class="product-description">${product.description || 'No description available.'}</p>
                <div class="product-meta">
                    <span><i class="fas fa-box"></i> Stock: ${product.stock || 0}</span>
                    ${product.moq ? `<span><i class="fas fa-cubes"></i> MOQ: ${product.moq}</span>` : ''}
                    <span><i class="fas fa-tag"></i> ${product.category || 'Uncategorized'}</span>
                </div>
                <div class="product-actions">
                    <button class="btn btn-primary" onclick="chatWithVendor('${vendor?.id}')">
                        <i class="fas fa-comment"></i> Chat Vendor
                    </button>
                    <button class="btn btn-outline" onclick="saveProduct('${product.id}')">
                        <i class="fas fa-bookmark"></i> Save
                    </button>
                    <button class="btn btn-outline" onclick="shareProduct('${product.id}')">
                        <i class="fas fa-share"></i> Share
                    </button>
                </div>
            </div>
        </div>
        
        <div class="reviews-section glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Reviews (${reviews.length})</h2>
                <button class="btn btn-primary" onclick="writeReview('${product.id}', '${vendor?.id}')">
                    Write Review
                </button>
            </div>
            ${reviews.length ? reviews.map(r => `
                <div class="review-card glass-card">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${r.customer_name || 'Customer'}</strong>
                        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                    </div>
                    ${r.title ? `<h4>${r.title}</h4>` : ''}
                    <p>${r.comment || ''}</p>
                    ${r.images ? renderReviewImages(r.images) : ''}
                    <small>${formatTime(r.created_at)}</small>
                </div>
            `).join('') : '<p>No reviews yet. Be the first to review!</p>'}
        </div>
    `;
}

function renderReviewImages(images) {
    try {
        const imageList = JSON.parse(images);
        return `<div style="display: flex; gap: 8px; margin-top: 8px;">${imageList.map(img => `<img src="${img}" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover; cursor: pointer;" onclick="viewImage('${img}')">`).join('')}</div>`;
    } catch {
        return '';
    }
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}

function chatWithVendor(id) {
    window.location.href = `/pages/customer/chat.html?vendor=${id}`;
}

function saveProduct(id) {
    showToast('Product saved!', 'success');
}

function shareProduct(id) {
    const url = window.location.href;
    if (navigator.share) {
        navigator.share({ title: productData?.name, url });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied!', 'success');
    }
}

function writeReview(productId, vendorId) {
    window.location.href = `/pages/customer/write-review.html?product=${productId}&vendor=${vendorId}`;
}

function viewImage(url) {
    window.open(url, '_blank');
}
</script>

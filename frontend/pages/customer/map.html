<div class="map-page">
    <div class="map-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2>Explore Map</h2>
        <button class="btn btn-outline" onclick="toggleFilters()">
            <i class="fas fa-sliders-h"></i>
        </button>
    </div>

    <div class="map-filters glass-card" id="mapFilters" style="display: none;">
        <select class="form-control" id="categoryFilter" onchange="filterMap()">
            <option value="">All Categories</option>
            <option>Pancit</option>
            <option>Pares</option>
            <option>Isaw</option>
            <option>Chicken</option>
            <option>Corndogs</option>
            <option>Coffee</option>
            <option>Sari-Sari Store</option>
        </select>
        <select class="form-control" id="radiusFilter" onchange="filterMap()">
            <option value="5">5 km</option>
            <option value="10" selected>10 km</option>
            <option value="20">20 km</option>
            <option value="50">50 km</option>
        </select>
        <select class="form-control" id="trafficFilter" onchange="filterMap()">
            <option value="">All Traffic</option>
            <option value="high">High Traffic</option>
            <option value="medium">Medium Traffic</option>
            <option value="low">Low Traffic</option>
        </select>
    </div>

    <div id="mapContainer" class="full-map"></div>

    <div class="map-controls glass-card">
        <button class="btn btn-outline" onclick="mapManager.toggleHeatmap()">
            <i class="fas fa-fire"></i> Heatmap
        </button>
        <button class="btn btn-outline" onclick="mapManager.centerOnUser()">
            <i class="fas fa-location-dot"></i> My Location
        </button>
        <button class="btn btn-outline" onclick="toggleTrafficLayer()">
            <i class="fas fa-chart-line"></i> Traffic
        </button>
    </div>

    <div class="geofencing-panel glass-card" id="geofencingPanel" style="display: none;">
        <h4>Set Geofence Alert</h4>
        <input type="text" class="form-control" placeholder="Area name" id="geofenceName">
        <input type="number" class="form-control" placeholder="Radius (km)" id="geofenceRadius" value="5">
        <button class="btn btn-primary" onclick="setGeofence()">Set Alert</button>
    </div>

    <div id="vendorInfoCard" class="vendor-info-card glass-card" style="display: none;">
        <button class="close-btn" onclick="hideVendorCard()">&times;</button>
        <div id="cardContent"></div>
    </div>

    <button class="fab btn-primary" onclick="toggleGeofencing()">
        <i class="fas fa-bell"></i>
    </button>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); }
h1, h2, h3, h4 { font-weight: 600; }
.map-page { position: relative; height: 100vh; display: flex; flex-direction: column; }
.map-header { background: var(--surface); border-radius: 24px; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; margin: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.btn-primary { background: var(--primary); color: white; border: none; }
.btn-primary:hover { background: var(--primary-dark); }
.map-filters { background: var(--surface); border-radius: 24px; display: flex; gap: 12px; padding: 16px; margin: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.form-control { padding: 10px 16px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; outline: none; }
.form-control:focus { border-color: var(--primary); }
.full-map { flex: 1; width: 100%; border-radius: 24px; overflow: hidden; margin: 0 10px; border: 2px solid var(--border); }
.map-controls { position: absolute; bottom: 100px; right: 20px; display: flex; flex-direction: column; gap: 8px; padding: 8px; }
.vendor-info-card { position: absolute; bottom: 20px; left: 20px; right: 20px; max-width: 400px; background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.geofencing-panel { position: absolute; top: 180px; left: 20px; right: 20px; max-width: 350px; background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.geofencing-panel h4 { margin-bottom: 16px; }
.geofencing-panel .form-control { display: block; margin-bottom: 12px; width: 100%; }
.fab { position: absolute; bottom: 100px; left: 20px; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow); background: var(--primary); color: white; cursor: pointer; border: none; transition: all 0.2s; }
.fab:hover { background: var(--primary-dark); transform: scale(1.1); }
.close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary); }
.glass-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
</style>

<script>
let vendors = [];
let trafficLayer = null;

document.addEventListener('DOMContentLoaded', () => {
    mapManager.init('mapContainer');
    mapManager.centerOnUser().then(pos => {
        if (pos) loadNearbyVendors(pos.lat, pos.lng);
    });
    
    mapManager.on('click', (e) => {
        // Handle map click
    });
});

async function loadNearbyVendors(lat, lng) {
    const radius = document.getElementById('radiusFilter')?.value || 10;
    vendors = await mapManager.loadNearbyVendors(lat, lng, radius);
    
    mapManager.markers.forEach(marker => {
        marker.on('click', (e) => {
            const vendor = vendors.find(v => 
                v.latitude === e.latlng.lat && v.longitude === e.latlng.lng
            );
            if (vendor) showVendorCard(vendor);
        });
    });
}

function showVendorCard(vendor) {
    const trafficLevel = getTrafficLevel(vendor.traffic_count || 0);
    
    document.getElementById('cardContent').innerHTML = `
        <h3>${vendor.business_name}</h3>
        <p class="category">${vendor.category}</p>
        <div class="rating">${'★'.repeat(Math.floor(vendor.rating || 0))}${'☆'.repeat(5 - Math.floor(vendor.rating || 0))} ${vendor.rating || 0}</div>
        <p><i class="fas fa-map-marker-alt"></i> ${vendor.address || 'No address'}</p>
        <p><i class="fas fa-chart-line"></i> Traffic: <span class="traffic-${trafficLevel}">${trafficLevel}</span></p>
        <div class="actions">
            <button class="btn btn-primary" onclick="viewVendor('${vendor.id}')">View Details</button>
            <button class="btn btn-outline" onclick="getDirections(${vendor.latitude}, ${vendor.longitude})">Directions</button>
        </div>
    `;
    document.getElementById('vendorInfoCard').style.display = 'block';
}

function hideVendorCard() {
    document.getElementById('vendorInfoCard').style.display = 'none';
}

function getTrafficLevel(count) {
    if (count > 1000) return 'high';
    if (count > 500) return 'medium';
    return 'low';
}

async function getDirections(lat, lng) {
    const pos = mapManager.currentLocation;
    if (pos) {
        const route = await mapManager.getRoute(pos.lat, pos.lng, lat, lng);
        if (route) {
            showToast(`Distance: ${route.distance.toFixed(1)} km, ETA: ${route.duration.toFixed(0)} min`, 'info');
        }
    }
}

function toggleFilters() {
    const filters = document.getElementById('mapFilters');
    filters.style.display = filters.style.display === 'none' ? 'flex' : 'none';
}

function toggleGeofencing() {
    const panel = document.getElementById('geofencingPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function setGeofence() {
    const name = document.getElementById('geofenceName').value;
    const radius = document.getElementById('geofenceRadius').value;
    
    if (!name) {
        showToast('Please enter a name', 'error');
        return;
    }
    
    const pos = mapManager.currentLocation;
    if (!pos) {
        showToast('Location not available', 'error');
        return;
    }
    
    // Save geofence
    showToast(`Geofence "${name}" set for ${radius}km`, 'success');
    toggleGeofencing();
}

function filterMap() {
    const category = document.getElementById('categoryFilter').value;
    const radius = document.getElementById('radiusFilter').value;
    const traffic = document.getElementById('trafficFilter').value;
    
    let filtered = vendors;
    
    if (category) {
        filtered = filtered.filter(v => v.category === category);
    }
    
    if (traffic) {
        filtered = filtered.filter(v => {
            const level = getTrafficLevel(v.traffic_count || 0);
            return level === traffic;
        });
    }
    
    mapManager.addVendorMarkers(filtered);
}

function toggleTrafficLayer() {
    if (trafficLayer) {
        mapManager.map.removeLayer(trafficLayer);
        trafficLayer = null;
    } else {
        // Add traffic layer (simplified)
        mapManager.toggleHeatmap();
    }
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}
</script>

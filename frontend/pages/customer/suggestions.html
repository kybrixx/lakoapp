<div class="suggestions-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>Suggestions For You</h1>
        <button class="btn btn-outline" onclick="refreshSuggestions()">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div id="suggestionsContent"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 { font-weight: 600; }

.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }

.suggestions-page { max-width: 1000px; margin: 0 auto; padding: 20px; }

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  margin-bottom: 24px;
}

.page-header h1 { flex: 1; font-size: 24px; }

.section-card {
  padding: 24px;
  margin-bottom: 24px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.section-header h2 {
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.vendor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.suggestion-card {
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.suggestion-card:hover { transform: translateY(-2px); }

.suggestion-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 12px;
}

.suggestion-card h4 { font-size: 14px; margin-bottom: 4px; }

.suggestion-card p { font-size: 12px; color: var(--text-secondary); }

.area-card {
  padding: 20px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.area-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(15, 92, 47, 0.2); }

.area-card h3 { font-size: 16px; margin-bottom: 8px; }

.area-card p { font-size: 13px; opacity: 0.9; }

.traffic-high { color: #dc2626; font-weight: 600; }
.traffic-medium { color: #eab308; font-weight: 600; }
.traffic-low { color: #10b981; font-weight: 600; }

@media (max-width: 768px) {
  .suggestions-page { padding: 16px; }
  .page-header { padding: 12px 16px; gap: 12px; }
  .page-header h1 { font-size: 20px; }
  .section-card { padding: 16px; }
  .vendor-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .suggestion-card img { height: 100px; }
}
</style>

<script>
let currentLocation = null;

document.addEventListener('DOMContentLoaded', async () => {
    try {
        currentLocation = await getLocation();
    } catch (error) {
        currentLocation = { lat: 14.5995, lng: 120.9842 };
    }
    loadSuggestions();
});

async function loadSuggestions() {
    try {
        const data = await api.getSuggestions(currentLocation.lat, currentLocation.lng);
        renderSuggestions(data);
    } catch (error) {
        console.error('Error loading suggestions:', error);
    }
}

function renderSuggestions(data) {
    const container = document.getElementById('suggestionsContent');
    
    container.innerHTML = `
        <div class="section-card glass-card">
            <div class="section-header">
                <h2><i class="fas fa-fire"></i> Trending Now</h2>
            </div>
            <div class="vendor-grid">
                ${(data.trending || []).map(v => renderVendorCard(v)).join('')}
            </div>
        </div>
        
        <div class="section-card glass-card">
            <div class="section-header">
                <h2><i class="fas fa-star"></i> Recommended For You</h2>
            </div>
            <div class="vendor-grid">
                ${(data.recommended || []).map(v => renderVendorCard(v)).join('')}
            </div>
        </div>
        
        <div class="section-card glass-card">
            <div class="section-header">
                <h2><i class="fas fa-history"></i> Similar to Your Past</h2>
            </div>
            <div class="vendor-grid">
                ${(data.similar || []).map(v => renderVendorCard(v)).join('')}
            </div>
        </div>
        
        <div class="section-card glass-card">
            <div class="section-header">
                <h2><i class="fas fa-chart-line"></i> High Traffic Areas</h2>
            </div>
            <div class="vendor-grid">
                ${(data.high_traffic || []).map(area => `
                    <div class="area-card" onclick="viewArea('${area.lat}', '${area.lng}')">
                        <h3>${area.name || 'High Traffic Zone'}</h3>
                        <p>${area.vendor_count || 0} vendors</p>
                        <p class="traffic-${area.level || 'high'}">🔥 ${area.level || 'High'} Traffic</p>
                    </div>
                `).join('')}
            </div>
        </div>
        
        <div class="section-card glass-card">
            <div class="section-header">
                <h2><i class="fas fa-medal"></i> Most Reviewed Vendors</h2>
            </div>
            <div class="vendor-grid">
                ${(data.most_reviewed || []).map(v => renderVendorCard(v)).join('')}
            </div>
        </div>
    `;
}

function renderVendorCard(vendor) {
    return `
        <div class="suggestion-card glass-card" onclick="viewVendor('${vendor.id}')">
            <img src="${vendor.logo || '/assets/images/default-vendor.png'}" alt="${vendor.business_name}">
            <h4>${vendor.business_name}</h4>
            <p style="font-size: 13px; color: var(--text-secondary);">${vendor.category}</p>
            <div class="rating">${'★'.repeat(Math.floor(vendor.rating || 0))}${'☆'.repeat(5 - Math.floor(vendor.rating || 0))} ${vendor.rating || 0}</div>
            <p style="font-size: 12px; margin-top: 8px;">
                <i class="fas fa-map-marker-alt"></i> ${vendor.distance ? vendor.distance.toFixed(1) + ' km' : 'Nearby'}
            </p>
        </div>
    `;
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}

function viewArea(lat, lng) {
    window.location.href = `/pages/customer/map.html?lat=${lat}&lng=${lng}`;
}

function refreshSuggestions() {
    loadSuggestions();
    showToast('Refreshing suggestions...', 'info');
}
</script>

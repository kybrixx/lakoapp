<div class="customer-dashboard">
    <!-- Header -->
    <header class="app-header glass-card">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="logo">lako</a>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search vendors, products..." id="globalSearch">
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="goToChat()">
                <i class="fas fa-comment"></i>
            </button>
            <button class="header-btn" onclick="goToProfile()">
                <i class="fas fa-user"></i>
            </button>
            <button class="header-btn" onclick="auth.logout(); window.location.href='/'">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card" id="sidebar">
            <nav class="sidebar-nav">
                <a class="nav-item active" onclick="loadSection('feed')">
                    <i class="fas fa-newspaper"></i>
                    <span>News Feed</span>
                </a>
                <a class="nav-item" onclick="loadSection('map')">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Map</span>
                </a>
                <a class="nav-item" onclick="loadSection('suggestions')">
                    <i class="fas fa-lightbulb"></i>
                    <span>Suggestions</span>
                </a>
                <a class="nav-item" onclick="loadSection('search')">
                    <i class="fas fa-search"></i>
                    <span>Search</span>
                </a>
                <a class="nav-item" onclick="loadSection('shortlist')">
                    <i class="fas fa-bookmark"></i>
                    <span>Shortlist</span>
                </a>
                <a class="nav-item" onclick="loadSection('activities')">
                    <i class="fas fa-history"></i>
                    <span>Activities</span>
                </a>
                <a class="nav-item" onclick="loadSection('settings')">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Content loaded dynamically -->
        </main>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav glass-card">
        <a class="bottom-nav-item active" onclick="loadSection('feed')">
            <i class="fas fa-newspaper"></i>
            <span>Feed</span>
        </a>
        <a class="bottom-nav-item" onclick="loadSection('map')">
            <i class="fas fa-map-marked-alt"></i>
            <span>Map</span>
        </a>
        <a class="bottom-nav-item" onclick="loadSection('suggestions')">
            <i class="fas fa-lightbulb"></i>
            <span>Suggest</span>
        </a>
        <a class="bottom-nav-item" onclick="loadSection('shortlist')">
            <i class="fas fa-bookmark"></i>
            <span>Saved</span>
        </a>
        <a class="bottom-nav-item" onclick="loadSection('profile')">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

.feed-container {

}

<script>
let currentSection = 'feed';
let currentLocation = null;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    getUserLocation();
    loadSection('feed');
    loadUnreadMessages();
});

function checkAuth() {
    if (!auth.requireAuth()) {
        return;
    }
    if (auth.getUserRole() !== 'customer') {
        window.location.href = '/pages/login.html';
    }
}

function getUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                currentLocation = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };
                await api.updateLocation(currentLocation.lat, currentLocation.lng);
            },
            (err) => {
                console.error('Location error:', err);
            }
        );
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

async function loadSection(section) {
    currentSection = section;
    
    // Update active states
    document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(el => {
        el.classList.remove('active');
    });
    document.querySelectorAll(`[onclick="loadSection('${section}')"]`).forEach(el => {
        el.classList.add('active');
    });
    
    const content = document.getElementById('mainContent');
    
    switch(section) {
        case 'feed':
            await loadFeed();
            break;
        case 'map':
            loadMap();
            break;
        case 'suggestions':
            await loadSuggestions();
            break;
        case 'search':
            loadSearch();
            break;
        case 'shortlist':
            await loadShortlist();
            break;
        case 'activities':
            await loadActivities();
            break;
        case 'profile':
            loadProfile();
            break;
        case 'settings':
            loadSettings();
            break;
    }
}

async function loadFeed() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="feed-container">
            <div class="create-post-card">
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <div class="post-actions">
                    <button class="btn btn-outline" onclick="document.getElementById('postImage').click()">
                        <i class="fas fa-image"></i> Add Photo
                    </button>
                    <input type="file" id="postImage" accept="image/*" style="display: none;" multiple>
                    <button class="btn btn-primary" onclick="createPost()">Post</button>
                </div>
            </div>
            <div id="feedPosts"></div>
        </div>
    `;
    
    await loadFeedPosts();
}

async function loadFeedPosts() {
    try {
        const data = await api.getFeed();
        const posts = data.posts || [];
        
        const container = document.getElementById('feedPosts');
        
        if (posts.length === 0) {
            container.innerHTML = `
                <div class="glass-card" style="text-align: center; padding: 40px;">
                    <p>No posts yet. Follow some vendors to see their updates!</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="post-card" id="post-${post.id}">
                <div class="post-header">
                    <div class="post-avatar">
                        ${post.user_avatar ? 
                            `<img src="${post.user_avatar}" alt="${post.user_name}">` : 
                            post.user_name?.charAt(0) || 'U'}
                    </div>
                    <div class="post-info">
                        <div class="post-author">${post.user_name || 'Unknown'}</div>
                        <div class="post-time">${formatTime(post.created_at)}</div>
                    </div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                ${post.images ? `
                    <div class="post-images">
                        ${JSON.parse(post.images).map(img => 
                            `<img src="${img}" alt="Post image" onclick="viewImage('${img}')">`
                        ).join('')}
                    </div>
                ` : ''}
                <div class="post-footer">
                    <div class="post-action ${post.is_liked ? 'liked' : ''}" onclick="likePost('${post.id}')">
                        <i class="fas fa-heart"></i>
                        <span>${post.likes || 0}</span>
                    </div>
                    <div class="post-action" onclick="showComments('${post.id}')">
                        <i class="fas fa-comment"></i>
                        <span>${post.comment_count || 0}</span>
                    </div>
                    <div class="post-action" onclick="sharePost('${post.id}')">
                        <i class="fas fa-share"></i>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading feed:', error);
    }
}

async function createPost() {
    const content = document.getElementById('postContent').value;
    
    if (!content.trim()) {
        app.showToast('Please enter some content', 'error');
        return;
    }
    
    try {
        await api.createPost(content);
        app.showToast('Post created!', 'success');
        document.getElementById('postContent').value = '';
        await loadFeedPosts();
    } catch (error) {
        app.showToast('Failed to create post', 'error');
    }
}

async function likePost(postId) {
    try {
        await api.likePost(postId);
        await loadFeedPosts();
    } catch (error) {
        console.error('Error liking post:', error);
    }
}

function loadMap() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="map-section">
            <div id="mapContainer" class="map-container" style="height: 500px;"></div>
            <div class="map-controls">
                <button class="btn btn-outline" onclick="toggleHeatmap()">
                    <i class="fas fa-fire"></i> Heatmap
                </button>
                <button class="btn btn-outline" onclick="centerOnUser()">
                    <i class="fas fa-location-dot"></i> My Location
                </button>
            </div>
            <div id="nearbyVendors" class="nearby-vendors"></div>
        </div>
    `;
    
    initCustomerMap();
}

async function loadSuggestions() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="suggestions-container">
            <h2>Suggestions for You</h2>
            <div id="suggestionsContent" class="loading">Loading suggestions...</div>
        </div>
    `;
    
    try {
        const data = await api.getSuggestions(currentLocation?.lat, currentLocation?.lng);
        
        document.getElementById('suggestionsContent').innerHTML = `
            <div class="suggestion-section">
                <h3>🔥 Trending Now</h3>
                <div class="vendor-grid">
                    ${(data.trending || []).map(v => renderVendorCard(v)).join('')}
                </div>
            </div>
            <div class="suggestion-section">
                <h3>⭐ Most Reviewed</h3>
                <div class="vendor-grid">
                    ${(data.most_reviewed || []).map(v => renderVendorCard(v)).join('')}
                </div>
            </div>
            <div class="suggestion-section">
                <h3>📍 Recommended for You</h3>
                <div class="vendor-grid">
                    ${(data.recommended || []).map(v => renderVendorCard(v)).join('')}
                </div>
            </div>
        `;
    } catch (error) {
        document.getElementById('suggestionsContent').innerHTML = `
            <p class="error">Failed to load suggestions</p>
        `;
    }
}

function renderVendorCard(vendor) {
    return `
        <div class="vendor-card glass-card" onclick="viewVendor('${vendor.id}')">
            <div class="vendor-image">
                ${vendor.logo ? 
                    `<img src="${vendor.logo}" alt="${vendor.business_name}">` : 
                    '<i class="fas fa-store"></i>'}
            </div>
            <div class="vendor-info">
                <h4>${vendor.business_name}</h4>
                <p class="vendor-category">${vendor.category}</p>
                <div class="vendor-rating">
                    ${'★'.repeat(Math.floor(vendor.rating || 0))}
                    ${'☆'.repeat(5 - Math.floor(vendor.rating || 0))}
                    <span>${vendor.rating || 0}</span>
                </div>
                ${vendor.distance ? `<p class="vendor-distance">📍 ${vendor.distance} km</p>` : ''}
            </div>
        </div>
    `;
}

async function loadShortlist() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="shortlist-container">
            <h2>My Shortlist</h2>
            <div id="shortlistContent" class="loading">Loading...</div>
        </div>
    `;
    
    try {
        const data = await api.getShortlist();
        const vendors = data.shortlist || [];
        
        if (vendors.length === 0) {
            document.getElementById('shortlistContent').innerHTML = `
                <div class="empty-state glass-card">
                    <i class="fas fa-bookmark"></i>
                    <p>No saved vendors yet</p>
                    <button class="btn btn-primary" onclick="loadSection('map')">Explore Vendors</button>
                </div>
            `;
        } else {
            document.getElementById('shortlistContent').innerHTML = `
                <div class="vendor-list">
                    ${vendors.map(v => renderVendorCard(v)).join('')}
                </div>
            `;
        }
    } catch (error) {
        document.getElementById('shortlistContent').innerHTML = `
            <p class="error">Failed to load shortlist</p>
        `;
    }
}

async function loadActivities() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="activities-container">
            <h2>Recent Activities</h2>
            <div id="activitiesContent" class="loading">Loading activities...</div>
        </div>
    `;
    
    try {
        const data = await api.request('/customer/activities');
        const activities = data.activities || [];
        
        if (activities.length === 0) {
            document.getElementById('activitiesContent').innerHTML = `
                <div class="empty-state glass-card">
                    <i class="fas fa-history"></i>
                    <p>No activities yet</p>
                </div>
            `;
        } else {
            document.getElementById('activitiesContent').innerHTML = `
                <div class="activity-timeline">
                    ${activities.map(a => `
                        <div class="activity-item glass-card">
                            <div class="activity-icon">
                                <i class="fas fa-${getActivityIcon(a.action_type)}"></i>
                            </div>
                            <div class="activity-details">
                                <p>${formatActivity(a)}</p>
                                <span class="activity-time">${formatTime(a.created_at)}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    } catch (error) {
        document.getElementById('activitiesContent').innerHTML = `
            <p class="error">Failed to load activities</p>
        `;
    }
}

function loadProfile() {
    const user = auth.getUser();
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="profile-container">
            <div class="profile-header glass-card">
                <div class="profile-avatar">
                    ${user.avatar ? 
                        `<img src="${user.avatar}" alt="${user.full_name}">` : 
                        `<div class="avatar-placeholder">${user.full_name?.charAt(0) || 'U'}</div>`}
                </div>
                <div class="profile-info">
                    <h2>${user.full_name || 'User'}</h2>
                    <p>${user.email}</p>
                    <p>${user.phone || 'No phone'}</p>
                </div>
                <button class="btn btn-outline" onclick="editProfile()">Edit Profile</button>
            </div>
            
            <div class="profile-stats glass-card">
                <div class="stat-item">
                    <span class="stat-value" id="reviewCount">-</span>
                    <span class="stat-label">Reviews</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="postCount">-</span>
                    <span class="stat-label">Posts</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="shortlistCount">-</span>
                    <span class="stat-label">Saved</span>
                </div>
            </div>
        </div>
    `;
    
    loadProfileStats();
}

async function loadProfileStats() {
    try {
        const data = await api.request('/customer/activities');
        // Calculate stats from activities
        const activities = data.activities || [];
        
        const reviews = activities.filter(a => a.action_type === 'create_review').length;
        const posts = activities.filter(a => a.action_type === 'create_post').length;
        const shortlist = activities.filter(a => a.action_type === 'add_shortlist').length;
        
        document.getElementById('reviewCount').textContent = reviews;
        document.getElementById('postCount').textContent = posts;
        document.getElementById('shortlistCount').textContent = shortlist;
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

            <div class="settings-section">

// Utility functions
function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    return date.toLocaleDateString();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getActivityIcon(type) {
    const icons = {
        'create_review': 'star',
        'create_post': 'pen',
        'like_post': 'heart',
        'add_shortlist': 'bookmark',
        'view_vendor': 'eye',
        'send_message': 'comment'
    };
    return icons[type] || 'circle';
}

function formatActivity(activity) {
    const messages = {
        'create_review': `Reviewed ${activity.details || 'a vendor'}`,
        'create_post': 'Created a post',
        'like_post': 'Liked a post',
        'add_shortlist': 'Saved a vendor',
        'view_vendor': 'Viewed a vendor',
        'send_message': 'Sent a message'
    };
    return messages[activity.action_type] || activity.action_type;
}

function viewVendor(vendorId) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${vendorId}`;
}

function goToChat() {
    window.location.href = '/pages/customer/chat-list.html';
}

function goToProfile() {
    loadSection('profile');
}

async function loadUnreadMessages() {
    try {
        const data = await api.request('/chat/unread-count');
        const badge = document.getElementById('unreadBadge');
        if (badge && data.unread > 0) {
            badge.textContent = data.unread;
            badge.style.display = 'block';
        }
    } catch (error) {
        // Ignore
    }
}

// Initialize map functions
function initCustomerMap() {
    if (typeof L === 'undefined') {
        loadLeaflet().then(() => renderCustomerMap());
    } else {
        renderCustomerMap();
    }
}

function renderCustomerMap() {
    if (!currentLocation) {
        currentLocation = { lat: 14.5995, lng: 120.9842 };
    }
    
    const map = L.map('mapContainer').setView([currentLocation.lat, currentLocation.lng], 14);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
    
    L.marker([currentLocation.lat, currentLocation.lng])
        .addTo(map)
        .bindPopup('You are here')
        .openPopup();
    
    // Load nearby vendors
    api.getNearbyVendors(currentLocation.lat, currentLocation.lng).then(data => {
        data.vendors?.forEach(v => {
            if (v.latitude && v.longitude) {
                L.marker([v.latitude, v.longitude])
                    .addTo(map)
                    .bindPopup(`
                        <b>${v.name}</b><br>
                        ${v.category}<br>
                        ⭐ ${v.rating || 0}<br>
                        <button onclick="viewVendor('${v.id}')">View Details</button>
                    `);
            }
        });
    });
}

function loadLeaflet() {
    return new Promise((resolve) => {
        const css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(css);
        
        const js = document.createElement('script');
        js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        js.onload = resolve;
        document.head.appendChild(js);
    });
}
</script>

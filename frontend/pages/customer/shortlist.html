<div class="shortlist-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>My Shortlist</h1>
        <button class="btn btn-outline" onclick="exportShortlist()">
            <i class="fas fa-download"></i>
        </button>
    </div>

    <div id="shortlistContent" class="shortlist-content"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 { font-weight: 600; }

.glass-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }

.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }

.form-control {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.6);
  color: var(--text-primary);
  transition: all 0.3s;
}

.form-control:focus { outline: none; border-color: var(--primary); background: var(--surface); }

.shortlist-page { max-width: 900px; margin: 0 auto; padding: 20px; }

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  margin-bottom: 24px;
}

.page-header h1 { flex: 1; font-size: 24px; }

.vendor-card {
  display: flex;
  gap: 20px;
  padding: 20px;
  margin-bottom: 16px;
  cursor: pointer;
  align-items: flex-start;
  transition: all 0.2s;
}

.vendor-card:hover { transform: translateX(4px); }

.vendor-image {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
  flex-shrink: 0;
}

.vendor-details { flex: 1; }

.vendor-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.vendor-category {
  color: var(--primary);
  font-size: 13px;
  margin-bottom: 8px;
  font-weight: 500;
}

.rating { margin: 8px 0; }

.rating span { color: #f59e0b; }

.vendor-stats {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  font-size: 14px;
}

.vendor-stats i { color: var(--primary); margin-right: 4px; }

.empty-state {
  text-align: center;
  padding: 60px 24px;
}

.empty-state i { font-size: 48px; color: var(--text-secondary); margin-bottom: 20px; }

.empty-state h3 { margin-bottom: 10px; }

@media (max-width: 768px) {
  .shortlist-page { padding: 16px; }
  .page-header { padding: 12px 16px; gap: 12px; }
  .page-header h1 { font-size: 20px; }
  .vendor-card { padding: 16px; gap: 16px; }
  .vendor-image { width: 80px; height: 80px; }
  .vendor-stats { gap: 12px; font-size: 12px; }
}
</style>

<script>
let shortlist = [];

document.addEventListener('DOMContentLoaded', loadShortlist);

async function loadShortlist() {
    try {
        const data = await api.getShortlist();
        shortlist = data.shortlist || [];
        renderShortlist();
    } catch (error) {
        console.error('Error loading shortlist:', error);
    }
}

function renderShortlist() {
    const container = document.getElementById('shortlistContent');
    
    if (!shortlist.length) {
        container.innerHTML = `
            <div class="empty-state glass-card">
                <i class="fas fa-bookmark" style="font-size: 48px; color: var(--text-secondary); margin-bottom: 20px;"></i>
                <h3>No saved vendors yet</h3>
                <p>Save vendors to quickly access them later</p>
                <button class="btn btn-primary" onclick="window.location.href='/pages/customer/map.html'">
                    Explore Vendors
                </button>
            </div>
        `;
        return;
    }
    
    container.innerHTML = shortlist.map(v => `
        <div class="vendor-card glass-card" onclick="viewVendor('${v.id}')">
            <img src="${v.logo || '/assets/images/default-vendor.png'}" class="vendor-image">
            <div class="vendor-details">
                <div class="vendor-name">${v.business_name}</div>
                <div class="vendor-category">${v.category}</div>
                <div class="rating">${'★'.repeat(Math.floor(v.rating || 0))}${'☆'.repeat(5 - Math.floor(v.rating || 0))} ${v.rating || 0}</div>
                <p><i class="fas fa-map-marker-alt"></i> ${v.address || 'No address'}</p>
                <div class="vendor-stats">
                    <span><i class="fas fa-star"></i> ${v.review_count || 0} reviews</span>
                    <span><i class="fas fa-eye"></i> ${v.traffic_count || 0} views</span>
                </div>
            </div>
            <button class="btn btn-outline" onclick="event.stopPropagation(); removeFromShortlist('${v.id}')">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    `).join('');
}

async function removeFromShortlist(vendorId) {
    try {
        await api.removeFromShortlist(vendorId);
        shortlist = shortlist.filter(v => v.id !== vendorId);
        renderShortlist();
        showToast('Removed from shortlist', 'success');
    } catch (error) {
        showToast('Failed to remove', 'error');
    }
}

function viewVendor(id) {
    window.location.href = `/pages/customer/vendor-profile.html?id=${id}`;
}

function exportShortlist() {
    const data = shortlist.map(v => `${v.business_name},${v.category},${v.address},${v.rating}`).join('\n');
    const blob = new Blob([data], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-shortlist.csv';
    a.click();
}
</script>

<div class="profile-page">
    <div class="page-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>My Profile</h1>
        <button class="btn btn-outline" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <div class="profile-content">
        <div class="profile-header glass-card">
            <div class="cover-image">
                <img id="coverImage" src="/assets/images/default-cover.jpg" alt="Cover">
                <button class="btn btn-outline cover-edit" onclick="uploadCover()">
                    <i class="fas fa-camera"></i>
                </button>
            </div>
            <div class="profile-avatar-container">
                <img id="profileAvatar" src="/assets/images/default-avatar.png" alt="Avatar">
                <button class="btn btn-outline avatar-edit" onclick="uploadAvatar()">
                    <i class="fas fa-camera"></i>
                </button>
            </div>
            <div class="profile-info">
                <h2 id="profileName">Loading...</h2>
                <p id="profileEmail"></p>
                <p id="profilePhone"></p>
                <button class="btn btn-primary" onclick="editProfile()">Edit Profile</button>
            </div>
        </div>

        <div class="profile-stats glass-card">
            <div class="stat-item" onclick="viewActivities()">
                <div class="stat-value" id="reviewCount">0</div>
                <div class="stat-label">Reviews</div>
            </div>
            <div class="stat-item" onclick="viewPosts()">
                <div class="stat-value" id="postCount">0</div>
                <div class="stat-label">Posts</div>
            </div>
            <div class="stat-item" onclick="viewShortlist()">
                <div class="stat-value" id="shortlistCount">0</div>
                <div class="stat-label">Saved</div>
            </div>
            <div class="stat-item" onclick="viewLikes()">
                <div class="stat-value" id="likesCount">0</div>
                <div class="stat-label">Likes</div>
            </div>
        </div>

        <div class="profile-sections">
            <div class="section-card glass-card">
                <h3>Feed Preferences</h3>
                <div id="preferencesList" class="preferences-list"></div>
            </div>

            <div class="section-card glass-card">
                <h3>Privacy Settings</h3>
                <div class="setting-item">
                    <span>Share my location</span>
                    <label class="toggle">
                        <input type="checkbox" id="shareLocation" checked onchange="savePrivacySetting('location', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Show my activity</span>
                    <label class="toggle">
                        <input type="checkbox" id="showActivity" checked onchange="savePrivacySetting('activity', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="section-card glass-card">
                <h3>Sync Settings</h3>
                <div class="setting-item">
                    <span>Offline mode</span>
                    <label class="toggle">
                        <input type="checkbox" id="offlineMode" onchange="toggleOfflineMode(this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="btn btn-outline" onclick="syncService.sync()">
                    <i class="fas fa-sync-alt"></i> Sync Now
                </button>
            </div>

            <div class="section-card glass-card">
                <h3>Traffic Alert Settings</h3>
                <div class="setting-item">
                    <span>Notify me of high traffic</span>
                    <label class="toggle">
                        <input type="checkbox" id="trafficAlerts" onchange="saveAlertSetting('traffic', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <button class="btn btn-secondary logout-btn" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>

<style>
.profile-page { max-width: 700px; margin: 0 auto; padding: 20px; }
.profile-content { display: flex; flex-direction: column; gap: 20px; }
.profile-header { padding: 0; overflow: hidden; }
.cover-image { position: relative; height: 150px; }
.cover-image img { width: 100%; height: 100%; object-fit: cover; }
.cover-edit { position: absolute; bottom: 12px; right: 12px; }
.profile-avatar-container { position: relative; margin-top: -50px; padding: 0 24px; }
.profile-avatar-container img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
.avatar-edit { position: absolute; bottom: 0; left: 100px; width: 36px; height: 36px; padding: 0; border-radius: 50%; }
.profile-info { padding: 20px 24px 24px; }
.profile-stats { display: grid; grid-template-columns: repeat(4, 1fr); padding: 20px; text-align: center; }
.stat-item { cursor: pointer; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--text-secondary); }
.section-card { padding: 20px; }
.setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
.preferences-list { display: flex; flex-wrap: wrap; gap: 8px; }
.preference-tag { padding: 6px 14px; background: rgba(0,0,0,0.04); border-radius: 40px; font-size: 13px; cursor: pointer; }
.preference-tag.selected { background: var(--primary); color: white; }
.logout-btn { width: 100%; margin-top: 20px; padding: 14px; }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 24px; transition: .2s; }
.toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider { background: var(--primary); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
</style>

<script>
let userData = null;
let selectedCategories = [];

document.addEventListener('DOMContentLoaded', loadProfile);

async function loadProfile() {
    try {
        userData = await api.getCurrentUser();
        renderProfile(userData);
        loadStats();
        loadPreferences();
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

function renderProfile(user) {
    document.getElementById('profileName').textContent = user.full_name || 'User';
    document.getElementById('profileEmail').textContent = user.email;
    document.getElementById('profilePhone').textContent = user.phone || 'No phone';
    
    if (user.avatar) {
        document.getElementById('profileAvatar').src = user.avatar;
    }
    
    if (user.category_preferences) {
        selectedCategories = user.category_preferences.split(',');
    }
}

async function loadStats() {
    try {
        const data = await api.request('/customer/analytics');
        document.getElementById('reviewCount').textContent = data.reviews_written || 0;
        document.getElementById('postCount').textContent = data.posts_created || 0;
        document.getElementById('shortlistCount').textContent = data.vendors_shortlisted || 0;
        document.getElementById('likesCount').textContent = data.likes_given || 0;
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

function loadPreferences() {
    const categories = ['Street Foods', 'Dimsum', 'Snacks', 'Rice Meals', 'Refreshments', 'Bakery', 'Coffee Shop'];
    const container = document.getElementById('preferencesList');
    
    container.innerHTML = categories.map(cat => `
        <span class="preference-tag ${selectedCategories.includes(cat) ? 'selected' : ''}" onclick="togglePreference('${cat}')">
            ${cat}
        </span>
    `).join('');
}

function togglePreference(category) {
    if (selectedCategories.includes(category)) {
        selectedCategories = selectedCategories.filter(c => c !== category);
    } else {
        selectedCategories.push(category);
    }
    loadPreferences();
    savePreferences();
}

async function savePreferences() {
    try {
        await api.request('/user/settings', {
            method: 'POST',
            body: JSON.stringify({ category_preferences: selectedCategories.join(',') })
        });
    } catch (error) {
        console.error('Error saving preferences:', error);
    }
}

async function savePrivacySetting(key, value) {
    try {
        await api.request('/user/settings', {
            method: 'POST',
            body: JSON.stringify({ [`privacy_${key}`]: value })
        });
        showToast('Setting saved', 'success');
    } catch (error) {
        console.error('Error saving setting:', error);
    }
}

async function saveAlertSetting(key, value) {
    try {
        await api.request('/user/settings', {
            method: 'POST',
            body: JSON.stringify({ [`alert_${key}`]: value })
        });
        showToast('Alert setting saved', 'success');
    } catch (error) {
        console.error('Error saving alert:', error);
    }
}

function toggleOfflineMode(enabled) {
    if (enabled) {
        localDB.init();
        syncService.sync();
        showToast('Offline mode enabled', 'success');
    }
}

function editProfile() {
    const user = userData;
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal glass-card">
            <h3>Edit Profile</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editName" class="form-control" value="${user.full_name || ''}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="editPhone" class="form-control" value="${user.phone || ''}">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="editBio" class="form-control" rows="3">${user.bio || ''}</textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProfile()">Save</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
    });
}

async function saveProfile() {
    const name = document.getElementById('editName').value;
    const phone = document.getElementById('editPhone').value;
    const bio = document.getElementById('editBio').value;
    
    try {
        await api.request('/user/profile', {
            method: 'PUT',
            body: JSON.stringify({ full_name: name, phone, bio })
        });
        document.querySelector('.modal-overlay').remove();
        showToast('Profile updated', 'success');
        loadProfile();
    } catch (error) {
        showToast('Failed to update profile', 'error');
    }
}

function uploadAvatar() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            const result = await imageHandler.uploadImage(file, 'avatar');
            await api.request('/user/profile', {
                method: 'PUT',
                body: JSON.stringify({ avatar: result.url })
            });
            loadProfile();
            showToast('Avatar updated', 'success');
        }
    };
    input.click();
}

function uploadCover() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            const result = await imageHandler.uploadImage(file, 'cover');
            await api.request('/user/profile', {
                method: 'PUT',
                body: JSON.stringify({ cover_image: result.url })
            });
            document.getElementById('coverImage').src = result.url;
            showToast('Cover updated', 'success');
        }
    };
    input.click();
}

function openSettings() {
    window.location.href = '/pages/customer/settings.html';
}

function viewActivities() {
    window.location.href = '/pages/customer/activities.html';
}

function viewPosts() {
    window.location.href = '/pages/customer/news-feed.html?filter=my';
}

function viewShortlist() {
    window.location.href = '/pages/customer/shortlist.html';
}

function viewLikes() {
    window.location.href = '/pages/customer/activities.html?filter=likes';
}

function handleLogout() {
    confirmDialog('Are you sure you want to logout?', () => {
        auth.logout();
        window.location.href = '/';
    });
}
</script>

<div class="search-page">
    <div class="search-header glass-card">
        <button class="btn btn-outline" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="search-input-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchQuery" class="form-control" placeholder="Search...">
        </div>
        <button class="btn btn-primary" onclick="performSearch()">Search</button>
    </div>

    <div class="search-tabs glass-card">
        <button class="tab-btn active" onclick="switchTab('all')">All</button>
        <button class="tab-btn" onclick="switchTab('vendors')">Vendors</button>
        <button class="tab-btn" onclick="switchTab('products')">Products</button>
    </div>

    <div id="searchResults" class="search-results"></div>
</div>

<style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; }
h1, h2, h3, h4, h5, h6 { font-weight: 600; }
.glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); box-shadow: var(--shadow); }
.btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }
.form-control { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 14px; background: rgba(255, 255, 255, 0.6); color: var(--text-primary); transition: all 0.3s; }
.form-control:focus { outline: none; border-color: var(--primary); background: var(--surface); }
.search-page { max-width: 900px; margin: 0 auto; padding: 20px; }
.search-header { display: flex; gap: 12px; padding: 12px 20px; margin-bottom: 20px; }
.search-input-container { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); padding: 0 16px; border-radius: 12px; backdrop-filter: blur(20px); }
.search-input-container input { background: transparent; border: none; flex: 1; outline: none; color: var(--text-primary); }
.search-tabs { display: flex; gap: 8px; padding: 8px; margin-bottom: 24px; }
.tab-btn { padding: 10px 24px; border: none; background: transparent; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; color: var(--text-primary); }
.tab-btn.active { background: var(--primary); color: white; }
.tab-btn:hover { background: rgba(15, 92, 47, 0.1); }
.search-results { margin-top: 20px; }
.search-results h3 { margin-top: 20px; margin-bottom: 12px; font-size: 16px; }
.result-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
.result-item:hover { transform: translateX(4px); box-shadow: var(--shadow); }
.result-item h4 { margin-bottom: 4px; }
.result-item p { font-size: 13px; color: var(--text-secondary); }
@media (max-width: 768px) {
  .search-page { padding: 16px; }
  .search-header { padding: 8px 16px; flex-wrap: wrap; }
  .search-tabs { flex-wrap: wrap; }
  .tab-btn { padding: 8px 16px; font-size: 13px; }
}
</style>

<script>
let currentTab = 'all';
let currentQuery = '';

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    currentQuery = params.get('q') || '';
    document.getElementById('searchQuery').value = currentQuery;
    if (currentQuery) performSearch();
});

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    performSearch();
}

async function performSearch() {
    const query = document.getElementById('searchQuery').value;
    if (!query) return;
    
    try {
        const data = await api.search(query, currentTab);
        renderResults(data);
    } catch (error) {
        console.error('Search error:', error);
    }
}

function renderResults(data) {
    const container = document.getElementById('searchResults');
    let html = '';
    
    if (data.vendors?.length) {
        html += '<h3>Vendors</h3>';
        html += data.vendors.map(v => `
            <div class="result-item" onclick="viewVendor('${v.id}')">
                <h4>${v.business_name}</h4>
                <p>${v.category}</p>
                <p>⭐ ${v.rating || 0}</p>
            </div>
        `).join('');
    }
    
    if (data.products?.length) {
        html += '<h3>Products</h3>';
        html += data.products.map(p => `
            <div class="result-item" onclick="viewProduct('${p.id}')">
                <h4>${p.name}</h4>
                <p>${p.vendor_name}</p>
                <p>₱${p.price || 0}</p>
            </div>
        `).join('');
    }
    
    container.innerHTML = html || '<p class="glass-card" style="padding: 40px; text-align: center;">No results found</p>';
}

function viewVendor(id) {
    window.location.href = `/pages/guest/vendor-profile.html?id=${id}`;
}

function viewProduct(id) {
    window.location.href = `/pages/guest/product-detail.html?id=${id}`;
}
</script>

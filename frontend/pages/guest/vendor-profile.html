<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lako - Vendor Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
h1, h2, h3, h4, h5, h6 { font-weight: 600; }
.glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); box-shadow: var(--shadow); }
.btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }
.btn-exit { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.logo { font-size: 24px; font-weight: 700; color: var(--primary); }
.content { max-width: 1000px; margin: 0 auto; padding: 20px; }
.back-btn { margin-bottom: 20px; }
.cover-image { height: 200px; border-radius: 20px; overflow: hidden; margin-bottom: -40px; border: 1px solid var(--border); }
.cover-image img { width: 100%; height: 100%; object-fit: cover; }
.profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); padding: 24px; margin-bottom: 24px; }
.profile-header { display: flex; gap: 20px; align-items: flex-end; }
.profile-logo { width: 100px; height: 100px; border-radius: 16px; border: 4px solid white; object-fit: cover; margin-top: -20px; }
.profile-info h1 { margin-bottom: 4px; }
.category { color: var(--primary); margin-bottom: 8px; }
.rating { color: #f59e0b; margin-bottom: 16px; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 20px 0; }
.info-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.info-item i { color: var(--primary); }
.guest-message { background: rgba(15, 92, 47, 0.05); border-radius: 20px; padding: 20px; margin: 24px 0; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
.guest-message a { color: var(--primary); font-weight: 600; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 16px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px; cursor: pointer; transition: all 0.2s; }
.product-card:hover { transform: translateY(-2px); }
.product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
.product-price { font-size: 16px; font-weight: 700; color: var(--primary); }
.reviews-list { margin-top: 16px; }
.review-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.review-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
@media (max-width: 768px) {
  .header { margin: 12px; padding: 12px 16px; }
  .content { padding: 16px; }
  .profile-card { padding: 16px; }
  .info-grid { grid-template-columns: 1fr; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">lako</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="window.location.href='/pages/login.html'">Sign In</button>
            <button class="btn btn-exit" onclick="exitGuestMode()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>
    
    <div class="content">
        <button class="btn btn-outline back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
        <div id="vendorContent">Loading...</div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        const urlParams = new URLSearchParams(window.location.search);
        const vendorId = urlParams.get('id');
        
        function exitGuestMode() { localStorage.removeItem('user_role'); window.location.href = '/'; }
        
        async function loadVendor() {
            try {
                const res = await fetch(`${API_BASE}/guest/vendors/${vendorId}`);
                const data = await res.json();
                const vendor = data.vendor;
                const products = data.products || [];
                const reviews = data.reviews || [];
                
                document.getElementById('vendorContent').innerHTML = `
                    <div class="cover-image">
                        <img src="${vendor.cover_image || 'https://via.placeholder.com/1200x200/0f5c2f/ffffff?text=' + encodeURIComponent(vendor.name)}" alt="Cover">
                    </div>
                    <div class="profile-card">
                        <div class="profile-header">
                            <img src="${vendor.logo || 'https://via.placeholder.com/100/0f5c2f/ffffff?text=' + vendor.name.charAt(0)}" class="profile-logo">
                            <div class="profile-info">
                                <h1>${vendor.name}</h1>
                                <div class="category">${vendor.category}</div>
                                <div class="rating">${'★'.repeat(Math.floor(vendor.rating||0))}${'☆'.repeat(5-Math.floor(vendor.rating||0))} ${vendor.rating || 0} (${vendor.review_count || 0} reviews)</div>
                            </div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-item"><i class="fas fa-map-marker-alt"></i> ${vendor.address || 'Address not set'}</div>
                            <div class="info-item"><i class="fas fa-phone"></i> ${vendor.phone || 'No phone'}</div>
                            <div class="info-item"><i class="fas fa-clock"></i> ${vendor.business_hours || 'Hours not set'}</div>
                            <div class="info-item"><i class="fas fa-chart-line"></i> ${vendor.traffic_count || 0} views</div>
                        </div>
                        
                        <p><strong>About:</strong> ${vendor.description || 'No description available.'}</p>
                        
                        <div class="guest-message">
                            <i class="fas fa-lock" style="font-size: 24px;"></i>
                            <span>Want to chat with this vendor or save to favorites? <a href="/pages/login.html">Sign in</a> or <a href="/pages/register.html">create an account</a>!</span>
                        </div>
                    </div>
                    
                    <div class="profile-card">
                        <h2><i class="fas fa-box"></i> Products (${products.length})</h2>
                        <div class="products-grid">
                            ${products.length ? products.map(p => `
                                <div class="product-card" onclick="viewProduct('${p.id}')">
                                    <img src="${p.image || 'https://via.placeholder.com/200/0f5c2f/ffffff?text=Product'}">
                                    <h4>${p.name}</h4>
                                    <div class="product-price">₱${p.price || 0}</div>
                                    <small>⭐ ${p.rating || 0} (${p.review_count || 0})</small>
                                </div>
                            `).join('') : '<p>No products yet</p>'}
                        </div>
                    </div>
                    
                    <div class="profile-card">
                        <h2><i class="fas fa-star"></i> Reviews (${reviews.length})</h2>
                        <div class="reviews-list">
                            ${reviews.length ? reviews.slice(0, 5).map(r => `
                                <div class="review-card">
                                    <div class="review-header">
                                        <strong>${r.customer_name || 'Customer'}</strong>
                                        <span>${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                                    </div>
                                    ${r.title ? `<h4>${r.title}</h4>` : ''}
                                    <p>${r.comment || ''}</p>
                                    <small>${new Date(r.created_at).toLocaleDateString()}</small>
                                </div>
                            `).join('') : '<p>No reviews yet</p>'}
                        </div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }
        
        function viewProduct(id) { window.location.href = `product-detail.html?id=${id}`; }
        
        if (vendorId) loadVendor();
    </script>
</body>
</html>

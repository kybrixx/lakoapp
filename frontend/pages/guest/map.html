<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lako - Map View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
h1, h2, h3, h4, h5, h6 { font-weight: 600; }
.btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-exit { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.logo { font-size: 24px; font-weight: 700; color: var(--primary); }
#map { flex: 1; width: 100%; border-radius: 20px; margin: 0 20px 20px; border: 1px solid var(--border); }
.map-controls { position: absolute; bottom: 100px; right: 40px; display: flex; flex-direction: column; gap: 8px; background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 48px; box-shadow: var(--shadow); backdrop-filter: blur(20px); }
.control-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 18px; color: var(--primary); transition: all 0.2s; }
.control-btn:hover { background: var(--primary); color: white; }
@media (max-width: 768px) {
  .header { margin: 12px; padding: 12px 16px; }
  #map { margin: 0 12px 12px; }
  .map-controls { bottom: 80px; right: 20px; }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">lako</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="window.location.href='/pages/login.html'">Sign In</button>
            <button class="btn btn-exit" onclick="exitGuestMode()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>
    
    <div id="map"></div>
    
    <div class="map-controls">
        <button class="control-btn" onclick="centerOnUser()"><i class="fas fa-location-dot"></i></button>
        <button class="control-btn" onclick="toggleHeatmap()"><i class="fas fa-fire"></i></button>
        <button class="control-btn" onclick="window.location.href='browse.html'"><i class="fas fa-list"></i></button>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        let map, currentLocation;
        
        function exitGuestMode() { localStorage.removeItem('user_role'); window.location.href = '/'; }
        
        map = L.map('map').setView([14.5995, 120.9842], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setView([currentLocation.lat, currentLocation.lng], 14);
                L.marker([currentLocation.lat, currentLocation.lng]).addTo(map).bindPopup('You are here');
                loadVendors();
            });
        }
        
        async function loadVendors() {
            const res = await fetch(`${API_BASE}/guest/vendors?lat=${currentLocation?.lat || 14.5995}&lng=${currentLocation?.lng || 120.9842}`);
            const data = await res.json();
            data.vendors?.forEach(v => {
                if (v.latitude && v.longitude) {
                    L.marker([v.latitude, v.longitude]).addTo(map).bindPopup(`<b>${v.name}</b><br>${v.category}<br><a href="vendor-profile.html?id=${v.id}">View Details</a>`);
                }
            });
        }
        
        function centerOnUser() { if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 14); }
        function toggleHeatmap() { alert('Heatmap coming soon!'); }
    </script>
</body>
</html>

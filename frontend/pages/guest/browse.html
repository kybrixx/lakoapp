<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f5c2f">
    <link rel="manifest" href="/manifest.json">
    <title>Lako - Guest Browse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/universal.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
h1, h2, h3, h4, h5, h6 { font-weight: 600; }
.btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: rgba(255, 255, 255, 0.3); }
.btn-exit { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.logo { font-size: 24px; font-weight: 700; color: var(--primary); }
.guest-badge { background: rgba(0, 0, 0, 0.06); padding: 8px 20px; border-radius: 48px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.header-actions { display: flex; gap: 12px; }
.banner { margin: 0 20px 24px; padding: 16px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; text-align: center; backdrop-filter: blur(20px); }
.banner a { color: var(--primary); font-weight: 600; text-decoration: none; }
.content { max-width: 1200px; margin: 0 auto; padding: 0 20px 20px; }
.search-bar { display: flex; gap: 12px; margin-bottom: 24px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.search-bar input { flex: 1; padding: 14px 20px; border: none; background: transparent; outline: none; font-size: 15px; color: var(--text-primary); }
.search-bar button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 48px; cursor: pointer; font-weight: 600; }
.category-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.category-btn { padding: 8px 20px; border: none; background: transparent; border-radius: 48px; cursor: pointer; font-size: 14px; transition: all 0.2s; color: var(--text-primary); }
.category-btn:hover { background: rgba(0, 0, 0, 0.04); }
.category-btn.active { background: var(--primary); color: white; }
.map-container { width: 100%; height: 350px; border-radius: 20px; overflow: hidden; margin-bottom: 24px; border: 1px solid var(--border); }
.map-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.map-controls .btn { transition: all 0.2s ease; }
.map-controls .btn.active { background: #dc2626 !important; color: white !important; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.vendors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
.vendor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); padding: 20px; cursor: pointer; transition: all 0.2s; }
.vendor-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.vendor-card h3 { margin-bottom: 4px; color: var(--text-primary); }
.vendor-card p { color: var(--text-secondary); font-size: 14px; }
.rating { color: #f59e0b; margin: 8px 0; }
.distance { font-size: 13px; color: var(--text-secondary); }
.vendor-meta { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; }
.footer { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
@media (max-width: 768px) {
  .header { margin: 12px; padding: 12px 16px; }
  .banner { margin: 0 12px 16px; padding: 12px 16px; }
  .content { padding: 0 12px 16px; }
  .search-bar { padding: 6px; margin-bottom: 16px; }
  .vendors-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .map-container { height: 280px; }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">lako</div>
        <div class="guest-badge"><i class="fas fa-eye"></i> Guest Mode</div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="window.location.href='/pages/login.html'">Sign In</button>
            <button class="btn btn-outline" onclick="window.location.href='/pages/register.html'">Register</button>
            <button class="btn btn-exit" onclick="exitGuestMode()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>
    
    <div class="banner">
        <i class="fas fa-info-circle"></i> You're browsing as a guest — <a href="/pages/login.html">sign in</a> for full access to chat, save vendors, and more!
    </div>
    
    <div class="content">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #5a6e5a; padding-left: 8px;"></i>
            <input type="text" id="searchInput" placeholder="Search vendors, products, or categories...">
            <button onclick="performSearch()">Search</button>
        </div>
        
        <div class="category-filters">
            <button class="category-btn active" onclick="filterCategory('all')">All</button>
            <button class="category-btn" onclick="filterCategory('Pancit')">Pancit</button>
            <button class="category-btn" onclick="filterCategory('Pares')">Pares</button>
            <button class="category-btn" onclick="filterCategory('Isaw')">Isaw/Tuhog</button>
            <button class="category-btn" onclick="filterCategory('Chicken')">Chicken</button>
            <button class="category-btn" onclick="filterCategory('Corndogs')">Corndogs</button>
            <button class="category-btn" onclick="filterCategory('Coffee')">Coffee</button>
            <button class="category-btn" onclick="filterCategory('Sari-Sari Store')">Sari-Sari Store</button>
        </div>
        
        <div class="map-container" id="map"></div>
        
        <div class="map-controls">
            <button class="btn btn-outline" onclick="toggleHeatmap()"><i class="fas fa-fire"></i> Heatmap</button>
            <button class="btn btn-outline" onclick="centerOnUser()"><i class="fas fa-location-dot"></i> My Location</button>
            <select id="radiusFilter" onchange="changeRadius()" style="padding: 10px 16px; border-radius: 40px; border: 1px solid #ddd;">
                <option value="5">5 km</option>
                <option value="10" selected>10 km</option>
                <option value="20">20 km</option>
                <option value="50">50 km</option>
            </select>
        </div>
        
        <div class="section-header">
            <h2><i class="fas fa-store"></i> Vendors Near You</h2>
            <span id="vendorCount">0 vendors</span>
        </div>
        
        <div class="vendors-grid" id="vendorsList"></div>
    </div>
    
    <div class="footer">
        <p>© 2024 Lako. All rights reserved.</p>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        let map, heatmapLayer, currentLocation, vendors = [], currentCategory = 'all', heatmapActive = false;
        
        function exitGuestMode() {
            localStorage.removeItem('user_role');
            window.location.href = '/';
        }
        
        // Initialize map
        map = L.map('map').setView([14.5995, 120.9842], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        // Get user location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setView([currentLocation.lat, currentLocation.lng], 14);
                L.marker([currentLocation.lat, currentLocation.lng]).addTo(map).bindPopup('You are here').openPopup();
                loadVendors();
            }, () => {
                currentLocation = { lat: 14.5995, lng: 120.9842 };
                loadVendors();
            });
        } else {
            currentLocation = { lat: 14.5995, lng: 120.9842 };
            loadVendors();
        }
        
        async function loadVendors() {
            const radius = document.getElementById('radiusFilter').value;
            try {
                const res = await fetch(`${API_BASE}/guest/vendors?lat=${currentLocation.lat}&lng=${currentLocation.lng}&radius=${radius}`);
                const data = await res.json();
                vendors = data.vendors || [];
                renderVendors();
                document.getElementById('vendorCount').textContent = vendors.length + ' vendors';
            } catch (e) { console.error(e); }
        }
        
        function renderVendors() {
            // Clear existing markers
            map.eachLayer(layer => { if (layer instanceof L.Marker && !layer.getPopup().getContent().includes('You are here')) map.removeLayer(layer); });
            
            const filtered = currentCategory === 'all' ? vendors : vendors.filter(v => v.category === currentCategory);
            
            filtered.forEach(v => {
                if (v.latitude && v.longitude) {
                    const distance = calculateDistance(currentLocation.lat, currentLocation.lng, v.latitude, v.longitude);
                    L.marker([v.latitude, v.longitude])
                        .addTo(map)
                        .bindPopup(`<b>${v.name}</b><br>${v.category}<br>⭐ ${v.rating || 0}<br>📏 ${distance.toFixed(1)} km`);
                }
            });
            
            document.getElementById('vendorsList').innerHTML = filtered.map(v => {
                const distance = calculateDistance(currentLocation.lat, currentLocation.lng, v.latitude, v.longitude);
                return `
                    <div class="vendor-card" onclick="viewVendor('${v.id}')">
                        <h3>${v.name}</h3>
                        <p>${v.category}</p>
                        <div class="rating">${'★'.repeat(Math.floor(v.rating||0))}${'☆'.repeat(5-Math.floor(v.rating||0))} ${v.rating || 0}</div>
                        <p><i class="fas fa-map-marker-alt"></i> ${v.address || 'Address not set'}</p>
                        <div class="vendor-meta">
                            <span class="distance"><i class="fas fa-location-dot"></i> ${distance.toFixed(1)} km</span>
                            <span><i class="fas fa-eye"></i> ${v.traffic_count || 0} views</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function calculateDistance(lat1, lng1, lat2, lng2) {
            if (!lat1 || !lng1 || !lat2 || !lng2) return 0;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderVendors();
        }
        
        async function toggleHeatmap() {
            const btn = event.target.closest('.btn');
            if (heatmapActive) {
                hideHeatmap();
                btn.classList.remove('active');
            } else {
                await showHeatmap();
                btn.classList.add('active');
            }
        }
        
        async function showHeatmap() {
            try {
                const res = await fetch(`${API_BASE}/guest/heatmap`);
                const data = await res.json();
                const points = data.points.map(p => [p.latitude, p.longitude, p.weight || 1]);
                
                if (typeof L !== 'undefined' && L.heatLayer) {
                    if (heatmapLayer) map.removeLayer(heatmapLayer);
                    heatmapLayer = L.heatLayer(points, {
                        radius: 25,
                        blur: 15,
                        maxZoom: 17,
                        gradient: {
                            0.2: '#10b981',
                            0.4: '#84cc16',
                            0.6: '#eab308',
                            0.8: '#f97316',
                            1.0: '#dc2626'
                        }
                    }).addTo(map);
                    heatmapActive = true;
                }
            } catch (error) {
                console.error('Error loading heatmap:', error);
            }
        }
        
        function hideHeatmap() {
            if (heatmapLayer) {
                map.removeLayer(heatmapLayer);
                heatmapLayer = null;
                heatmapActive = false;
            }
        }
        
        function changeRadius() { loadVendors(); }
        function centerOnUser() { if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 14); }
        function performSearch() { alert('Search: ' + document.getElementById('searchInput').value); }
        function viewVendor(id) { window.location.href = `vendor-profile.html?id=${id}`; }
    </script>
</body>
</html>

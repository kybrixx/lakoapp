<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lako - Product Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
  --primary: #0f5c2f;
  --primary-dark: #0a4a25;
  --secondary: #5a6e5a;
  --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
  --surface: rgba(255, 255, 255, 0.85);
  --text-primary: #1a2a1f;
  --text-secondary: #5a6e5a;
  --border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
h1, h2, h3, h4, h5, h6 { font-weight: 600; }
.btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-exit { background: rgba(220, 38, 38, 0.1); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 48px; backdrop-filter: blur(20px); }
.logo { font-size: 24px; font-weight: 700; color: var(--primary); }
.content { max-width: 800px; margin: 0 auto; padding: 20px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); padding: 30px; }
.product-image { width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
h1 { margin-bottom: 8px; }
.vendor-link { color: var(--primary); cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.vendor-link:hover { opacity: 0.8; }
.price { font-size: 32px; font-weight: 700; color: var(--primary); margin: 16px 0; }
.meta { display: flex; gap: 20px; margin: 16px 0; font-size: 14px; }
.guest-message { background: rgba(15, 92, 47, 0.05); border-radius: 20px; padding: 20px; margin-top: 24px; border: 1px solid var(--border); }
.guest-message a { color: var(--primary); font-weight: 600; }
@media (max-width: 768px) {
  .header { margin: 12px; padding: 12px 16px; }
  .content { padding: 16px; }
  .product-card { padding: 20px; }
  .price { font-size: 24px; }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">lako</div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="window.location.href='/pages/login.html'">Sign In</button>
            <button class="btn btn-exit" onclick="exitGuestMode()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
    </div>
    
    <div class="content">
        <button class="btn" style="background:transparent; margin-bottom:20px;" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
        <div id="productContent">Loading...</div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        function exitGuestMode() { localStorage.removeItem('user_role'); window.location.href = '/'; }
        
        async function loadProduct() {
            try {
                const res = await fetch(`${API_BASE}/guest/products/${productId}`);
                const data = await res.json();
                const p = data.product;
                
                document.getElementById('productContent').innerHTML = `
                    <div class="product-card">
                        <img src="${p.image || 'https://via.placeholder.com/400/0f5c2f/ffffff?text=Product'}" class="product-image">
                        <h1>${p.name}</h1>
                        <p class="vendor-link" onclick="viewVendor('${p.vendor_id}')"><i class="fas fa-store"></i> ${p.vendor_name}</p>
                        <div>${'★'.repeat(Math.floor(p.rating||0))}${'☆'.repeat(5-Math.floor(p.rating||0))} ${p.rating || 0} (${p.review_count || 0} reviews)</div>
                        <div class="price">₱${p.price || 0}</div>
                        <p>${p.description || 'No description available.'}</p>
                        <div class="meta">
                            <span><i class="fas fa-box"></i> Stock: ${p.stock || 0}</span>
                            ${p.moq ? `<span><i class="fas fa-cubes"></i> MOQ: ${p.moq}</span>` : ''}
                        </div>
                        
                        <div class="guest-message">
                            <i class="fas fa-lock"></i>
                            <span>Want to chat with the vendor? <a href="/pages/login.html">Sign in</a> or <a href="/pages/register.html">create an account</a>!</span>
                        </div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }
        
        function viewVendor(id) { window.location.href = `vendor-profile.html?id=${id}`; }
        
        if (productId) loadProduct();
    </script>
</body>
</html>

<div class="product-detail-page">
    <button class="btn btn-outline back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <div id="productContent"></div>
</div>

<style>
.product-detail-page { max-width: 800px; margin: 0 auto; padding: 20px; }
</style>

<script>
let productId = null;

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    productId = params.get('id');
    if (productId) loadProduct();
});

async function loadProduct() {
    try {
        const data = await api.request(`/guest/products/${productId}`);
        renderProduct(data.product, data.reviews || []);
    } catch (error) {
        console.error('Error loading product:', error);
    }
}

function renderProduct(product, reviews) {
    document.getElementById('productContent').innerHTML = `
        <div class="glass-card product-main">
            <img src="${product.image || '/assets/images/placeholder.jpg'}" alt="${product.name}" class="product-image">
            <div class="product-info">
                <h1>${product.name}</h1>
                <p class="vendor-name" onclick="viewVendor('${product.vendor_id}')">
                    <i class="fas fa-store"></i> ${product.vendor_name}
                </p>
                <div class="price">₱${product.price || 0}</div>
                <div class="rating">
                    <span class="stars">${'★'.repeat(Math.floor(product.rating || 0))}${'☆'.repeat(5 - Math.floor(product.rating || 0))}</span>
                    <span>${product.rating || 0} (${product.review_count || 0} reviews)</span>
                </div>
                <p class="description">${product.description || 'No description'}</p>
                <p><i class="fas fa-box"></i> Stock: ${product.stock || 0}</p>
                ${product.moq ? `<p><i class="fas fa-cubes"></i> MOQ: ${product.moq}</p>` : ''}
            </div>
        </div>

        <div class="guest-message glass-card">
            <i class="fas fa-lock"></i>
            <span>Sign in to chat with the vendor or save this product!</span>
            <button class="btn btn-primary" onclick="window.location.href='/pages/login.html'">Sign In</button>
        </div>

        <div class="reviews-section glass-card">
            <h2>Reviews (${reviews.length})</h2>
            ${reviews.length ? reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <span>${r.customer_name || 'Customer'}</span>
                        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        <span>${formatTime(r.created_at)}</span>
                    </div>
                    <p>${r.comment || ''}</p>
                </div>
            `).join('') : '<p>No reviews yet</p>'}
        </div>
    `;
}

function viewVendor(id) {
    window.location.href = `/pages/guest/vendor-profile.html?id=${id}`;
}

function formatTime(t) { return t ? new Date(t).toLocaleDateString() : ''; }
</script>

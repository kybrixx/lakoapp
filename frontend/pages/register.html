<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f5c2f">
    <link rel="manifest" href="/manifest.json">
    <title>Lako - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/universal.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(125deg, #e2ece2 0%, #cde0cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        h1 { font-size: 28px; font-weight: 600; color: #1a2a1f; margin-bottom: 4px; text-align: center; }
        .subtitle { color: #5a6e5a; font-size: 13px; margin-bottom: 32px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #1a2a1f; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 28px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #0f5c2f; background: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #0f5c2f; color: white; }
        .btn-secondary { background: rgba(0,0,0,0.04); color: #1a2a1f; margin-top: 12px; border: 1px solid rgba(0,0,0,0.06); }
        .error {
            background: rgba(198,40,40,0.1);
            color: #b91c1c;
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .eula-box {
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 16px;
            font-size: 12px;
            color: #4a5a4a;
            margin-bottom: 16px;
        }
        .eula-check { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }

        /* Category Selection */
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .cat-btn {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .cat-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .cat-btn.selected {
            background: #0f5c2f;
            color: white;
            border-color: #0f5c2f;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>create account</h1>
        <div class="subtitle">join the community.</div>
        <div id="registerError" class="error"></div>
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>full name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>phone</label>
                <input type="tel" id="phone" placeholder="+63 xxx xxx xxxx">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>confirm</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
            </div>
            <div class="eula-box">
                <strong>📄 End User License Agreement</strong><br>
                By using Lako you agree to our terms. We collect location data to find nearby vendors.
            </div>
            <div class="eula-check">
                <input type="checkbox" id="eulaAccepted" required>
                <label for="eulaAccepted">I agree to the terms</label>
            </div>
            
            <div class="form-group">
                <label>Food Interests (Optional)</label>
                <div class="category-buttons" id="categoryButtons"></div>
            </div>
            
            <button type="submit" class="btn btn-primary">create account →</button>
        </form>
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">back to login</button>
    </div>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        const urlParams = new URLSearchParams(window.location.search);
        const isVendor = urlParams.get('type') === 'vendor';
        const categories = ['Pancit', 'Pares', 'Isaw', 'Chicken', 'Corndogs', 'Coffee', 'Sari-Sari Store'];
        let selectedCategories = [];
        
        document.addEventListener('DOMContentLoaded', () => {
            const categoryButtons = document.getElementById('categoryButtons');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'cat-btn';
                btn.textContent = cat;
                btn.onclick = (e) => {
                    e.preventDefault();
                    btn.classList.toggle('selected');
                    if (selectedCategories.includes(cat)) {
                        selectedCategories = selectedCategories.filter(c => c !== cat);
                    } else {
                        selectedCategories.push(cat);
                    }
                };
                categoryButtons.appendChild(btn);
            });
        });
        
        async function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('registerError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const endpoint = isVendor ? '/auth/register/vendor' : '/auth/register/customer';
                const body = { email, password, full_name: fullName, phone, eula_accepted: true };
                
                // Add category preferences for customers
                if (!isVendor && selectedCategories.length > 0) {
                    body.category_preferences = selectedCategories.join(',');
                }
                
                if (isVendor) {
                    body.business_name = fullName;
                    body.business_category = 'Pancit';
                    body.address = 'Not set';
                }
                
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user_role', data.role);
                    window.location.href = isVendor ? 'vendor/dashboard.html' : 'customer/dashboard.html';
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Network error';
                errorDiv.style.display = 'block';
            }
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>

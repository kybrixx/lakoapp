<div class="vendor-dashboard">
    <!-- Header -->
    <header class="app-header glass-card">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="logo">lako / vendor</a>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="goToInquiries()">
                <i class="fas fa-comment"></i>
                <span class="badge" id="inquiryBadge" style="display: none;">0</span>
            </button>
            <button class="header-btn" onclick="auth.logout(); window.location.href='/'">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card" id="sidebar">
            <nav class="sidebar-nav">
                <a class="nav-item active" onclick="loadSection('overview')">
                    <i class="fas fa-chart-pie"></i><span>Overview</span>
                </a>
                <a class="nav-item" onclick="loadSection('traffic')">
                    <i class="fas fa-chart-line"></i><span>Traffic</span>
                </a>
                <a class="nav-item" onclick="loadSection('catalog')">
                    <i class="fas fa-box"></i><span>Catalog</span>
                </a>
                <a class="nav-item" onclick="loadSection('posts')">
                    <i class="fas fa-newspaper"></i><span>Posts</span>
                </a>
                <a class="nav-item" onclick="loadSection('reviews')">
                    <i class="fas fa-star"></i><span>Reviews</span>
                </a>
                <a class="nav-item" onclick="loadSection('inquiries')">
                    <i class="fas fa-message"></i><span>Inquiries</span>
                </a>
                <a class="nav-item" onclick="loadSection('analytics')">
                    <i class="fas fa-chart-bar"></i><span>Analytics</span>
                </a>
                <a class="nav-item" onclick="loadSection('settings')">
                    <i class="fas fa-cog"></i><span>Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<style>
.vendor-dashboard { min-height: 100vh; display: flex; flex-direction: column; }
.dashboard-layout { display: flex; flex: 1; padding: 20px; gap: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
.sidebar { width: 280px; padding: 24px 16px; height: fit-content; position: sticky; top: 20px; }
.main-content { flex: 1; min-width: 0; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; text-align: center; border: 1px solid var(--border); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.product-table { background: var(--surface); border-radius: 24px; padding: 20px; }
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); align-items: center; }

@media (max-width: 768px) {
    .sidebar { display: none; position: fixed; top: 80px; left: 20px; right: 20px; z-index: 200; width: auto; }
    .sidebar.open { display: block; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .table-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>

<script>
let vendorData = null;

document.addEventListener('DOMContentLoaded', () => {
    if (!auth.requireRole(['vendor'])) return;
    loadVendorData();
    loadSection('overview');
});

async function loadVendorData() {
    try {
        vendorData = await api.getVendorDashboard();
    } catch (error) {
        console.error('Error loading vendor data:', error);
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

async function loadSection(section) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event?.target.closest('.nav-item')?.classList.add('active');
    
    const content = document.getElementById('mainContent');
    
    const loaders = {
        overview: loadOverview,
        traffic: loadTraffic,
        catalog: loadCatalog,
        posts: loadPosts,
        reviews: loadReviews,
        inquiries: loadInquiries,
        analytics: loadAnalytics,
        settings: loadSettings
    };
    
    if (loaders[section]) await loaders[section]();
}

async function loadOverview() {
    const data = vendorData || await api.getVendorDashboard();
    const content = document.getElementById('mainContent');
    
    content.innerHTML = `
        <div class="overview-container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${data.total_products || 0}</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value">${data.total_posts || 0}</div><div class="stat-label">Posts</div></div>
                <div class="stat-card"><div class="stat-value">${data.total_reviews || 0}</div><div class="stat-label">Reviews</div></div>
                <div class="stat-card"><div class="stat-value">${data.average_rating || 0}⭐</div><div class="stat-label">Rating</div></div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3>Recent Products</h3>
                <div id="recentProducts"></div>
            </div>
        </div>
    `;
    
    renderRecentProducts(data.recent_products || []);
}

function renderRecentProducts(products) {
    const container = document.getElementById('recentProducts');
    if (!products.length) {
        container.innerHTML = '<p class="text-secondary">No products yet</p>';
        return;
    }
    container.innerHTML = products.map(p => `
        <div class="table-row">
            <span><strong>${p.name}</strong></span>
            <span>${p.category || '-'}</span>
            <span>₱${p.price || 0}</span>
            <span>${p.review_count || 0} reviews</span>
            <span><button class="btn btn-outline" onclick="editProduct('${p.id}')">Edit</button></span>
        </div>
    `).join('');
}

async function loadTraffic() {
    const data = await api.getVendorTraffic();
    document.getElementById('mainContent').innerHTML = `
        <div class="traffic-container">
            <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
                <h2>Foot Traffic</h2>
                <div style="text-align: center; padding: 40px;">
                    <div class="stat-value" style="font-size: 64px;">${data.total_views || 0}</div>
                    <div class="stat-label">Total Store Views</div>
                </div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3>Traffic Level: ${data.level || 'Low'}</h3>
                <div id="trafficChart"></div>
            </div>
        </div>
    `;
}

async function loadCatalog() {
    const products = await api.getVendorProducts();
    document.getElementById('mainContent').innerHTML = `
        <div class="catalog-container">
            <div class="table-header">
                <h2>Product Catalog</h2>
                <button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>
            </div>
            <div class="product-table">
                ${products.products?.length ? products.products.map(p => `
                    <div class="table-row">
                        <span><strong>${p.name}</strong></span>
                        <span>${p.category || '-'}</span>
                        <span>₱${p.price || 0}</span>
                        <span>${p.stock || 0} in stock</span>
                        <span>
                            <button class="btn btn-outline" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-outline" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </span>
                    </div>
                `).join('') : '<p>No products yet</p>'}
            </div>
        </div>
    `;
}

async function loadPosts() {
    document.getElementById('mainContent').innerHTML = `
        <div class="posts-container">
            <div class="table-header">
                <h2>Your Posts</h2>
                <button class="btn btn-primary" onclick="showCreatePostModal()">+ Create Post</button>
            </div>
            <div id="vendorPosts"></div>
        </div>
    `;
    await loadVendorPosts();
}

async function loadVendorPosts() {
    try {
        const data = await api.request('/vendor/posts');
        const container = document.getElementById('vendorPosts');
        container.innerHTML = data.posts?.length ? data.posts.map(p => `
            <div class="post-card glass-card">
                <p>${p.content}</p>
                <div class="post-meta">
                    <span><i class="fas fa-heart"></i> ${p.likes || 0}</span>
                    <span>${formatTime(p.created_at)}</span>
                    <button class="btn btn-outline" onclick="deletePost('${p.id}')">Delete</button>
                </div>
            </div>
        `).join('') : '<p class="glass-card" style="padding: 24px;">No posts yet</p>';
    } catch (error) {
        console.error('Error loading posts:', error);
    }
}

function goToInquiries() {
    loadSection('inquiries');
}

function formatTime(timestamp) {
    if (!timestamp) return '';
    return new Date(timestamp).toLocaleDateString();
}
</script>

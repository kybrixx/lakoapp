<div class="vendor-dashboard">
    <!-- Header -->
    <header class="app-header glass-card">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="logo">lako / vendor</a>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="goToInquiries()">
                <i class="fas fa-comment"></i>
                <span class="badge" id="inquiryBadge" style="display: none;">0</span>
            </button>
            <button class="header-btn" onclick="auth.logout(); window.location.href='/'">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card" id="sidebar">
            <nav class="sidebar-nav">
                <a class="nav-item active" onclick="loadSection('overview')">
                    <i class="fas fa-chart-pie"></i><span>Overview</span>
                </a>
                <a class="nav-item" onclick="loadSection('traffic')">
                    <i class="fas fa-chart-line"></i><span>Traffic</span>
                </a>
                <a class="nav-item" onclick="loadSection('catalog')">
                    <i class="fas fa-box"></i><span>Catalog</span>
                </a>
                <a class="nav-item" onclick="loadSection('posts')">
                    <i class="fas fa-newspaper"></i><span>Posts</span>
                </a>
                <a class="nav-item" onclick="loadSection('reviews')">
                    <i class="fas fa-star"></i><span>Reviews</span>
                </a>
                <a class="nav-item" onclick="loadSection('inquiries')">
                    <i class="fas fa-message"></i><span>Inquiries</span>
                </a>
                <a class="nav-item" onclick="loadSection('analytics')">
                    <i class="fas fa-chart-bar"></i><span>Analytics</span>
                </a>
                <a class="nav-item" onclick="loadSection('suggestions')">
                    <i class="fas fa-lightbulb"></i><span>Suggestions</span>
                </a>
                <a class="nav-item" onclick="loadSection('settings')">
                    <i class="fas fa-cog"></i><span>Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<style>
:root {
    --primary: #0f5c2f;
    --primary-dark: #0a4a25;
    --secondary: #5a6e5a;
    --background: linear-gradient(145deg, #e8f0e8 0%, #cde0cd 100%);
    --surface: rgba(255, 255, 255, 0.85);
    --text-primary: #1a2a1f;
    --text-secondary: #5a6e5a;
    --border: rgba(255, 255, 255, 0.4);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    --radius-lg: 48px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--background);
    min-height: 100vh;
    color: var(--text-primary);
}

.vendor-dashboard { min-height: 100vh; display: flex; flex-direction: column; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; margin: 16px; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); }
.header-left, .header-right { display: flex; align-items: center; gap: 16px; }
.logo { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
.header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-primary); transition: all 0.2s; padding: 8px; }
.header-btn:hover { color: var(--primary); }
.badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: #dc2626; color: white; border-radius: 50%; font-size: 11px; font-weight: 700; }
.menu-toggle { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-primary); display: none; }

.dashboard-layout { display: flex; flex: 1; padding: 20px; gap: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
.sidebar { width: 280px; padding: 24px 16px; height: fit-content; position: sticky; top: 20px; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; text-decoration: none; }
.nav-item:hover { background: rgba(15, 92, 47, 0.05); color: var(--primary); }
.nav-item.active { background: var(--primary); color: white; }
.nav-item i { width: 18px; text-align: center; }
.main-content { flex: 1; min-width: 0; }

.glass-card { background: var(--surface); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border: none; border-radius: 40px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { background: var(--surface); }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }

.product-table { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); align-items: center; }

.post-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
.post-meta { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
.post-meta span { display: flex; align-items: center; gap: 6px; }

@media (max-width: 768px) {
    .menu-toggle { display: block; }
    .app-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .sidebar { display: none; position: fixed; top: 80px; left: 20px; right: 20px; z-index: 200; width: auto; }
    .sidebar.open { display: block; }
    .dashboard-layout { flex-direction: column; padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .table-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>

<script>
let vendorData = null;

document.addEventListener('DOMContentLoaded', () => {
    if (!auth.requireRole(['vendor'])) return;
    loadVendorData();
    loadSection('overview');
});

async function loadVendorData() {
    try {
        vendorData = await api.getVendorDashboard();
    } catch (error) {
        console.error('Error loading vendor data:', error);
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

async function loadSection(section) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event?.target.closest('.nav-item')?.classList.add('active');
    
    const content = document.getElementById('mainContent');
    
    const loaders = {
        overview: loadOverview,
        traffic: loadTraffic,
        catalog: loadCatalog,
        posts: loadPosts,
        reviews: loadReviews,
        inquiries: loadInquiries,
        analytics: loadAnalytics,
        suggestions: loadSuggestions,
        settings: loadSettings
    };
    
    if (loaders[section]) await loaders[section]();
}

async function loadOverview() {
    const data = vendorData || await api.getVendorDashboard();
    const content = document.getElementById('mainContent');
    
    content.innerHTML = `
        <div class="overview-container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${data.total_products || 0}</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value">${data.total_posts || 0}</div><div class="stat-label">Posts</div></div>
                <div class="stat-card"><div class="stat-value">${data.total_reviews || 0}</div><div class="stat-label">Reviews</div></div>
                <div class="stat-card"><div class="stat-value">${data.average_rating || 0}⭐</div><div class="stat-label">Rating</div></div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3>Recent Products</h3>
                <div id="recentProducts"></div>
            </div>
        </div>
    `;
    
    renderRecentProducts(data.recent_products || []);
}

function renderRecentProducts(products) {
    const container = document.getElementById('recentProducts');
    if (!products.length) {
        container.innerHTML = '<p class="text-secondary">No products yet</p>';
        return;
    }
    container.innerHTML = products.map(p => `
        <div class="table-row">
            <span><strong>${p.name}</strong></span>
            <span>${p.category || '-'}</span>
            <span>₱${p.price || 0}</span>
            <span>${p.review_count || 0} reviews</span>
            <span><button class="btn btn-outline" onclick="editProduct('${p.id}')">Edit</button></span>
        </div>
    `).join('');
}

async function loadTraffic() {
    const data = await api.getVendorTraffic();
    document.getElementById('mainContent').innerHTML = `
        <div class="traffic-container">
            <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
                <h2>Foot Traffic</h2>
                <div style="text-align: center; padding: 40px;">
                    <div class="stat-value" style="font-size: 64px;">${data.total_views || 0}</div>
                    <div class="stat-label">Total Store Views</div>
                </div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3>Traffic Level: ${data.level || 'Low'}</h3>
                <div id="trafficChart"></div>
            </div>
        </div>
    `;
}

async function loadCatalog() {
    const products = await api.getVendorProducts();
    document.getElementById('mainContent').innerHTML = `
        <div class="catalog-container">
            <div class="table-header">
                <h2>Product Catalog</h2>
                <button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>
            </div>
            <div class="product-table">
                ${products.products?.length ? products.products.map(p => `
                    <div class="table-row">
                        <span><strong>${p.name}</strong></span>
                        <span>${p.category || '-'}</span>
                        <span>₱${p.price || 0}</span>
                        <span>${p.stock || 0} in stock</span>
                        <span>
                            <button class="btn btn-outline" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-outline" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </span>
                    </div>
                `).join('') : '<p>No products yet</p>'}
            </div>
        </div>
    `;
}

async function loadPosts() {
    document.getElementById('mainContent').innerHTML = `
        <div class="posts-container">
            <div class="table-header">
                <h2>Your Posts</h2>
                <button class="btn btn-primary" onclick="showCreatePostModal()">+ Create Post</button>
            </div>
            <div id="vendorPosts"></div>
        </div>
    `;
    await loadVendorPosts();
}

async function loadVendorPosts() {
    try {
        const data = await api.request('/vendor/posts');
        const container = document.getElementById('vendorPosts');
        container.innerHTML = data.posts?.length ? data.posts.map(p => `
            <div class="post-card glass-card">
                <p>${p.content}</p>
                <div class="post-meta">
                    <span><i class="fas fa-heart"></i> ${p.likes || 0}</span>
                    <span>${formatTime(p.created_at)}</span>
                    <button class="btn btn-outline" onclick="deletePost('${p.id}')">Delete</button>
                </div>
            </div>
        `).join('') : '<p class="glass-card" style="padding: 24px;">No posts yet</p>';
    } catch (error) {
        console.error('Error loading posts:', error);
    }
}

function goToInquiries() {
    loadSection('inquiries');
}

function formatTime(timestamp) {
    if (!timestamp) return '';
    return new Date(timestamp).toLocaleDateString();
}

async function loadSuggestions() {
    const token = localStorage.getItem('session_token');
    const content = document.getElementById('mainContent');
    
    try {
        const res = await fetch(`${API_BASE}/vendor/suggestions`, {
            headers: { 'X-Session-Token': token }
        });
        const data = await res.json();
        
        content.innerHTML = `
            <div class="glass-card">
                <h2 style="margin-bottom: 24px;"><i class="fas fa-lightbulb"></i> Business Suggestions</h2>
                
                ${data.recommendations && data.recommendations.length > 0 ? `
                    <div style="margin-bottom: 24px;">
                        <h3 style="margin-bottom: 16px;">Recommendations</h3>
                        ${data.recommendations.map(rec => `
                            <div style="background: rgba(15, 92, 47, 0.05); padding: 16px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid #0f5c2f;">
                                <strong style="color: var(--primary);">${rec.type === 'improve_quality' ? '🎯 Improve Quality' : rec.type === 'promote_products' ? '📢 Promote Products' : '📈 Expand Category'}</strong>
                                <p style="margin-top: 8px; color: var(--text-secondary);">${rec.message}</p>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${data.best_products && data.best_products.length > 0 ? `
                    <div style="margin-bottom: 24px;">
                        <h3 style="margin-bottom: 16px;">Your Best Products</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                            ${data.best_products.map(p => `
                                <div class="glass-card" style="background: #f0f8f2;">
                                    <h4>${p.name}</h4>
                                    <p style="font-size: 13px; color: var(--text-secondary); margin: 8px 0;">${p.category}</p>
                                    <p style="font-size: 20px; font-weight: 700; color: var(--primary);">₱${p.price}</p>
                                    <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                                        <p>Rating: ⭐ ${p.rating || 0}</p>
                                        <p>Views: 👁️ ${p.view_count || 0}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                ${data.top_categories && data.top_categories.length > 0 ? `
                    <div>
                        <h3 style="margin-bottom: 16px;">Top Selling Categories</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                            ${data.top_categories.map(cat => `
                                <div class="glass-card" style="text-align: center; background: #fff0f5;">
                                    <h4>${cat.category}</h4>
                                    <p style="font-size: 24px; font-weight: 700; color: #dc2626; margin: 12px 0;">${cat.sales_count}</p>
                                    <p style="font-size: 13px; color: var(--text-secondary);">Sales</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
    } catch (error) {
        console.error('Error loading suggestions:', error);
        content.innerHTML = '<p style="color: red;">Error loading suggestions</p>';
    }
}
</script>

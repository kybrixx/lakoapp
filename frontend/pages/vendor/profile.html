<div class="profile-page">
    <div class="page-header glass-card">
        <h1>Business Profile</h1>
        <button class="btn btn-primary" onclick="toggleEditMode()">
            <i class="fas fa-edit"></i> Edit Profile
        </button>
    </div>

    <div class="profile-container">
        <!-- Cover Image -->
        <div class="cover-image glass-card" id="coverImageContainer">
            <img id="coverImage" src="" alt="Cover" style="width: 100%; height: 200px; object-fit: cover; border-radius: 24px;">
            <button class="btn btn-outline cover-upload-btn" onclick="uploadCover()">
                <i class="fas fa-camera"></i> Change Cover
            </button>
        </div>

        <!-- Profile Info -->
        <div class="profile-info glass-card">
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img id="profileLogo" src="" alt="Logo" class="profile-logo">
                    <button class="btn btn-outline avatar-upload-btn" onclick="uploadLogo()">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <div class="profile-details">
                    <h2 id="businessName">Loading...</h2>
                    <p id="businessCategory" class="text-secondary"></p>
                    <div class="rating-display">
                        <span id="ratingStars">★★★★★</span>
                        <span id="ratingValue">0.0</span>
                        <span id="reviewCount">(0 reviews)</span>
                    </div>
                </div>
            </div>

            <div class="profile-sections">
                <!-- Basic Information -->
                <div class="info-section">
                    <h3><i class="fas fa-info-circle"></i> Basic Information</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Business Name</label>
                            <span id="displayBusinessName"></span>
                        </div>
                        <div class="info-item">
                            <label>Category</label>
                            <span id="displayCategory"></span>
                        </div>
                        <div class="info-item">
                            <label>Subcategory</label>
                            <span id="displaySubcategory">-</span>
                        </div>
                        <div class="info-item">
                            <label>Description</label>
                            <span id="displayDescription"></span>
                        </div>
                    </div>
                </div>

                <!-- Contact Information -->
                <div class="info-section">
                    <h3><i class="fas fa-address-book"></i> Contact Information</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Phone</label>
                            <span id="displayPhone"></span>
                        </div>
                        <div class="info-item">
                            <label>Email</label>
                            <span id="displayEmail"></span>
                        </div>
                        <div class="info-item">
                            <label>Website</label>
                            <span id="displayWebsite">-</span>
                        </div>
                        <div class="info-item">
                            <label>Address</label>
                            <span id="displayAddress"></span>
                        </div>
                    </div>
                </div>

                <!-- Business Hours -->
                <div class="info-section">
                    <h3><i class="fas fa-clock"></i> Business Hours</h3>
                    <div id="displayHours" class="hours-display"></div>
                </div>

                <!-- Verification Status -->
                <div class="info-section">
                    <h3><i class="fas fa-shield-alt"></i> Verification Status</h3>
                    <div class="verification-status">
                        <span class="status-badge" id="verificationBadge">Pending</span>
                        <p id="verificationMessage">Your business is being verified</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Edit Business Profile</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="profileForm" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label>Business Name *</label>
                        <input type="text" id="editBusinessName" class="form-control" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="editCategory" class="form-control" required>
                                <option>Street Foods</option>
                                <option>Dimsum</option>
                                <option>Snacks</option>
                                <option>Rice Meals</option>
                                <option>Refreshments</option>
                                <option>Bakery</option>
                                <option>Coffee Shop</option>
                                <option>Sari-sari Store</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Subcategory</label>
                            <input type="text" id="editSubcategory" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="editDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="editPhone" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="editEmail" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Website</label>
                        <input type="url" id="editWebsite" class="form-control" placeholder="https://">
                    </div>
                    <div class="form-group">
                        <label>Address *</label>
                        <input type="text" id="editAddress" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Business Hours</label>
                        <input type="text" id="editHours" class="form-control" placeholder="e.g., Mon-Fri 9am-6pm, Sat 10am-4pm">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.profile-page { max-width: 1000px; margin: 0 auto; padding: 20px; }
.profile-container { margin-top: 24px; }
.cover-image { position: relative; margin-bottom: 24px; }
.cover-upload-btn { position: absolute; bottom: 20px; right: 20px; background: var(--surface); }
.profile-info { padding: 32px; }
.profile-header { display: flex; gap: 24px; margin-bottom: 32px; }
.profile-avatar-container { position: relative; }
.profile-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: var(--shadow); }
.avatar-upload-btn { position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; }
.profile-details { flex: 1; }
.profile-details h2 { margin-bottom: 4px; }
.rating-display { display: flex; align-items: center; gap: 8px; margin-top: 8px; color: #fbbf24; }
.info-section { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.06); }
.info-section:last-child { border-bottom: none; }
.info-section h3 { margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.info-item label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.info-item span { font-weight: 500; }
.hours-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.verification-status { display: flex; align-items: center; gap: 16px; }
.status-badge { padding: 6px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; }
.status-badge.verified { background: #10b981; color: white; }
.status-badge.pending { background: #f59e0b; color: white; }
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 32px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.close-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
.form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
@media (max-width: 768px) {
    .profile-header { flex-direction: column; align-items: center; text-align: center; }
    .info-grid { grid-template-columns: 1fr; }
    .hours-display { grid-template-columns: 1fr; }
}
</style>

<script>
let vendorProfile = null;
let editMode = false;

document.addEventListener('DOMContentLoaded', loadProfile);

async function loadProfile() {
    try {
        const data = await api.getVendorDashboard();
        vendorProfile = data.vendor || {};
        renderProfile();
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

function renderProfile() {
    // Header
    document.getElementById('businessName').textContent = vendorProfile.business_name || 'Your Business';
    document.getElementById('businessCategory').textContent = vendorProfile.category || 'Uncategorized';
    
    // Logo
    const logo = document.getElementById('profileLogo');
    logo.src = vendorProfile.logo || '/assets/images/default-vendor.png';
    
    // Cover
    const cover = document.getElementById('coverImage');
    cover.src = vendorProfile.cover_image || 'https://via.placeholder.com/1200x200/0f5c2f/ffffff?text=Your+Business';
    
    // Rating
    const rating = vendorProfile.rating || 0;
    const reviewCount = vendorProfile.review_count || 0;
    document.getElementById('ratingStars').innerHTML = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
    document.getElementById('ratingValue').textContent = rating.toFixed(1);
    document.getElementById('reviewCount').textContent = `(${reviewCount} reviews)`;
    
    // Basic Info
    document.getElementById('displayBusinessName').textContent = vendorProfile.business_name || '-';
    document.getElementById('displayCategory').textContent = vendorProfile.category || '-';
    document.getElementById('displaySubcategory').textContent = vendorProfile.subcategory || '-';
    document.getElementById('displayDescription').textContent = vendorProfile.description || 'No description';
    
    // Contact
    document.getElementById('displayPhone').textContent = vendorProfile.phone || '-';
    document.getElementById('displayEmail').textContent = vendorProfile.email || '-';
    document.getElementById('displayWebsite').textContent = vendorProfile.website || '-';
    document.getElementById('displayAddress').textContent = vendorProfile.address || '-';
    
    // Hours
    const hours = vendorProfile.business_hours || 'Not set';
    document.getElementById('displayHours').innerHTML = hours.split(',').map(h => 
        `<div class="hours-item">${h.trim()}</div>`
    ).join('');
    
    // Verification
    const badge = document.getElementById('verificationBadge');
    const message = document.getElementById('verificationMessage');
    if (vendorProfile.is_verified) {
        badge.textContent = 'Verified';
        badge.className = 'status-badge verified';
        message.textContent = 'Your business has been verified';
    } else {
        badge.textContent = 'Pending';
        badge.className = 'status-badge pending';
        message.textContent = 'Verification in progress';
    }
}

function toggleEditMode() {
    const modal = document.getElementById('editModal');
    
    // Populate form
    document.getElementById('editBusinessName').value = vendorProfile.business_name || '';
    document.getElementById('editCategory').value = vendorProfile.category || '';
    document.getElementById('editSubcategory').value = vendorProfile.subcategory || '';
    document.getElementById('editDescription').value = vendorProfile.description || '';
    document.getElementById('editPhone').value = vendorProfile.phone || '';
    document.getElementById('editEmail').value = vendorProfile.email || '';
    document.getElementById('editWebsite').value = vendorProfile.website || '';
    document.getElementById('editAddress').value = vendorProfile.address || '';
    document.getElementById('editHours').value = vendorProfile.business_hours || '';
    
    modal.style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function saveProfile(e) {
    e.preventDefault();
    
    const data = {
        business_name: document.getElementById('editBusinessName').value,
        category: document.getElementById('editCategory').value,
        subcategory: document.getElementById('editSubcategory').value,
        description: document.getElementById('editDescription').value,
        phone: document.getElementById('editPhone').value,
        email: document.getElementById('editEmail').value,
        website: document.getElementById('editWebsite').value,
        address: document.getElementById('editAddress').value,
        business_hours: document.getElementById('editHours').value
    };
    
    try {
        await api.updateVendorProfile(data);
        app.showToast('Profile updated successfully!', 'success');
        closeEditModal();
        await loadProfile();
    } catch (error) {
        app.showToast('Failed to update profile', 'error');
    }
}

function uploadLogo() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('type', 'logo');
            
            try {
                const response = await fetch('/api/upload/image', {
                    method: 'POST',
                    headers: { 'X-Session-Token': api.getToken() },
                    body: formData
                });
                const data = await response.json();
                await api.updateVendorProfile({ logo: data.url });
                app.showToast('Logo updated!', 'success');
                loadProfile();
            } catch (error) {
                app.showToast('Upload failed', 'error');
            }
        }
    };
    input.click();
}

function uploadCover() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('type', 'cover');
            
            try {
                const response = await fetch('/api/upload/image', {
                    method: 'POST',
                    headers: { 'X-Session-Token': api.getToken() },
                    body: formData
                });
                const data = await response.json();
                await api.updateVendorProfile({ cover_image: data.url });
                app.showToast('Cover updated!', 'success');
                loadProfile();
            } catch (error) {
                app.showToast('Upload failed', 'error');
            }
        }
    };
    input.click();
}
</script>

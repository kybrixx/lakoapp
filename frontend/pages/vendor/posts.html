<div class="posts-page">
    <div class="page-header glass-card">
        <h1>Manage Posts</h1>
        <button class="btn btn-primary" onclick="showCreatePostModal()">
            <i class="fas fa-plus"></i> Create Post
        </button>
    </div>

    <div class="posts-tabs glass-card">
        <button class="tab-btn active" onclick="switchPostTab('published')">Published</button>
        <button class="tab-btn" onclick="switchPostTab('scheduled')">Scheduled</button>
        <button class="tab-btn" onclick="switchPostTab('drafts')">Drafts</button>
    </div>

    <div id="postsList" class="posts-list"></div>
</div>

<style>
.posts-page { max-width: 800px; margin: 0 auto; padding: 20px; }
.posts-tabs { display: flex; gap: 8px; padding: 8px; margin-bottom: 24px; }
.post-item { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
.post-content { margin: 16px 0; }
.post-meta { display: flex; gap: 24px; color: var(--text-secondary); font-size: 13px; }
.post-actions { display: flex; gap: 8px; margin-top: 16px; }
</style>

<script>
let currentPostTab = 'published';

document.addEventListener('DOMContentLoaded', () => loadPosts());

function switchPostTab(tab) {
    currentPostTab = tab;
    document.querySelectorAll('.posts-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadPosts();
}

async function loadPosts() {
    try {
        const data = await api.request(`/vendor/posts?type=${currentPostTab}`);
        renderPosts(data.posts || []);
    } catch (error) {
        console.error('Error loading posts:', error);
    }
}

function renderPosts(posts) {
    const container = document.getElementById('postsList');
    
    if (!posts.length) {
        container.innerHTML = `<div class="glass-card" style="padding: 40px; text-align: center;">No ${currentPostTab} posts</div>`;
        return;
    }
    
    container.innerHTML = posts.map(p => `
        <div class="post-item">
            <div class="post-content">${p.content}</div>
            ${p.image ? `<img src="${p.image}" style="max-width: 100%; border-radius: 16px;">` : ''}
            <div class="post-meta">
                <span><i class="fas fa-heart"></i> ${p.likes || 0} likes</span>
                <span><i class="fas fa-comment"></i> ${p.comment_count || 0} comments</span>
                <span>${formatTime(p.created_at)}</span>
            </div>
            <div class="post-actions">
                <button class="btn btn-outline" onclick="editPost('${p.id}')">Edit</button>
                <button class="btn btn-outline" onclick="deletePost('${p.id}')">Delete</button>
            </div>
        </div>
    `).join('');
}

function showCreatePostModal() {
    app.showModal('Create Post', `
        <textarea id="postContent" class="form-control" rows="4" placeholder="What's new with your business?"></textarea>
        <div style="margin-top: 12px;">
            <input type="file" id="postImage" accept="image/*">
        </div>
    `, [
        { text: 'Cancel', class: 'btn-secondary', onClick: 'app.closeModal()' },
        { text: 'Post', class: 'btn-primary', onClick: 'createPost()' }
    ]);
}

async function createPost() {
    const content = document.getElementById('postContent').value;
    if (!content) {
        app.showToast('Please enter content', 'error');
        return;
    }
    
    try {
        await api.request('/vendor/posts', {
            method: 'POST',
            body: JSON.stringify({ content })
        });
        app.closeModal();
        app.showToast('Post created!', 'success');
        loadPosts();
    } catch (error) {
        app.showToast('Failed to create post', 'error');
    }
}

async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    try {
        await api.request(`/vendor/posts/${id}`, { method: 'DELETE' });
        app.showToast('Post deleted', 'success');
        loadPosts();
    } catch (error) {
        app.showToast('Failed to delete', 'error');
    }
}

function editPost(id) {
    app.showToast('Edit feature coming soon', 'info');
}

function formatTime(t) { return t ? new Date(t).toLocaleDateString() : ''; }
</script>

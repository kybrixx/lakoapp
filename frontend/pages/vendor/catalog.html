<div class="catalog-page">
    <div class="page-header glass-card">
        <h1>Product Catalog</h1>
        <button class="btn btn-primary" onclick="showAddProductModal()">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>

    <div class="catalog-filters glass-card">
        <input type="text" class="form-control" placeholder="Search products..." id="productSearch" oninput="filterProducts()">
        <select class="form-control" id="categoryFilter" onchange="filterProducts()">
            <option value="">All Categories</option>
            <option>Street Foods</option>
            <option>Dimsum</option>
            <option>Snacks</option>
            <option>Rice Meals</option>
            <option>Refreshments</option>
        </select>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</div>

<style>
.catalog-page { max-width: 1200px; margin: 0 auto; padding: 20px; }
.page-header { display: flex; justify-content: space-between; align-items: center; padding: 24px; margin-bottom: 24px; }
.catalog-filters { display: flex; gap: 16px; padding: 20px; margin-bottom: 24px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
.product-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
.product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.product-image { width: 100%; height: 160px; border-radius: 16px; background: rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.product-image i { font-size: 48px; color: var(--text-secondary); }
.product-name { font-weight: 600; margin-bottom: 4px; }
.product-price { font-size: 20px; font-weight: 700; color: var(--primary); }
.product-category { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.product-actions { display: flex; gap: 8px; margin-top: 12px; }
</style>

<script>
let allProducts = [];

document.addEventListener('DOMContentLoaded', loadProducts);

async function loadProducts() {
    try {
        const data = await api.getVendorProducts();
        allProducts = data.products || [];
        renderProducts(allProducts);
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (!products.length) {
        grid.innerHTML = `<div class="glass-card" style="padding: 40px; text-align: center; grid-column: 1/-1;">No products yet</div>`;
        return;
    }
    grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="viewProduct('${p.id}')">
            <div class="product-image">${p.image ? `<img src="${p.image}" alt="${p.name}">` : '<i class="fas fa-box"></i>'}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">₱${p.price || 0}</div>
            <div class="product-category">${p.category || 'Uncategorized'}</div>
            <div class="product-actions">
                <button class="btn btn-outline" onclick="event.stopPropagation(); editProduct('${p.id}')">Edit</button>
                <button class="btn btn-outline" onclick="event.stopPropagation(); deleteProduct('${p.id}')">Delete</button>
            </div>
        </div>
    `).join('');
}

function filterProducts() {
    const search = document.getElementById('productSearch').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const filtered = allProducts.filter(p => 
        p.name.toLowerCase().includes(search) && 
        (!category || p.category === category)
    );
    renderProducts(filtered);
}

function showAddProductModal() {
    const modal = app.showModal('Add Product', `
        <div class="form-group">
            <label class="form-label">Product Name</label>
            <input type="text" id="productName" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="productDesc" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="productCategory" class="form-control">
                    <option>Street Foods</option><option>Dimsum</option><option>Snacks</option>
                    <option>Rice Meals</option><option>Refreshments</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Price (₱)</label>
                <input type="number" id="productPrice" class="form-control" step="0.01">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Stock</label>
                <input type="number" id="productStock" class="form-control" value="0">
            </div>
            <div class="form-group">
                <label class="form-label">MOQ</label>
                <input type="number" id="productMOQ" class="form-control" value="1">
            </div>
        </div>
    `, [
        { text: 'Cancel', class: 'btn-secondary', onClick: 'app.closeModal()' },
        { text: 'Save', class: 'btn-primary', onClick: 'saveProduct()' }
    ]);
}

async function saveProduct() {
    const data = {
        name: document.getElementById('productName').value,
        description: document.getElementById('productDesc').value,
        category: document.getElementById('productCategory').value,
        price: parseFloat(document.getElementById('productPrice').value),
        stock: parseInt(document.getElementById('productStock').value),
        moq: parseInt(document.getElementById('productMOQ').value)
    };
    
    if (!data.name) {
        app.showToast('Product name required', 'error');
        return;
    }
    
    try {
        await api.createProduct(data);
        app.closeModal();
        app.showToast('Product added!', 'success');
        loadProducts();
    } catch (error) {
        app.showToast('Failed to add product', 'error');
    }
}

function viewProduct(id) {
    window.location.href = `/pages/vendor/product-detail.html?id=${id}`;
}

function editProduct(id) {
    // Implementation for editing
}

async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
        await api.deleteProduct(id);
        app.showToast('Product deleted', 'success');
        loadProducts();
    } catch (error) {
        app.showToast('Failed to delete', 'error');
    }
}
</script>

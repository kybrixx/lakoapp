<div class="reviews-page">
    <div class="page-header glass-card">
        <h1>Customer Reviews</h1>
    </div>

    <div class="rating-summary glass-card">
        <div class="overall-rating">
            <div class="big-rating" id="avgRating">0.0</div>
            <div class="stars" id="ratingStars"></div>
            <div id="totalReviews">0 reviews</div>
        </div>
        <div class="rating-breakdown" id="ratingBreakdown"></div>
    </div>

    <div class="reviews-list" id="reviewsList"></div>
</div>

<style>
.reviews-page { max-width: 800px; margin: 0 auto; padding: 20px; }
.page-header { padding: 24px; margin-bottom: 24px; }
.rating-summary { display: flex; padding: 24px; margin-bottom: 24px; gap: 40px; }
.overall-rating { text-align: center; }
.big-rating { font-size: 48px; font-weight: 700; color: var(--primary); }
.stars { color: #fbbf24; font-size: 20px; margin: 8px 0; }
.rating-breakdown { flex: 1; }
.breakdown-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.breakdown-bar { flex: 1; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; }
.breakdown-fill { height: 100%; background: var(--primary); }
.review-card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
.review-header { display: flex; gap: 12px; margin-bottom: 12px; }
.review-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: white; }
.review-info { flex: 1; }
.review-author { font-weight: 600; }
.review-rating { color: #fbbf24; }
.review-content { margin: 12px 0; }
.review-actions { display: flex; gap: 16px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', loadReviews);

async function loadReviews() {
    try {
        const data = await api.getVendorReviews();
        renderSummary(data);
        renderReviews(data.reviews || []);
    } catch (error) {
        console.error('Error loading reviews:', error);
    }
}

function renderSummary(data) {
    const reviews = data.reviews || [];
    const avg = reviews.length ? reviews.reduce((s, r) => s + r.rating, 0) / reviews.length : 0;
    
    document.getElementById('avgRating').textContent = avg.toFixed(1);
    document.getElementById('ratingStars').innerHTML = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));
    document.getElementById('totalReviews').textContent = `${reviews.length} reviews`;
    
    const breakdown = {5:0,4:0,3:0,2:0,1:0};
    reviews.forEach(r => breakdown[r.rating]++);
    
    document.getElementById('ratingBreakdown').innerHTML = [5,4,3,2,1].map(star => `
        <div class="breakdown-row">
            <span>${star} ★</span>
            <div class="breakdown-bar"><div class="breakdown-fill" style="width: ${reviews.length ? (breakdown[star]/reviews.length)*100 : 0}%"></div></div>
            <span>${breakdown[star]}</span>
        </div>
    `).join('');
}

function renderReviews(reviews) {
    const container = document.getElementById('reviewsList');
    if (!reviews.length) {
        container.innerHTML = '<div class="glass-card" style="padding: 40px; text-align: center;">No reviews yet</div>';
        return;
    }
    container.innerHTML = reviews.map(r => `
        <div class="review-card">
            <div class="review-header">
                <div class="review-avatar">${r.customer_name?.charAt(0) || 'C'}</div>
                <div class="review-info">
                    <div class="review-author">${r.customer_name || 'Customer'}</div>
                    <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                </div>
                <div>${formatTime(r.created_at)}</div>
            </div>
            ${r.title ? `<h4>${r.title}</h4>` : ''}
            <div class="review-content">${r.comment || ''}</div>
            <div class="review-actions">
                <button class="btn btn-outline" onclick="replyToReview('${r.id}')">Reply</button>
            </div>
        </div>
    `).join('');
}

function replyToReview(id) {
    app.showModal('Reply to Review', `
        <textarea id="replyContent" class="form-control" rows="3" placeholder="Write your reply..."></textarea>
    `, [
        { text: 'Cancel', class: 'btn-secondary', onClick: 'app.closeModal()' },
        { text: 'Send', class: 'btn-primary', onClick: `sendReply('${id}')` }
    ]);
}

async function sendReply(id) {
    const content = document.getElementById('replyContent').value;
    if (!content) return;
    app.closeModal();
    app.showToast('Reply sent!', 'success');
}

function formatTime(t) { return t ? new Date(t).toLocaleDateString() : ''; }
</script>

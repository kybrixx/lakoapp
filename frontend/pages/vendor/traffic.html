<div class="traffic-page">
    <div class="page-header glass-card">
        <h1>Foot Traffic Analytics</h1>
        <button class="btn btn-outline" onclick="exportTrafficReport()">
            <i class="fas fa-download"></i> Export Report
        </button>
    </div>

    <div class="traffic-stats glass-card">
        <div class="stat-item">
            <div class="stat-value" id="totalTraffic">0</div>
            <div class="stat-label">Total Views</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="todayTraffic">0</div>
            <div class="stat-label">Today</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="weekTraffic">0</div>
            <div class="stat-label">This Week</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="trafficLevel">Low</div>
            <div class="stat-label">Current Level</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="glass-card">
            <h3>Hourly Traffic</h3>
            <canvas id="hourlyTrafficChart"></canvas>
        </div>
        <div class="glass-card">
            <h3>Daily Traffic (Last 7 Days)</h3>
            <canvas id="dailyTrafficChart"></canvas>
        </div>
        <div class="glass-card">
            <h3>Peak Hours</h3>
            <div id="peakHours"></div>
        </div>
        <div class="glass-card">
            <h3>Traffic Forecast</h3>
            <div id="forecast"></div>
        </div>
    </div>
</div>

<style>
.traffic-page { max-width: 1400px; margin: 0 auto; padding: 20px; }
.traffic-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 24px; margin-bottom: 24px; text-align: center; }
.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.charts-grid .glass-card { padding: 24px; }
#peakHours, #forecast { padding: 16px; }
.peak-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
@media (max-width: 768px) { .traffic-stats { grid-template-columns: repeat(2, 1fr); } .charts-grid { grid-template-columns: 1fr; } }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
let charts = {};

document.addEventListener('DOMContentLoaded', loadTrafficData);

async function loadTrafficData() {
    try {
        const data = await api.getVendorTraffic();
        const insights = await api.request('/vendor/traffic/insights');
        
        renderStats(data);
        renderCharts(insights);
        renderPeakHours(insights.peak_hours || []);
        renderForecast(insights);
    } catch (error) {
        console.error('Error loading traffic:', error);
    }
}

function renderStats(data) {
    document.getElementById('totalTraffic').textContent = data.total_views || 0;
    document.getElementById('trafficLevel').textContent = data.level || 'Low';
    
    // Calculate today/week (mock data for demo)
    document.getElementById('todayTraffic').textContent = Math.floor((data.total_views || 0) * 0.15);
    document.getElementById('weekTraffic').textContent = Math.floor((data.total_views || 0) * 0.6);
}

function renderCharts(data) {
    // Hourly chart
    if (charts.hourly) charts.hourly.destroy();
    const hourlyCtx = document.getElementById('hourlyTrafficChart').getContext('2d');
    charts.hourly = new Chart(hourlyCtx, {
        type: 'line',
        data: {
            labels: data.hourly?.map(h => h.hour + ':00') || ['6am','9am','12pm','3pm','6pm','9pm'],
            datasets: [{
                label: 'Traffic',
                data: data.hourly?.map(h => h.count) || [5,15,25,20,30,10],
                borderColor: '#0f5c2f',
                backgroundColor: 'rgba(15,92,47,0.1)',
                fill: true
            }]
        }
    });
    
    // Daily chart
    if (charts.daily) charts.daily.destroy();
    const dailyCtx = document.getElementById('dailyTrafficChart').getContext('2d');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    charts.daily = new Chart(dailyCtx, {
        type: 'bar',
        data: {
            labels: data.daily?.map(d => days[d.day]) || ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
            datasets: [{
                label: 'Traffic',
                data: data.daily?.map(d => d.count) || [20,25,18,30,35,40,15],
                backgroundColor: '#0f5c2f'
            }]
        }
    });
}

function renderPeakHours(peakHours) {
    const container = document.getElementById('peakHours');
    if (!peakHours.length) {
        container.innerHTML = '<p class="text-secondary">No data available</p>';
        return;
    }
    container.innerHTML = peakHours.map(p => `
        <div class="peak-item">
            <span>${p.hour}:00</span>
            <span><strong>${p.count}</strong> visitors</span>
        </div>
    `).join('');
}

function renderForecast(data) {
    const container = document.getElementById('forecast');
    const total = data.total_week || 100;
    const forecast = Math.round(total * 1.1);
    container.innerHTML = `
        <div style="text-align: center; padding: 20px;">
            <div style="font-size: 32px; font-weight: 700; color: var(--primary);">${forecast}</div>
            <div>expected next week</div>
            <div style="margin-top: 16px; color: #10b981;">↑ 10% increase predicted</div>
        </div>
    `;
}

function exportTrafficReport() {
    app.showToast('Traffic report downloading...', 'success');
}
</script>

<div class="settings-page">
    <div class="page-header glass-card">
        <h1>Business Settings</h1>
    </div>

    <div class="settings-container glass-card">
        <div class="settings-section">
            <h3>Business Profile</h3>
            <form id="profileForm" onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input type="text" id="businessName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="category" class="form-control">
                        <option>Street Foods</option><option>Dimsum</option><option>Snacks</option>
                        <option>Rice Meals</option><option>Refreshments</option><option>Bakery</option>
                        <option>Coffee Shop</option><option>Sari-sari Store</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <input type="text" id="address" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Business Hours</label>
                    <input type="text" id="hours" class="form-control" placeholder="e.g., Mon-Fri 9am-6pm">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>

        <div class="settings-section">
            <h3>Location</h3>
            <div id="locationMap" style="height: 300px; border-radius: 24px; margin-bottom: 16px;"></div>
            <button class="btn btn-outline" onclick="getCurrentLocation()">
                <i class="fas fa-location-dot"></i> Set Business Location
            </button>
        </div>

        <div class="settings-section">
            <h3>Notification Settings</h3>
            <div class="setting-item">
                <span>New Message Alerts</span>
                <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-item">
                <span>New Review Alerts</span>
                <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
            </div>
            <div class="setting-item">
                <span>Traffic Spike Alerts</span>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
            </div>
        </div>

        <div class="settings-section">
            <h3>Account</h3>
            <button class="btn btn-secondary" onclick="auth.logout(); window.location.href='/'">
                Sign Out
            </button>
        </div>
    </div>
</div>

<style>
.settings-page { max-width: 800px; margin: 0 auto; padding: 20px; }
.settings-container { padding: 32px; }
.settings-section { margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.06); }
.settings-section:last-child { border-bottom: none; margin-bottom: 0; }
.settings-section h3 { margin-bottom: 24px; }
.setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 24px; transition: .2s; }
.toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider { background: var(--primary); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
</style>

<script>
let map = null;
let marker = null;
let currentLat = null, currentLng = null;

document.addEventListener('DOMContentLoaded', () => {
    loadProfile();
    initMap();
});

async function loadProfile() {
    try {
        const vendor = auth.getVendor();
        if (vendor) {
            document.getElementById('businessName').value = vendor.business_name || '';
            document.getElementById('category').value = vendor.category || '';
            document.getElementById('description').value = vendor.description || '';
            document.getElementById('address').value = vendor.address || '';
            document.getElementById('phone').value = vendor.phone || '';
            document.getElementById('email').value = vendor.email || '';
            document.getElementById('hours').value = vendor.business_hours || '';
            
            if (vendor.latitude && vendor.longitude) {
                currentLat = vendor.latitude;
                currentLng = vendor.longitude;
                updateMapMarker();
            }
        }
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

function initMap() {
    const container = document.getElementById('locationMap');
    map = L.map(container).setView([14.5995, 120.9842], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function updateMapMarker() {
    if (marker) map.removeLayer(marker);
    marker = L.marker([currentLat, currentLng]).addTo(map);
    map.setView([currentLat, currentLng], 15);
}

function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;
            updateMapMarker();
            app.showToast('Location set!', 'success');
        });
    }
}

async function saveProfile(e) {
    e.preventDefault();
    const data = {
        business_name: document.getElementById('businessName').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        business_hours: document.getElementById('hours').value,
        latitude: currentLat,
        longitude: currentLng
    };
    
    try {
        await api.updateVendorProfile(data);
        app.showToast('Profile updated!', 'success');
    } catch (error) {
        app.showToast('Failed to update', 'error');
    }
}
</script>

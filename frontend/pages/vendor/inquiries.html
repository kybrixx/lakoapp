<div class="inquiries-page">
    <div class="page-header glass-card">
        <h1>Customer Inquiries</h1>
    </div>

    <div class="inquiries-layout">
        <!-- Conversation List -->
        <div class="conversation-list glass-card">
            <h3>Conversations</h3>
            <div id="conversationsList"></div>
        </div>

        <!-- Chat Window -->
        <div class="chat-window glass-card">
            <div id="chatHeader" class="chat-header">
                <span>Select a conversation</span>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div id="chatInput" class="chat-input" style="display: none;">
                <input type="text" id="messageInput" placeholder="Type a message..." class="form-control">
                <button class="btn btn-primary" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.inquiries-page { max-width: 1400px; margin: 0 auto; padding: 20px; }
.inquiries-layout { display: grid; grid-template-columns: 350px 1fr; gap: 24px; margin-top: 24px; height: calc(100vh - 200px); min-height: 500px; }
.conversation-list { padding: 20px; overflow-y: auto; }
.conversation-item { display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 16px; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid rgba(0,0,0,0.06); }
.conversation-item:hover { background: rgba(0,0,0,0.02); }
.conversation-item.active { background: var(--primary); color: white; }
.conversation-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
.conversation-info { flex: 1; }
.conversation-name { font-weight: 600; margin-bottom: 4px; }
.conversation-last { font-size: 13px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conversation-badge { background: #dc2626; color: white; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
.chat-window { display: flex; flex-direction: column; padding: 0; overflow: hidden; }
.chat-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.06); font-weight: 600; }
.messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.message { display: flex; gap: 12px; max-width: 70%; }
.message.sent { align-self: flex-end; flex-direction: row-reverse; }
.message-bubble { background: rgba(0,0,0,0.04); padding: 12px 16px; border-radius: 20px; }
.message.sent .message-bubble { background: var(--primary); color: white; }
.message-time { font-size: 11px; opacity: 0.6; margin-top: 4px; }
.chat-input { display: flex; gap: 12px; padding: 20px; border-top: 1px solid rgba(0,0,0,0.06); }
@media (max-width: 768px) { .inquiries-layout { grid-template-columns: 1fr; } }
</style>

<script>
let conversations = [];
let currentConversation = null;
let socket = null;

document.addEventListener('DOMContentLoaded', () => {
    loadConversations();
    connectSocket();
});

async function loadConversations() {
    try {
        const data = await api.getConversations();
        conversations = data.conversations || [];
        renderConversations();
    } catch (error) {
        console.error('Error loading conversations:', error);
    }
}

function renderConversations() {
    const container = document.getElementById('conversationsList');
    if (!conversations.length) {
        container.innerHTML = '<p class="text-secondary" style="padding: 20px;">No conversations yet</p>';
        return;
    }
    container.innerHTML = conversations.map(c => `
        <div class="conversation-item ${currentConversation === c.other_id ? 'active' : ''}" onclick="selectConversation('${c.other_id}', '${c.other_name}')">
            <div class="conversation-avatar">${c.other_name?.charAt(0) || 'C'}</div>
            <div class="conversation-info">
                <div class="conversation-name">${c.other_name || 'Customer'}</div>
                <div class="conversation-last">${c.last_message || 'No messages'}</div>
            </div>
            ${c.unread_count ? `<span class="conversation-badge">${c.unread_count}</span>` : ''}
        </div>
    `).join('');
}

async function selectConversation(userId, userName) {
    currentConversation = userId;
    renderConversations();
    
    document.getElementById('chatHeader').innerHTML = `
        <span>${userName || 'Customer'}</span>
    `;
    document.getElementById('chatInput').style.display = 'flex';
    
    await loadMessages(userId);
}

async function loadMessages(userId) {
    try {
        const data = await api.getMessages(userId);
        renderMessages(data.messages || []);
    } catch (error) {
        console.error('Error loading messages:', error);
    }
}

function renderMessages(messages) {
    const container = document.getElementById('messagesContainer');
    const currentUser = auth.getUser();
    
    if (!messages.length) {
        container.innerHTML = '<p class="text-secondary" style="text-align: center;">No messages yet</p>';
        return;
    }
    
    container.innerHTML = messages.map(m => {
        const isSent = m.sender_id === currentUser?.id;
        return `
            <div class="message ${isSent ? 'sent' : 'received'}">
                <div class="message-bubble">
                    ${m.message || ''}
                    ${m.images ? '<div><img src="' + m.images + '" style="max-width: 200px; border-radius: 12px;"></div>' : ''}
                    <div class="message-time">${formatMessageTime(m.created_at)}</div>
                </div>
            </div>
        `;
    }).join('');
    
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    
    if (!message || !currentConversation) return;
    
    try {
        await api.sendMessage(currentConversation, message);
        input.value = '';
        await loadMessages(currentConversation);
        
        if (socket) {
            socket.emit('message', {
                receiver_id: currentConversation,
                message: message
            });
        }
    } catch (error) {
        app.showToast('Failed to send message', 'error');
    }
}

function connectSocket() {
    socket = io('http://localhost:5000');
    socket.on('connect', () => console.log('Socket connected'));
    socket.on('message', (data) => {
        if (data.sender_id === currentConversation) {
            loadMessages(currentConversation);
        }
    });
}

function formatMessageTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
</script>

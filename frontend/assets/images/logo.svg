<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle for app icon -->
  <circle cx="100" cy="100" r="100" fill="#0f5c2f"/>
  
  <!-- Map pointer outline -->
  <g transform="translate(100, 80)">
    <!-- Pointer drop shape -->
    <path d="M 0,-35 C -19,-35 -35,-19 -35,0 C -35,19 0,40 0,40 C 0,40 35,19 35,0 C 35,-19 19,-35 0,-35 Z" 
          fill="white" stroke="white" stroke-width="1"/>
    
    <!-- Inner circle on pointer -->
    <circle cx="0" cy="-8" r="12" fill="#0f5c2f"/>
  </g>
  
  <!-- Skewer stick (rotated meat stick) -->
  <g transform="translate(100, 100)">
    <!-- Main skewer shaft -->
    <rect x="-60" y="-3" width="120" height="6" fill="#1a1a1a" rx="3"/>
    
    <!-- Skewer meat pieces -->
    <circle cx="-40" cy="0" r="8" fill="#d4766f"/>
    <circle cx="-20" cy="0" r="8" fill="#c9a882"/>
    <circle cx="0" cy="0" r="8" fill="#d4766f"/>
    <circle cx="20" cy="0" r="8" fill="#c9a882"/>
    <circle cx="40" cy="0" r="8" fill="#d4766f"/>
    
    <!-- Skewer tips -->
    <polygon points="-60,-2 -55,-6 -55,6" fill="#333"/>
    <polygon points="60,-2 55,-6 55,6" fill="#333"/>
  </g>
  
  <!-- Accent line connecting pointer and skewer -->
  <line x1="100" y1="110" x2="100" y2="120" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
